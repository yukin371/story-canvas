  "chapterDirections": [
    {
      "chapterId": "chapter-001",
      "title": "扫地也算修行",
      "summary": "用一次躲早课失败和杂役场挑衅，建立主角的反常修炼机制、破落宗门处境，以及师姐对他第一次严重误判。"
    },
    {
      "chapterId": "chapter-002",
      "title": "东井也要扫干净",
      "summary": "承接祖师崖误判后果，让大师姐把陆闲推到东侧水井守局；黑沙门再试一手，陆闲在被迫杂役中意外反打，师姐团误会继续升级。"
    },
    {
      "chapterId": "chapter-003",
      "title": "扫帚把脸抽回去",
      "summary": "承接东井翻盘后的公开压力，让霍飞把试探抬到台前；陆闲想继续摆烂却被师姐们推上场，最终完成第一次清晰打脸和宗门内身份反转。"
    }
  ],
