    {
      "id": "chapter-019",
      "title": "天枢旧事",
      "status": "completed",
      "direction": "沈玄深入调查天枢宗往事。通过宋怀瑾的帮助，他获得了顾长渊修炼室的阵法图纸，发现顾长渊的阵法核心直接连接归墟域封印——白九殇并非被封印的囚犯，而是主动选择留在归墟域以积蓄力量。顾长渊以为自己在利用白九殇，实际上从第一天起就是傀儡。",
      "beats": [
        {
          "id": "beat-c9014d839d",
          "summary": "宋怀瑾冒着风险将顾长渊修炼室的阵法图纸偷偷带给沈玄。图纸显示阵法核心直连归墟域封印",
          "status": "planned",
          "createdAt": "2026-04-25T01:18:50+08:00"
        },
        {
