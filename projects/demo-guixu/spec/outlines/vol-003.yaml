      "id": "chapter-018",
      "title": "摊牌",
      "status": "completed",
      "direction": "第三卷开篇。顾长渊亲自出手，通过归墟域封印的力量锁定沈玄的位置。沈玄被逼入绝境，不得不暴露归墟体的全部能力应战。这一战震惊了苍梧域所有宗门——归墟体的传说重新浮出水面。叶清漪和宋怀瑾都亲眼目睹了沈玄的真正力量。",
      "beats": [
        {
