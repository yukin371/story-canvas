      "id": "chapter-001",
      "title": "归墟",
      "status": "completed",
      "direction": "沈玄在筑基前夕的修炼中突然觉醒前世记忆——他被师父顾长渊杀死、夺取归墟体的记忆。重生回到十六岁。他需要迅速调整心态，利用前世记忆规划第一步：避开天枢宗，选择完全不同的道路。但就在他做出决定的那一刻，一个前世从未见过的少女拦住了他的路。",
      "beats": [
        {
          "id": "beat-6240e28034",
          "summary": "沈玄在修炼中突然被剧痛击穿，前世被杀的全过程如走马灯闪过——顾长渊的微笑、撕裂肉体的阵法、归墟体被抽离的感觉",
          "status": "planned",
          "createdAt": "2026-04-25T01:16:19+08:00"
        },
        {
          "id": "beat-832ae6a862",
          "summary": "沈玄确认自己回到十六岁，身体尚未筑基，归墟体还在。他迅速冷静下来，开始盘算如何利用这个机会",
          "status": "planned",
          "createdAt": "2026-04-25T01:16:19+08:00"
        },
        {
          "id": "beat-6ba040a585",
          "summary": "沈玄决定不去天枢宗，改去苍梧域的青云试炼。刚踏出村口，一个背负玄冰剑的少女拦路问他知不知道附近有没有灵药铺",
          "status": "planned",
          "createdAt": "2026-04-25T01:16:19+08:00"
        },
        {
          "id": "beat-4a458e5298",
          "summary": "沈玄愣住——这个少女他前世从未见过，但他的前世记忆中，这条路不应该有人。蝴蝶效应的第一片翅膀已经扇动了",
          "status": "planned",
          "createdAt": "2026-04-25T01:16:20+08:00"
        }
      ],
