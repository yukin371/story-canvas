      "title": "前世碎片",
      "status": "completed",
      "direction": "沈玄消化前世记忆，制定初步计划。前世他在天枢宗的青云试炼中被顾长渊看中归墟体，这次必须避开。他决定前往苍梧域的青云试炼——同名的不同试炼，前世从未参加。同时开始整理前世记忆中的关键时间节点：秘境出现、传承争夺、封印异动。",
