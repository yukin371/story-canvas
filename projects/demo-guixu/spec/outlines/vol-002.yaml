      "id": "chapter-009",
      "title": "新宗新貌",
      "status": "completed",
      "direction": "沈玄正式加入苍梧域的青云宗，成为内门弟子。他选择青云宗的原因：前世青云宗在他死亡当年被灭宗，如果这一世能保住青云宗，不仅能获得一个强力盟友，还能切断顾长渊的一条关键情报线。他开始以新身份融入宗门。",
      "beats": [
        {
          "id": "beat-585e217245",
          "summary": "沈玄正式成为青云宗内门弟子，分配到阵法堂。他暗中评估青云宗的战力——前世这个宗门在三年内被灭，如果能改变这个结局，就多了一个强力盟友",
          "status": "planned",
          "createdAt": "2026-04-25T01:17:20+08:00"
        },
        {
          "id": "beat-b10eaa3875",
          "summary": "沈玄发现青云宗的护宗大阵有一处前世才被发现的致命缺陷，他开始有计划地修复，同时不引起注意",
          "status": "planned",
          "createdAt": "2026-04-25T01:17:20+08:00"
        },
        {
          "id": "beat-a39ac5fb38",
          "summary": "他在宗门内建立初步人脉，但刻意保持距离——前世的教训告诉他，太亲近的人最容易成为软肋",
          "status": "planned",
          "createdAt": "2026-04-25T01:17:20+08:00"
        }
      ],
      "scenePlans": [
