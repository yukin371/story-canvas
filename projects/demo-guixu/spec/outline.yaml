  "chapterDirections": [
    {
      "chapterId": "chapter-001",
      "title": "归墟",
      "summary": "沈玄在筑基前夕的修炼中突然觉醒前世记忆——他被师父顾长渊杀死、夺取归墟体的记忆。重生回到十六岁。他需要迅速调整心态，利用前世记忆规划第一步：避开天枢宗，选择完全不同的道路。但就在他做出决定的那一刻，一个前世从未见过的少女拦住了他的路。"
    },
    {
      "chapterId": "chapter-002",
      "title": "前世碎片",
      "summary": "沈玄消化前世记忆，制定初步计划。前世他在天枢宗的青云试炼中被顾长渊看中归墟体，这次必须避开。他决定前往苍梧域的青云试炼——同名的不同试炼，前世从未参加。同时开始整理前世记忆中的关键时间节点：秘境出现、传承争夺、封印异动。"
    },
    {
      "chapterId": "chapter-003",
      "title": "旧路新走",
      "summary": "沈玄开始有计划地获取前世知道的关键资源。第一个目标：城外的无名灵药——前世被他忽略的低阶灵草，实际上是与归墟体共鸣的引魂草。但采药过程中他发现灵草的生长位置与前世不同，蝴蝶效应已经开始影响自然规律。"
    },
    {
      "chapterId": "chapter-004",
      "title": "青云试炼",
      "summary": "前往苍梧域参加青云试炼。沈玄刻意压制修为以中游成绩入门，避免像前世那样过于耀眼被顾长渊注意到。试炼中他暗中观察各宗门势力分布，重新绘制势力地图——前世的盟友和敌人在这个时间线可能完全不同。"
    },
    {
      "chapterId": "chapter-005",
      "title": "意外之人",
      "summary": "青云试炼进行中，沈玄刻意低调却因一次意外展露阵法天赋。更关键的是，他遇到一个前世完全不存在的人——叶清漪。这个玄冥域散修的出现意味着时间线已经发生重大偏移。沈玄第一次感到前世记忆的局限性。"
    },
    {
      "chapterId": "chapter-006",
      "title": "秘境先机",
      "summary": "沈玄利用前世记忆找到了一处隐秘的遗迹入口——前世这里是三年后才被发现的。他独自潜入，获取了一套阵法传承。但遗迹中残留的灵识波动让他警觉：有人在他之前来过这里，留下了探查痕迹。时间线偏移不只是蝴蝶效应，有人在主动改变局势。"
    },
    {
      "chapterId": "chapter-007",
      "title": "暗流涌动",
      "summary": "沈玄在苍梧域站稳脚跟的同时暗中收集情报。他从多方渠道拼凑出一个令人不安的结论：顾长渊在三年前就已经开始寻找归墟体的持有者——比前世提前了整整五年。这意味着白九殇的影响力在增强，封印在加速松动。"
    },
    {
      "chapterId": "chapter-008",
      "title": "棋盘初现",
      "summary": "第一卷高潮。沈玄通过前世记忆获取的情报与实际发生的事件对比，确认蝴蝶效应正在加速。更可怕的是，他发现顾长渊的阴谋比前世提前了三年启动。卷末转折：顾长渊的探子已经出现在苍梧域，沈玄意识到猎人已经开始追踪。"
    },
    {
      "chapterId": "chapter-009",
      "title": "新宗新貌",
      "summary": "沈玄正式加入苍梧域的青云宗，成为内门弟子。他选择青云宗的原因：前世青云宗在他死亡当年被灭宗，如果这一世能保住青云宗，不仅能获得一个强力盟友，还能切断顾长渊的一条关键情报线。他开始以新身份融入宗门。"
    },
    {
      "chapterId": "chapter-010",
      "title": "锋芒",
      "summary": "沈玄在宗门考核中表现突出但不过分。他暗中帮助青云宗修复了一处前世的阵法缺陷，赢得了宗门长老的信任。同时叶清漪再次出现，她以散修身份挑战青云宗剑阁，剑法惊艳全场。沈玄意识到叶清漪的修为比他预想的高得多。"
    },
    {
      "chapterId": "chapter-011",
      "title": "玄冥剑修",
      "summary": "叶清漪与沈玄的第二次深入接触。她在追踪一个与玄冥域有关的线索时与沈玄的路线重合。两人被迫合作应对一伙散修的伏击，战斗中沈玄第一次在别人面前使用了部分归墟体能力——但被叶清漪察觉。她没有追问，但沈玄知道她已经开始观察自己。"
    },
    {
      "chapterId": "chapter-012",
      "title": "苍梧秘境",
      "summary": "苍梧秘境开启——前世这个秘境在三年后才出现。沈玄再次确认时间线在加速。他与叶清漪、几名青云宗弟子组队进入。秘境内部结构与前世记忆相似但有微妙差异，沈玄利用记忆规避了大部分危险，却在最后一层遇到前世不存在的守护阵法。"
    },
    {
      "chapterId": "chapter-013",
      "title": "远古传承",
      "summary": "秘境深处，沈玄发现远古传承并非前世的功法玉简，而是一块归墟域的封印碎片。碎片中的残余灵识与他的归墟体产生共鸣，赋予他操控阵法的能力远超前世。但这也暴露了一个问题：他的归墟体正在被归墟域感知到，像一盏灯在黑暗中被点亮。"
    },
    {
      "chapterId": "chapter-014",
      "title": "故人",
      "summary": "宋怀瑾出场。前世挚友以天枢宗丹药堂弟子的身份出现在苍梧域。沈玄面临第一个道德抉择：是否利用前世记忆操纵宋怀瑾？叶清漪对宋怀瑾表现出本能的警觉，这让沈玄重新审视前世对宋怀瑾'背叛'的判断。"
    },
    {
      "chapterId": "chapter-015",
      "title": "信任与试探",
      "summary": "宋怀瑾与沈玄的初次交流。沈玄刻意以陌生身份接触，却发现宋怀瑾对他的态度异常友好——甚至有一种直觉式的亲近感。宋怀瑾提到顾长渊最近在寻找一个特殊体质的年轻人，沈玄意识到顾长渊的搜索范围在扩大。叶清漪在一旁冷眼观察两人的互动。"
    },
    {
      "chapterId": "chapter-016",
      "title": "镜像",
      "summary": "沈玄通过宋怀瑾获取了天枢宗内部的情报。他发现一个前世从未出现的现象：天枢宗的阵法堂弟子接连失踪，与顾长渊的吞噬秘术有关。沈玄开始重新评估顾长渊——前世他只是针对归墟体，这一世他似乎已经失控。镜像比喻：沈玄看到的是一个如果自己没有重生、顾长渊无人制衡后的未来。"
    },
    {
      "chapterId": "chapter-017",
      "title": "猎手现身",
      "summary": "第二卷高潮。顾长渊的探子暴露，正面冲突。沈玄在战斗中被迫使用归墟体的部分能力，暴露了自己。顾长渊通过探子传回的消息确认归墟体持有者还活着且已变强。猎人与猎物的身份开始反转——但白九殇的阴影也开始显现。"
    },
    {
      "chapterId": "chapter-018",
      "title": "摊牌",
      "summary": "第三卷开篇。顾长渊亲自出手，通过归墟域封印的力量锁定沈玄的位置。沈玄被逼入绝境，不得不暴露归墟体的全部能力应战。这一战震惊了苍梧域所有宗门——归墟体的传说重新浮出水面。叶清漪和宋怀瑾都亲眼目睹了沈玄的真正力量。"
    },
    {
      "chapterId": "chapter-019",
      "title": "天枢旧事",
      "summary": "沈玄深入调查天枢宗往事。通过宋怀瑾的帮助，他获得了顾长渊修炼室的阵法图纸，发现顾长渊的阵法核心直接连接归墟域封印——白九殇并非被封印的囚犯，而是主动选择留在归墟域以积蓄力量。顾长渊以为自己在利用白九殇，实际上从第一天起就是傀儡。"
    },
    {
      "chapterId": "chapter-020",
      "title": "归墟体觉醒",
      "summary": "归墟体全面觉醒。封印碎片的共鸣激活了沈玄归墟体的深层能力——他可以感知归墟域的状况，甚至短暂窥视白九殇的意图。在感知中他看到了叶清漪的真相：她的血脉与归墟域有关，她是前代封印守护者的后裔。这正是她前世不在这个时间线的原因——前代守护者家族被白九殇提前灭绝了。"
    },
    {
      "chapterId": "chapter-021",
      "title": "白九殇",
      "summary": "白九殇首次正面登场。它以意念投影出现在沈玄面前，揭示它早已感知到时间线的异常——沈玄的重生不是偶然，而是归墟域封印松动时产生的回响。白九殇提出交易：它可以帮助沈玄对付顾长渊，条件是沈玄在最终之战中打开归墟域。沈玄拒绝，但这个提议在他心中种下了疑问。"
    },
    {
      "chapterId": "chapter-022",
      "title": "宋怀瑾的选择",
