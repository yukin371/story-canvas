          "sceneGoals": [
            "林舟蹲在旧书铺后屋的工作台前，指尖被潮气泡得发白。今晚送来的旧账簿比往常更沉，封皮像是浸过海水，翻开第一页时却没有霉味，",
            "他把铜纽扣和账簿一并塞进防水布袋，沿着积水巷子赶去旧六码头。仓库门口挂着褪色的封条，封条中央却被人用香灰画了一枚歪斜的记"
          ]
        },
