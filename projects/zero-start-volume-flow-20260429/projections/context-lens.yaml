            "高潮：最终对决 / 真相揭露"
          ],
          "sceneGoals": [
            "仓库里堆满发潮木箱，最里面那盏小灯只照出半张女人侧脸。林舟没有立刻往前走，他先把账簿贴到胸口，逼自己去听周围的水声和脚步",
            "半小时后，林舟带着湿透的仓单回到铺子后屋。旧账簿摊在桌上，最后一页又多出一串陌生名字，最末那个却被墨团硬生生抹去，只剩下"
          ]
        },
