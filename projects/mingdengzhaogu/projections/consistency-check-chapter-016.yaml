    "chapterContent": "# 第十六章 养息腹\n\n“别应。”\n\n那两个字落进缝道后，竟没有立刻散。\n\n像贴在湿冷石壁上，一路往前引。\n\n@{沈照}先是一紧。\n\n紧跟着，胸口那盏小铜灯又沉沉跳了一下。\n\n不是催他快。\n\n倒像在应那句话。\n\n身后脚步与索响同时逼近。\n\n上头落环的人已经进了作业位。\n\n下头翻板的人也在往上抢。\n\n这条检索缝若真有尽头，他们最多只比后头那两拨人多几息。\n\n“前面有人。”沈照压低声音。\n\n“也可能不是人。”@{岳怀川}贴着石缝往前探了一下，“先走。别在这儿停。”\n\n缝道比作业环后头那扇窄门更难挤。\n\n两边石壁潮得发黏。\n\n中间还不时横出一段生满白毛的旧膏槽。\n\n槽不深。\n\n却每隔几步就往外渗一丝冷凉的湿意。\n\n沈照手背不小心擦到一次，整条小臂都起了一层细栗。\n\n不是冷。\n\n是麻。\n\n像那点湿意里掺着什么认骨的东西，正沿皮往里找路。\n\n他立刻把手缩回来。\n\n怀里那副从回板作业环上顺来的小皮套却在这时轻轻一热。\n\n热意不猛。\n\n却刚好把那层麻意压住了。\n\n“这皮套能挡。”沈照低声道。\n\n“什么意思？”\n\n“缝里这些白膏认人。”他把那副小皮套塞到臂弯外侧，果然那股湿麻立刻淡了几分，“它把我当成候承位上的东西了。”\n\n岳怀川回头看了他一眼。\n\n眸光很冷。\n\n冷里却有一瞬极短的停顿。\n\n“那就拿它开路。”他说。\n\n两人继续往里时，缝道开始缓缓往下倾。\n\n坡不陡。\n\n可脚下全是久年累月被人踩出来的滑槽。\n\n不像逃生暗道。\n\n更像给巡锁、补膏、换索的人专门留的背身小路。\n\n走到第七步，前头忽然窄得只剩半肩宽。\n\n岳怀川停了。\n\n不是路没了。\n\n是石缝中间，多出一块横卡出来的白骨门栓。\n\n说是骨，其实更像一截被膏与铜一起封成的半圆扣。\n\n正嵌在一扇内推式的小门前。\n\n门缝极细。\n\n边上却刻着两行几乎被膏磨平的小字：\n\n`巡锁`\n\n`候承免入`\n\n沈照心里微微一沉。\n\n候承免入。\n\n也就是说，凡是被这地方认成“候承”的东西，反而进不去。\n\n身后忽然传来一声短促的铁钩擦壁。\n\n离得已经不远。\n\n上头那拨人先追进来了。\n\n岳怀川抬手就去试那枚骨门栓。\n\n没动。\n\n他手上再加半分力，门栓里立刻传出极轻的一声嗡鸣。\n\n像底下还连着某种细簧。\n\n“不能硬掰。”他低声道，“会惊里面。”\n\n沈照盯着那两行字看了一息，忽然把臂弯上的小皮套摘了下来。\n\n“既然候承免入，那就得先让它认不出我。”\n\n“你想怎么做？”\n\n“它认的是白痕，不一定认的是人。”沈照抬起左手，把那道已经发暗的白痕按进皮套内层，“若我把它先包进去，再去碰门栓，或许它会把我当成死物、工具，或者一副还没上人身的壳。”\n\n岳怀川没说行，也没说不行。\n\n只把裂灯压低，替他照住那枚门栓。\n\n“快。”\n\n沈照吸了口气。\n\n把小皮套一圈圈缠上左掌。\n\n内里的细铜丝一贴到白痕，便像活了一样微微一缩。\n\n不疼。\n\n却勒得骨缝发紧。\n\n像真有一层旧规矩顺着那道白痕，重新套回了他手上。\n\n他强压住那股不适，把包着皮套的左手按到门栓中央。\n\n一瞬间，门后有极轻的一声“咔”。\n\n不是拒。\n\n是松。\n\n“成了。”沈照嗓子有些发干。\n\n岳怀川当机立断，肩头一顶。\n\n小门向内滑开半尺。\n\n一道比缝道更冷的白气立刻从里头扑了出来。\n\n不是腥。\n\n也不是膏。\n\n是很多口被硬压住的呼吸，长年积在看不见天的地方，闷出来的冷。\n\n门后依旧不宽。\n\n却不再只是石缝。\n\n而是一段嵌着铜肋的长廊。\n\n廊顶极低。\n\n两侧每隔三步便有一盏细腰白罩灯。\n\n灯没全亮。\n\n有的只剩一线豆火。\n\n有的早已熄成灰壳。\n\n可就是这点残光，已足够让人看清廊壁上那一排排密密的铜牌位。\n\n每一块位前都嵌着一只极小的透气孔。\n\n孔边有号。\n\n也有字。\n\n`一候停`\n\n`三候断`\n\n`七候转井`\n\n再往里，还有一块最旧、也最暗的：\n\n`二候暂空`\n\n沈照脚下一顿。\n\n不是认错。\n\n是那块牌位旁边，正垂着一道已经干硬发白的旧绳圈。\n\n绳圈大小，刚够套住一个少年的腕骨。\n\n他脑中蓦地一震。\n\n同一刻，耳边那句“别应二”又从更远处轰地顶了回来。\n\n不是回想。\n\n是像这条廊本身，还留着那一夜的余音。\n\n“别看太久。”岳怀川低喝。\n\n“它在勾你。”\n\n沈照猛地回神。\n\n才发现不知什么时候，廊壁那块`二候暂空`的铜牌位竟隐隐发出了一层很淡的白。\n\n不是自己亮的。\n\n是顺着他掌心皮套底下那道白痕牵起来的。\n\n再慢一息，怕是整条廊都要认出他来。\n\n“往前。”岳怀川抬手一抹，把裂灯从那块牌位边缘掠过去。\n\n白火不大。\n\n却足够把那层刚起的微白烧灭。\n\n两人不再停，顺着长廊继续深入。\n\n越往里，廊中那股冷白的呼吸感越重。\n\n到第十二盏灯下，地势忽然一折。\n\n前方不再是直廊。\n\n而是一座半圆下沉的小腹室。\n\n腹室中央凿着一方低池。\n\n池里不是水。\n\n是稀得发亮的白膏。\n\n膏面很平。\n\n平得像镜。\n\n可镜下又不时鼓起一个极小的气泡。\n\n咕地一声。\n\n再悄悄沉回去。\n\n像池底不是死物。\n\n而是许多被白膏压着、只能隔一阵换一口气的东西。\n\n池边竖着七架铜骨架。\n\n有三架空着。\n\n有两架已经塌了。\n\n只剩扭曲的铜臂埋在白膏里。\n\n还有两架上头，竟真吊着东西。\n\n不是整人。\n\n更像用膏、铜丝、细索和皮套拼起来的半身息壳。\n\n一架只剩胸腔以上。\n\n另一架则留着腰肋和一条右臂。\n\n都被白膏封得严严实实。\n\n唯有靠近喉口的位置，留着一枚指甲大的透息孔。\n\n孔里偶尔会冒出一丝极淡的白。\n\n再很快散掉。\n\n沈照喉结滚了滚。\n\n这才是养息腹。\n\n井上那些续息龛、换膏井间、回板作业环，都只是它的外皮。\n\n真正被留在底下、被拆成一段段“活段”的东西，全在这里。\n\n“别出声。”\n\n那道比气更轻的声音，忽然又响了。\n\n这次近得多。\n\n而且不再像从远处飘来。\n\n更像就在池后某个看不见的窄格里，有人贴着铜壁在说。\n\n沈照下意识朝池后望去。\n\n却只看见一排半掩着的白帘。\n\n帘后黑黢黢的。\n\n什么都看不清。\n\n岳怀川显然也听见了。\n\n他眼皮微沉，裂灯往帘后一压。\n\n火刚亮起，白帘里头便忽然伸出一只手。\n\n不是抓。\n\n是把帘角轻轻往下按了按。\n\n示意他们灭灯。\n\n那只手瘦得可怕。\n\n皮色发蜡。\n\n手背上还爬着几道细细的铜线。\n\n像也是长期拿来接膏、压息的人。\n\n可那只手的中指指根处，却清清楚楚缺了一块旧甲。\n\n是活人手。\n\n岳怀川先灭了火。\n\n帘后静了两息，才有人慢慢开口。\n\n“再照，池会醒。”\n\n嗓子很轻。\n\n轻得分不清男女。\n\n可比作业环上那守井人的声音要稳得多。\n\n不像将死。\n\n倒像已经在这里活了太久，早把该掉的气都掉干净了。\n\n“你是谁？”岳怀川问。\n\n帘后那人没立刻答。\n\n先是咳了一声。\n\n很闷。\n\n像胸里也堵着膏。\n\n“你们要是来找丁井昨夜那块活段，就别在池边问闲话。”那人道，“井上追的人快摸到巡锁门了，井下回板的人也会顺验空槽来。想活，就先把手从白痕上移开。”\n\n沈照这才发现，自己左掌那道白痕不知何时又在皮套底下发起热来。\n\n热意正顺着手背，一点点往那方白膏池里滴。\n\n不是血。\n\n是白。\n\n很淡。\n\n可每滴下一丝，池里便会鼓出一个更大的泡。\n\n咕。\n\n咕。\n\n像底下真有什么东西在借他的白痕喘气。\n\n他立刻把手抬起。\n\n热意却没散。\n\n反而顺着皮套里的铜丝，往他腕骨更深处勒进去。\n\n“拆了它。”帘后那人又说。\n\n“再不拆，你就成池里的记号了。”\n\n沈照咬牙，去扯那副小皮套。\n\n一扯，铜丝却先收紧。\n\n勒得掌骨咯吱一响。\n\n他闷哼一声，额角顿时起了汗。\n\n岳怀川伸手来帮。\n\n可他手指刚碰到皮套边缘，皮套里那圈细铜丝便嗤地冒出一线白烟。\n\n像这东西只认一个人。\n\n认上了，就不许旁人碰。\n\n“别硬拉。”帘后的人低声道，“把它扣进池右第三架的断臂扣上。”\n\n“为什么？”\n\n“因为那本就是一号旧壳拆下来的副套。”那人顿了顿，“它认的是同一口灯留下的烧纹，不是你这只手。”\n\n一号。\n\n沈照心里猛地一震。\n\n“你见过他？”\n\n“见过他被吊进来。”帘后那人道，“也见过他自己把副套扯断，硬往承灯架上撞。”\n\n这话一出，连岳怀川都静了一瞬。\n\n第十五章里那截残忆只是影。\n\n这一次，却有人把影补成了实。\n\n“为什么？”沈照声音发紧。\n\n帘后那人轻轻吐出一口气。\n\n“因为那夜有人在井上点二。”\n\n“因为再迟一息，被记成候承的就不是他。”\n\n“是你。”\n\n腹室里一下安得只剩白膏池底冒泡的细响。\n\n沈照指尖微微发凉。\n\n不是突然知道了一号替他挡过一次。\n\n是突然知道，这桩事在底下居然还有旁证。\n\n也就是说，当年那一夜并不只是旧忆里模糊的一撞。\n\n这里真的有人看见过。\n\n“你到底是谁？”岳怀川再问了一遍。\n\n帘后那人这次没有回避。\n\n“巡缝的。”\n\n“以前在丁井下给养息腹补锁、裁副套、抹白膏。”\n\n“后来知道得太多，主印嫌我碍眼，索性把我也留在腹里，让我替这些半断不断的东西看息。”\n\n“名字呢？”\n\n“名字留在册上有什么用？”那人淡淡道，“这里的人，早就不靠名字活了。”\n\n沈照没再追着问。\n\n因为左手那副小皮套已经勒得越来越紧。\n\n再不按对方说的做，他这只手怕真要被这副旧套认成“候承”。\n\n他按着对方所指，快步绕到右侧第三架铜骨旁。\n\n这一架断得最狠。\n\n只剩半截右臂与一圈肩扣还挂着。\n\n肩扣边缘，果然有一道与皮套相合的凹槽。\n\n沈照把左掌往上一按。\n\n皮套里的细铜丝立刻像寻到旧位一样，咔地松了。\n\n整副副套滑进肩扣。\n\n那股一路勒着他的热，也随之猛地退走。\n\n可退走的同时，一段比作业环上更完整的画面忽然撞进他脑中。\n\n还是这座腹室。\n\n还是这方白膏池。\n\n只不过那时七架铜骨全亮着。\n\n池边站着三个穿黑袖的人。\n\n最中间那人手里提着点名簿。\n\n簿上只写号，不写名。\n\n“一候接灯。”\n\n“二候备应。”\n\n声音刚落，池边那道瘦高背影就动了。\n\n不是慢慢走。\n\n是一步撞出去。\n\n撞之前，他甚至连头都没回。\n\n只很轻、很快地朝旁边说了一句：\n\n“别应。”\n\n那句“别应”，不是空声。\n\n就是一号说的。\n\n而更让沈照心口发紧的是，背影旁边那个被按住的瘦小影子，肩骨形状、脖颈弧度，竟真与他自己少年时记忆里模糊的轮廓对得上。\n\n不是怀疑。\n\n是对上。\n\n沈照呼吸一下乱了。\n\n眼前也跟着晃了晃。\n\n“看见了什么？”岳怀川立刻扶住他。\n\n“他不是被拖上去的。”沈照哑声道，“他知道点二的人是谁，也知道被按住的是谁。”\n\n“他自己撞上的承灯位。”\n\n帘后那人沉默了两息，才低声道：\n\n“终于想起来一点了？”\n\n“你还知道什么？”沈照猛地抬头。\n\n白帘之后，那人似乎轻轻挪了挪身子。\n\n帘角下压出一点很浅的影。\n\n“我知道那夜点名簿上，本来没有你。”\n\n“我也知道，一号撞上承灯位前，簿上另有一个名字，被人临时抹了。”\n\n另一个名字。\n\n这正撞上第十三章里续息龛残忆留下的那道刺。\n\n沈照心底那根线一下绷紧。\n\n他还想再问，巡锁门外却骤然传来一声极轻的铜片碰击。\n\n不是误触。\n\n是有人在试门。\n\n上头那拨追兵果然到了。\n\n而几乎同一刻，腹室另一头也缓缓响起另一种声音。\n\n咔。\n\n咔。\n\n像验空槽下的回索已经转进养息腹底部，正有人沿着更深那条明路往上开锁。\n\n两头再一次合了。\n\n“这里守不住。”岳怀川立刻判断。\n\n“有后路吗？”\n\n帘后那人像是早料到会问这一句。\n\n“有。”\n\n“池后帘里不是我住的格，是旧巡缝道。”\n\n“顺那条道走，可以摸到主息槽背面。”\n\n“主息槽后有一间旧记签库，里面锁着历年候承副套和转名残签。”\n\n“一号那夜被抹掉的东西，若还剩，也只可能剩在那儿。”\n\n沈照心口一动。\n\n这不是小线索。\n\n是能直接把“另一个名字”往前推一步的真东西。\n\n“代价呢？”岳怀川问得很直。\n\n帘后那人竟轻轻笑了一声。\n\n笑意很淡。\n\n也很冷。\n\n“代价是主息槽比这池子更认白痕。”\n\n“他若进去，就得一路忍着不应。”\n\n“凡有点名、有旧声、有承灯位来认，都不能应。”\n\n“一应，槽会把他当回来的人。”\n\n沈照还没说话，巡锁门外已经传来第二次试簧声。\n\n这一次，比方才更深。\n\n门栓后那枚半圆骨扣都跟着轻轻一震。\n\n最多三四息，外头的人就会明白这门有人刚开过。\n\n“没时间了。”岳怀川道，“带路。”\n\n帘后那人没动。\n\n却有一小团东西从帘底滚了出来。\n\n落在白膏池边，发出很轻的一声叩。\n\n是一枚拇指大的灰白骨哨。\n\n哨身很旧。\n\n末端却新磨过。\n\n“主息槽口若起名响，就吹一下。”那人道，“不是为了压声，是为了乱它一拍。它一乱，你就还有机会不应。”\n\n沈照把骨哨捡起来。\n\n骨面冰得像刚从灰井底捞出。\n\n可贴进掌心时，那股寒意反倒让他脑子更清了一点。\n\n“你不跟我们走？”他忍不住问。\n\n帘后那人静了静。\n\n“我走不了。”\n\n“我身上那几条巡缝铜线，另一头全钉在池后锁梁里。”\n\n“离了这里，半刻都活不成。”\n\n这话说得平。\n\n平得像在说一截用旧的麻绳。\n\n可就在这时，白帘里头忽然透出一缕很淡的血腥。\n\n不是新伤。\n\n倒像许多年没完全长好的旧裂口，被潮气一蒸，又慢慢渗出来了。\n\n沈照眼底一沉。\n\n他忽然明白，这人不是不能走。\n\n而是早就被这里改成了“巡缝的一部分”。\n\n“以后再救你。”他脱口而出。\n\n帘后那人像是怔了怔。\n\n片刻后，才极轻地回了一句：\n\n“先救你自己吧，二号。”\n\n这两个字刚落，巡锁门外猛地传来第三声簧响。\n\n紧跟着，门后便有一道压得极低的嗓音传进来：\n\n“里面有人动过副套。”\n\n“白池也醒了。”\n\n“把门拆开。”\n\n上头到了。\n\n而腹室另一头，那条通往更深处的明路上也同时响起一串越来越近的短索击铜声。\n\n井下的人也到了。\n\n岳怀川不再迟疑，一把掀开池后白帘。\n\n帘后果然不是藏人的床格。\n\n而是一条比检索缝还低的旧巡缝道。\n\n道口下沿嵌着密密一排白骨卡齿。\n\n像不是给人走的。\n\n而是给拖着工具匣、膏桶、旧副套的人匍匐进出的。\n\n缝道最深处，隐约真有一点更纯、更冷的白。\n\n不是灯。\n\n像一口被藏在更深腹中的大息，正一呼一吸，缓得近乎没有活气。\n\n“走。”岳怀川先把裂灯塞进前头。\n\n沈照跟上前，正要钻入缝道，白膏池里忽然咕地冒出一个比先前都大的泡。\n\n泡破开的瞬间，池底竟浮起一小片黑影。\n\n黑影不大。\n\n像是一角被压在膏底多年的旧纸签。\n\n可还没等他看清，上头巡锁门便轰地震了一下。\n\n有人在外头直接砸门了。\n\n沈照只来得及把那片黑影的位置死死记在心里，便被岳怀川一把拽进白帘后头。\n\n缝道窄得只能伏身前进。\n\n骨哨被他咬在齿间。\n\n小铜灯压在肋下。\n\n怀里的候承残签和那副认灯皮套隔着衣料一冷一热，像两只都还没死透的东西。\n\n身后很快传来门栓崩开的闷响。\n\n还有人压着火气喝问：\n\n“池后呢？”\n\n“白帘动过！”\n\n“追进去！”\n\n追声一到，巡缝道里的白意立刻像被惊醒一般，顺着石腹深处一层层往前涌。\n\n不是风。\n\n倒像许多口积了很多年的呼吸，同时朝他们这边翻了一次身。\n\n沈照头皮微微发麻。\n\n因为在那一层层白意翻涌里，他竟真听见了点名。\n\n很轻。\n\n很远。\n\n却一声比一声准。\n\n“一候……”\n\n“二候……”\n\n“二候……应……”\n\n那个“应”字才起，沈照掌心的旧烧纹便猛地一烫。\n\n几乎是本能，他喉头便绷了一下。\n\n像身体深处真有某个被埋了十二年的习惯，要替他把那一声答出去。\n\n就在这一瞬，齿间那枚骨哨忽地凉得发刺。\n\n他脑中猛地掠过作业环下那只从白膏里探出的半截手指，和旧忆里那句更早的：\n\n别应。\n\n沈照狠狠咬住骨哨，喉结硬生生往下一压。\n\n没有出声。\n\n前头的岳怀川像是察觉到他那一下停顿，头也没回，只低低说了一句：\n\n“忍住。”\n\n沈照额上冷汗一下就下来了。\n\n不是因为疼。\n\n是因为他突然明白，对方根本不需要把他拖回去。\n\n只要让他在这条主息槽背后的缝道里，应上一声。\n\n这座井、这座腹、这整套候承旧规，就会自己把他认回去。\n\n而缝道最深处，那点一呼一吸的冷白，也在这一刻更清楚地亮了一下。\n\n像真有什么东西，在更里面听见了这场点名，却也还在替他一起忍着不应。\n",
    "outlineExpectation": "沈照与岳怀川钻入养息腹后的旧巡缝道与白池腹室，第一次看清“候承”不只是井上转灯流程，而是一整套会借白痕、旧规和点名把人认回册里的地下系统。章中既要让巡缝人补出一号主动撞位替沈照挡过一次“应二”的旁证，也要把主息槽的危险立住：更深处不仅藏着被抹掉的旧名残签，还会主动点名逼沈照自己答那一声。章尾要把钩子推进主息槽背后，形成“只要应一声就会被整座旧规认回去”的更强压迫。 "
  },
