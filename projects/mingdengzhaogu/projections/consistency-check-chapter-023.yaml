    "chapterContent": "# 第二十三章 欠目未偿\n\n灰背仓那头，梁上递线女人最后一把抹灰的动静，还像钝刀一样刮在耳后。\n\n她替他们留在了后面。\n\n净页火也是。\n\n追兵也是。\n\n而他们从灰背乙四里硬抠出来的那点旧账线头，最后只把他们逼到了东三。\n\n两枚旧铜扣还在沈照掌心发烫。\n\n烫得像刚从另一个人的命里抢出来。\n\n第三道断栏后头，就是上一瞬先亮起来的那一笔白。\n\n后头灰背滑道里，净页火正顺着追兵脚步往上逼。\n\n旧漆味也被这股火一点点烤出来了。\n\n很苦。\n\n像木头被灰捂久了以后，自己闷出来的苦。\n\n那一点先亮起来的白，就悬在这股苦味里。\n\n像有人正贴着黑里，一寸一寸，把某个字的第一笔慢慢描出来。\n\n@{沈照}胸前那片页芯几乎要顶破衣料。\n\n烫得不像纸。\n\n更像一口正认出旧主的火。\n\n“别看太久！”\n\n一号声音发紧。\n\n“那不是给你看的。”\n\n前头@{岳怀川}已经先一步越过第一道断栏。\n\n第二道断栏果然是死的。\n\n栏后石面塌进去半截。\n\n下面黑得不见底。\n\n若方才顺手上了第二道，人和东西都得一起掉下去。\n\n而第三道断栏后，是一条更窄的横廊。\n\n廊顶很低。\n\n两边全是发黑的灰板。\n\n板缝里嵌着一层旧得发亮的细灰。\n\n像有人很多年都在这里开匣、抹匣、再把痕迹一点一点按回去。\n\n那笔白，就在横廊尽头。\n\n尽头嵌着一只半人高的窄匣。\n\n匣体比灰背乙四更细。\n\n也更长。\n\n匣门外头已经被人掀开了一层。\n\n薄薄一层假板斜挂着。\n\n板后露出一片乌黑匣面。\n\n匣面中央，本该空着的位置，此刻却浮着那一道细白。\n\n它不是写在木上。\n\n像是从木头深处自己渗出来。\n\n一上一下轻轻颤。\n\n仿佛只差第二笔，就能把整道姓认全。\n\n匣前果然有人。\n\n那人背朝他们，半蹲在地。\n\n身上穿着一件洗不出底色的短褂。\n\n袖口和后背都粘着灰。\n\n左肩却有一大片被火燎过的卷边。\n\n他右手里拈着一根极细的黑签。\n\n签头发白。\n\n像被净页火烤过。\n\n另一只手则死死按在匣侧。\n\n掌缝间压着一道淡得发青的旧灰印。\n\n一号刚看清那支黑签，眼神就变了。\n\n“收笔役……”\n\n那人没回头。\n\n却像早知道他们会来。\n\n“我还当，先下来的会是司里那两位。”\n\n他嗓子很干。\n\n干得像砂纸在磨木。\n\n“没想到，是你们先折到东三。”\n\n岳怀川裂灯抬平。\n\n白意直压到那人后颈。\n\n“把手挪开。”\n\n那人终于偏了一下头。\n\n只露出半张侧脸。\n\n脸瘦得厉害。\n\n眼眶周围全是被灰熏出来的深色。\n\n可嘴角竟还吊着一点笑。\n\n“现在挪，太晚了。”\n\n“第一笔已经认火。”\n\n“再过一会儿，它自己就会往该认的人身上走。”\n\n沈照胸口猛地一抽。\n\n那道笔白仿佛真听得懂这句话。\n\n在黑匣面上轻轻一颤。\n\n随即朝他这边偏了一线。\n\n不是光在动。\n\n是认。\n\n认得极快。\n\n像它在地下等了很多年，终于等来一个还没来得及躲开的人。\n\n“别让页芯冲它！”\n\n一号几乎是吼出来的。\n\n“它先认的是尾，不是你！”\n\n这句话太急。\n\n也太重。\n\n重得沈照背后一下起了冷汗。\n\n他刚压住胸口那点往前扑的冲动，匣前那人却忽然把黑签往匣面上一挑。\n\n那道细白一下亮了半分。\n\n横廊里原本死着的旧漆味，顿时被一股发焦的纸味顶了出来。\n\n像有什么藏了多年的旧字，正在里头被火慢慢逼醒。\n\n“你们不是要找欠目么？”\n\n那人盯着匣子。\n\n“欠目就在里头。”\n\n“可没这一笔，你们谁也看不见。”\n\n岳怀川不跟他废话。\n\n人一步已经切过去。\n\n裂灯白意顺着横廊压成一线。\n\n直劈那人手里的黑签。\n\n那人早有防备。\n\n手腕一翻，黑签没收，反而斜斜一挑。\n\n匣侧那道旧灰印被他一并扯起半寸。\n\n只这半寸，匣面那道细白便像受了惊，猛地朝外一窜。\n\n不是朝他。\n\n而是朝沈照。\n\n沈照眼前一白。\n\n不是灯照。\n\n是某种更熟的、从胸口里直接翻上来的错觉。\n\n像有人在很多年前，也这样把一笔字硬推到他跟前，逼他伸手，逼他应，逼他活。\n\n“沈照！”\n\n岳怀川一声喝，把他从那一下空白里拽回来。\n\n沈照咬牙后退半步。\n\n不退不行。\n\n那一笔冲来的力道太真。\n\n真得像再近半寸，就会直接落进他掌心白痕里。\n\n一号已经拖着伤腿扑到断栏边。\n\n他没法快。\n\n可眼里的急一点不比他们少。\n\n“别让他开第二层！”\n\n“他不是来翻账的，他是来补账的！”\n\n匣前那人终于笑出一声。\n\n“补账有什么不好？”\n\n“十二年前没补完的东西，总得有人替它补完。”\n\n他说到“十二年”这三个字时，沈照心口狠狠一缩。\n\n这人知道。\n\n知道得不止一点。\n\n岳怀川已经逼到他身前。\n\n两人隔着窄匣短兵相接。\n\n裂灯去截黑签。\n\n黑签却不跟灯硬碰。\n\n每一挑、每一压，都绕着匣面那道细白打转。\n\n像他不是在跟岳怀川打。\n\n而是在借岳怀川的灯，继续把那一笔逼亮。\n\n“他在借白意催姓笔！”\n\n一号脸都白了。\n\n“灯别贴匣面！”\n\n岳怀川反应极快。\n\n灯锋立刻收斜。\n\n可就这么一收，那人掌下的灰印已被他抽了出来。\n\n灰印离匣的一瞬，黑匣底下竟传出一声极细的簧响。\n\n像有哪道卡着的旧门，真被他撬松了。\n\n“糟了。”\n\n一号喉咙一下发哑。\n\n“他把第一层认活了。”\n\n那人往后疾退。\n\n退的不是来路。\n\n而是匣侧更黑的一道夹缝。\n\n夹缝窄得像死路。\n\n他却显然熟。\n\n半个肩一缩，人已经斜进去。\n\n“别追！”\n\n一号立刻喝住。\n\n“他就是要你们离匣！”\n\n岳怀川硬生生停了脚。\n\n沈照也没动。\n\n不是他听话。\n\n而是那道细白已经完全不稳了。\n\n它浮在匣面上。\n\n比方才更亮。\n\n也更近。\n\n像刚才那一下撬动，已经把它从匣里真正放出来半步。\n\n只差最后一点东西，就会认到活人身上。\n\n后头灰背滑道里，也在这时传来杂乱脚步。\n\n不止一拨。\n\n有人下来了。\n\n还带着火。\n\n一阵阵焦硬的热气顺着断栏那头往这里顶。\n\n把整条横廊都烤得发干。\n\n“没空等了。”\n\n岳怀川回身看匣。\n\n“怎么拆？”\n\n一号撑着断栏喘了两口。\n\n再抬头时，眼底那点旧伤似乎也被逼出来了。\n\n“先把假门压回去。”\n\n“别让第一层继续见火。”\n\n“再用签头找背缝。”\n\n“别碰那一笔。”\n\n“它现在就是钩。”\n\n沈照已经把袖里的那截烧黑签头摸出来。\n\n签头一离袖，胸口的页芯便又烫了一下。\n\n像两样旧东西彼此认出了根脚。\n\n他没有先上。\n\n反而盯住一号。\n\n“你早知道欠目不是空话。”\n\n一号喉结滚了滚。\n\n“我知道有欠。”\n\n“不知道欠得这样细。”\n\n“也不知道他们还真留了东三。”\n\n这不是全话。\n\n沈照听得出来。\n\n可现在也不是把全话逼出来的时候。\n\n后头脚步越来越近。\n\n再慢一息，顺灰背滑道压下来的净页火就会先漫过第三道断栏。\n\n横廊深处那道夹缝里，还隐约传来极细的磨木声。\n\n那收笔役没走远。\n\n他只是退到看不见的地方，等他们自己把该开的开完。\n\n等后头那拨人替他把他们的退路一寸寸烧死。\n\n岳怀川已把先前被掀开的那层假板重新按回匣外。\n\n板一压上去，那股直往人胸口钻的认姓冲力顿时缓了半分。\n\n可没有消失。\n\n反而变得更阴。\n\n像隔着一层板，在后头静静等。\n\n“中缝在下。”\n\n一号盯着匣底。\n\n“别找面。”\n\n“找背。”\n\n沈照蹲下去。\n\n匣底与墙之间果然留着一道极窄的缝。\n\n缝里不是灰。\n\n是黑得发亮的旧漆。\n\n签头刚一贴近，那道缝里竟有极淡的凉意冒上来。\n\n不是风。\n\n更像某种很多年都没见过生人的纸意。\n\n“左二，右一。”\n\n一号声音极低。\n\n“先把签头压住。”\n\n“再让两枚旧扣一上一下卡住。”\n\n“最后……”\n\n他说到这里，停了一下。\n\n沈照抬眼看他。\n\n一号眼底那点犹疑很快沉下去。\n\n“最后得用你的白痕。”\n\n“可不是去写。”\n\n“是去拦。”\n\n拦。\n\n这个字让沈照心里那根线猛地抽了一下。\n\n先前所有人都在叫他认。\n\n总簿认。\n\n真页认。\n\n页芯认。\n\n现在头一次，有人叫他拦。\n\n不是顺那张早就铺好的旧路往前走。\n\n而是顶住它。\n\n他没再问。\n\n按一号说的，先把签头斜斜塞进背缝左二。\n\n再将两枚旧扣一上一下卡进匣侧暗槽。\n\n旧扣一入槽，匣里立刻传出三下极轻的撞响。\n\n像有什么薄片，在背里自行让了位。\n\n岳怀川也在这时把裂灯压低。\n\n灯不照面。\n\n只照沈照手下那道背缝。\n\n白意一落，匣底那层黑漆里慢慢浮出一道几乎看不见的灰线。\n\n线不直。\n\n像谁当年匆匆补上去的一刀。\n\n“就是它。”\n\n一号声音更哑。\n\n“把白痕压上去。”\n\n沈照掌心发热。\n\n那不是白痕自己热。\n\n是胸前页芯隔着衣料，一下一下地往掌里顶。\n\n它想要的，显然不是拦。\n\n而是写。\n\n他咬住牙，把手按了上去。\n\n白痕贴到灰线的一瞬，掌心顿时一麻。\n\n像有根极细的针，从旧伤里直刺进去。\n\n不深。\n\n却准。\n\n准得像这道缝，本来就等着这一块白痕。\n\n匣后随即“咔”地一声。\n\n不是匣面开。\n\n是整个窄匣往外弹出半寸。\n\n岳怀川立刻上手。\n\n不去掀前门。\n\n而是顺着那半寸，把整只东三匣往右硬拽。\n\n墙里居然还有一层。\n\n匣只是壳。\n\n壳后头贴墙藏着一只更薄的暗格。\n\n暗格里没有那道先亮起来的白。\n\n有的只有一卷卷得极紧的灰纸，和一块被削去半面的旧木牌。\n\n木牌边角留着焦痕。\n\n一眼就能看出，是从更大的名牌上硬掰下来的。\n\n一号看见那块牌，肩背一下绷死。\n\n“果然是撞位留尾……”\n\n沈照先没理他。\n\n他抽出那卷灰纸。\n\n纸太久没见风。\n\n一开卷，便有一股很淡的陈血味冒出来。\n\n混着旧墨、灰和潮木，直往鼻腔里钻。\n\n这一股味，比什么字都更先把人拽进十二年前。\n\n灰纸上头第一行，不是账。\n\n是旧栏：\n\n`抹名东三欠目录`\n\n再下一行：\n\n`照生尾留`\n\n`沈姓暂押`\n\n沈照指节一下收紧。\n\n再往下，是一行写得更仓促的细字：\n\n`撞位活一，押名代欠`\n\n横廊里一瞬静得只剩后头逼近的脚步。\n\n脚步已经不只在断栏那一头了。\n\n最前头那人的灯壳，甚至磕在石面上，发出一下急得发脆的响。\n\n连岳怀川都没立刻说话。\n\n一号闭了闭眼。\n\n像这行字并不出乎他意料。\n\n却还是比他愿意承认的，更重一点。\n\n沈照盯着那八个字。\n\n每个都认得。\n\n排在一起，却像突然长出了一层新牙。\n\n把他这些年从没想清楚过的东西，一口咬穿。\n\n撞位，不是随便换个位。\n\n是有人把他硬撞进了另一个本该死的位置。\n\n活一个。\n\n押名代欠。\n\n也就是说，当年确实有人替他压过这一笔债。\n\n不是让债没了。\n\n而是先把它揽走。\n\n再往下，是更细一栏：\n\n`应二不归原簿`\n\n`欠目随押名行`\n\n最后一行却被人撕去半截。\n\n只剩一个模糊的旧姓头。\n\n不是整字。\n\n只剩最先那一笔。\n\n正是方才匣面上自己亮起来的那一笔。\n\n沈照看着那一点残笔，胸口页芯突然又往上狠狠一顶。\n\n像它终于认准了什么。\n\n不是认沈照。\n\n而是认这道被撕去的押名。\n\n“它要找的不是你现在的姓。”\n\n一号声音发虚。\n\n“它要找的是当年替你压欠的那个人。”\n\n“可你身上留着照生的尾。”\n\n“它分不清时，就会先往你这边认。”\n\n岳怀川终于接上话。\n\n“所以那收笔役想借页芯，把第一笔补全。”\n\n“一旦补全，谁离得最近，谁先应，它就先咬谁。”\n\n“是。”\n\n一号这声答得很苦。\n\n“尾能认人。”\n\n“姓才能认债。”\n\n“他们现在要的，就是把姓认回去，把欠也一并压回去。”\n\n沈照没抬头。\n\n目光还钉在灰纸那行“押名代欠”上。\n\n“那押名的是谁？”\n\n一号沉默了一瞬。\n\n“我只知道，不是我。”\n\n“我当年撞断的，是后补那一步。”\n\n“可在我撞断之前，已经有人先把你从原位往外拖了半步。”\n\n“不然你等不到我来撞。”\n\n这话比否认更重。\n\n它把一件原本还能装作没那么真的旧事，直接坐实了。\n\n沈照这些年不是侥幸活着。\n\n是有人真在旧账里，替他撕出过一条活缝。\n\n只是那条缝没来得及彻底合上。\n\n所以十二年后，这笔欠还在。\n\n还会追着尾名、追着页芯，一路追到他掌里。\n\n横廊夹缝里，忽然又传来一声极轻的笑。\n\n“现在看见了？”\n\n那收笔役还在。\n\n而且听得很清楚。\n\n“看见也没用。”\n\n“押名那一页早不在这里。”\n\n“你们若不先把第一笔认回去，这卷欠目就是废纸。”\n\n岳怀川人已经偏过去。\n\n裂灯白意贴着夹缝口一抹。\n\n里头立刻响起急退的磨擦声。\n\n那人还在往后缩。\n\n却没真走。\n\n他分明是在拖时辰。\n\n拖到后头追兵压近。\n\n拖到他们不得不慌。\n\n只要一慌，就极可能回头去碰匣面那一笔。\n\n沈照忽然明白过来。\n\n这整条横廊，真正厉害的不是机关。\n\n是顺序。\n\n先亮第一笔。\n\n再放欠目。\n\n再让追兵和火把人逼急。\n\n只要他们顺着这个顺序走，最后一定会自己替那一笔找个活人写完。\n\n跟当年没有两样。\n\n先认错。\n\n再把错认补成真。\n\n一号先前在免签缝里说过的话，忽然又在他脑子里撞了一下。\n\n别再把细路走成死路。\n\n先看它为什么急着让你那样选。\n\n沈照猛地抬头。\n\n“不能在这儿看完。”\n\n岳怀川一怔。\n\n“什么？”\n\n“这地方从头到尾都在逼我们按它想要的顺序来。”\n\n沈照抓起那卷欠目灰纸和半块木牌。\n\n“先亮第一笔，是要我们先认姓。”\n\n“把欠目放背层，是要我们觉得只差最后一步。”\n\n“后头再给火、给追兵，就是逼我们替它把最后一步补完。”\n\n夹缝里那人像也听懂了这句话。\n\n磨木声猛地一顿。\n\n下一刻，他竟直接从更深处把什么东西掷了出来。\n\n不是暗器。\n\n是一把细灰。\n\n灰一扬，半廊都白了一瞬。\n\n岳怀川裂灯立刻回护。\n\n一号被灰呛得连咳两声。\n\n那把灰里却藏着一点极细的火星。\n\n净页火。\n\n火星沾到匣面假板的瞬间，那层薄板竟“嗤”地一下从里往外烧开了一道口。\n\n匣面那一笔白，立刻借火透了出来。\n\n这次不是颤。\n\n而是直直朝沈照掌心扑。\n\n太快了。\n\n快得连岳怀川都来不及横灯。\n\n沈照只看见一笔白线扑到眼前。\n\n下一瞬，掌心白痕便像被人用烧红的针狠狠干穿。\n\n不是痛先到。\n\n是记忆。\n\n他看见一扇极窄的灰门。\n\n门外全是人声。\n\n有人在点名。\n\n“应二！”\n\n“应二在不在！”\n\n门里很黑。\n\n有个人死死按着他的肩。\n\n按得比上一次更狠。\n\n“别回头。”\n\n那声音离他耳边极近。\n\n“听见二，就应。”\n\n“欠，先记我。”\n\n“你活。”\n\n欠先记我。\n\n这四个字一砸下来，沈照胸口像被什么东西一下掏空。\n\n他拼命想看清那张脸。\n\n可那张脸还是隔着灰，隔着火，只剩一个模糊的轮廓。\n\n唯一真一点的，是对方把什么东西按进他手里的力道。\n\n硬。\n\n急。\n\n像生怕慢一息，他就会跟着另一个名字一起被拖走。\n\n然后，门外又有人喝：\n\n“快！”\n\n“先把第一笔落了！”\n\n这一声像钩子。\n\n把沈照猛地从那段旧景里扯回现实。\n\n匣面那道白笔，已经贴在他掌边。\n\n只差半寸。\n\n再近半寸，他这一掌就真成了它要落下去的地方。\n\n“拦住它！”\n\n一号几乎破了音。\n\n沈照没有再退。\n\n这一回，他反而抬起了那半块旧木牌。\n\n不是去挡手。\n\n而是对准匣面那一笔，狠狠压了过去。\n\n木牌上那点被掰断的旧断口，正好卡在白笔前头。\n\n像把一道原本要往活人掌里去的认姓，硬生生塞回了它原先该贴的断层里。\n\n横廊里“啪”地炸开一声脆响。\n\n不是木裂。\n\n像某根绷了太久的旧线，终于被人反着拽断。\n\n那道白笔猛地一歪。\n\n没有落进沈照手里。\n\n反而顺着木牌断口，一下窜回匣后夹缝。\n\n夹缝深处立刻传出一声极短的闷哼。\n\n那收笔役终于不笑了。\n\n“你敢！”\n\n沈照掌心烧得发抖。\n\n却还是咬住牙。\n\n“不是要补账吗？”\n\n“那就让它去找真正该补的人。”\n\n夹缝里一阵急乱。\n\n像有人在黑里拼命往后退，想甩开什么已经贴上去的东西。\n\n同一时间，后头滑道那头也终于冲进了第一拨人。\n\n白火先照进来。\n\n再是脚步。\n\n“在前面！”\n\n“别让姓笔灭了！”\n\n照命司那拨暗手果然也认得这地方。\n\n而且认得比他们想的还准。\n\n岳怀川当机立断。\n\n“走左壁！”\n\n横廊左侧灰板后头，本来还藏着一条只够一人侧身的窄槽。\n\n先前看着像死的。\n\n此刻被匣里反冲那一笔一震，板缝竟自行裂开一线。\n\n一号脸色一变。\n\n“那是废收槽！”\n\n“能出去？”\n\n“不知道！”\n\n不知道，也得走。\n\n岳怀川先把一号往里塞。\n\n一号伤成这样，自己是挤不快的。\n\n可他这次没犹豫。\n\n半边身子一扭，整个人硬是顺着那一线灰槽先钻进去。\n\n后头白火已经照到断栏边。\n\n有人看见东三匣开着，声音立刻变了：\n\n“第一笔呢？”\n\n“谁动了第一笔！”\n\n夹缝深处紧跟着又是一阵更惨的扑撞声。\n\n像那收笔役正被什么贴着一路往里拖。\n\n有人当场骂了一句。\n\n“废物！”\n\n这句骂里，竟不是意外。\n\n更像早知道收笔役来补这一步，本就只值这一下。\n\n岳怀川最后看了一眼那道夹缝。\n\n没再管。\n\n直接把沈照往废收槽里一推。\n\n灰槽极窄。\n\n窄得人一进去，肩骨立刻就和两边硬壁磨在一起。\n\n可也正因为窄，后头那群带火的人一时反而不敢硬追。\n\n一号在前头咳着往里挪。\n\n岳怀川断后。\n\n沈照居中。\n\n胸口页芯这时终于不再疯扑。\n\n却换成另一种更阴的烫。\n\n像方才那一拦，并没有让它死心。\n\n只是让它认出，这笔欠还没落到该落的人身上。\n\n灰槽拐过两折。\n\n前头才稍微宽一点。\n\n一号先扑出去，跪在地上连喘了几口。\n\n岳怀川回身一脚，把后头那块松动灰板直接踹回原位。\n\n板一合。\n\n火光、人声、夹缝里的惨响，一下全被隔到了另一边。\n\n只剩灰槽里一片发闷的黑。\n\n没人立刻说话。\n\n三个人都在喘。\n\n不只是跑。\n\n还有刚才那一笔从掌边擦过去以后，留在骨头里的那点余麻。\n\n过了好一会儿，岳怀川才低声问：\n\n“你看见什么了？”\n\n沈照嗓子发干。\n\n“只听见一句。”\n\n“什么？”\n\n“欠先记我。”\n\n一号身子猛地僵住。\n\n像这四个字，他也认得。\n\n而且比沈照认得更久。\n\n“你听过？”\n\n沈照盯住他。\n\n一号垂着眼，喉结慢慢动了一下。\n\n“当年……我撞位前，听见过半句。”\n\n“只半句。”\n\n“那时候我以为，是里头有人在发疯。”\n\n“后来真页、尾名、补缺这些线一点点露出来，我才知道，那不是疯话。”\n\n“是真有人先把欠揽过去了。”\n\n岳怀川靠着灰壁，灯压得很低。\n\n“所以押名的人，当年就在灰门里。”\n\n“而且没死在第一步。”\n\n“至少没立刻死。”\n\n一号哑声道。\n\n“不然东三不会留着。”\n\n“也不会有人今天还敢来补这第一笔。”\n\n沈照低头去看手里的那卷灰纸。\n\n方才跑得急，纸边已经被他攥皱。\n\n可那几行字还在。\n\n`撞位活一，押名代欠`\n\n`欠目随押名行`\n\n每一个字都像一枚旧钉。\n\n把他这条命钉回十二年前那个灰门之前。\n\n“还少一半。”\n\n他低声道。\n\n“少的是押名的人。”\n\n“还有，他为什么替我压。”\n\n岳怀川没立刻接。\n\n而是看向他掌心。\n\n“看手。”\n\n沈照这才低头。\n\n掌心白痕四周，不知什么时候已经多了一圈极淡的焦边。\n\n不像烧伤。\n\n更像有人拿一笔白火，在他原本的旧伤边上又描过一下。\n\n不完整。\n\n却已经留印。\n\n一号看见这圈焦边，脸色更差。\n\n“它还是擦上你了。”\n\n“下一次再近一点，可能就不是擦。”\n\n沈照嗯了一声。\n\n嗓子却空。\n\n不止因为疼。\n\n还因为别的。\n\n有块东西，在那一笔擦过掌边时，像真的被带走了一点。\n\n不是暖碗那种整段记忆一下空掉。\n\n而是更小。\n\n更细。\n\n细得他一时说不出到底少了什么。\n\n岳怀川忽然从地上抹起一层灰，摊到他面前。\n\n“写。”\n\n沈照抬眼。\n\n“写什么？”\n\n“你自己的姓。”\n\n这句话落下，连一号都静了。\n\n没人说不该写。\n\n因为他们都想知道，方才那一擦，到底把什么带走了。\n\n沈照盯着那片薄灰。\n\n片刻后，慢慢抬手。\n\n指尖先落。\n\n没问题。\n\n手还稳。\n\n可等要往下走第一笔时，他的手指却极轻地顿了一下。\n\n不是怕。\n\n是空。\n\n像那一笔原本就在骨头里。\n\n现在却突然隔了一层。\n\n他知道该怎么写。\n\n偏偏这一下，就是发涩。\n\n指尖落进灰里。\n\n刚拉出半寸，脑子里竟先闪过另一道更细、更直、更冷的白线。\n\n不是“沈”。\n\n是东三匣上，刚才那道自己亮起来的第一笔。\n\n沈照指尖猛地一偏。\n\n灰上那一笔立刻歪了。\n\n不是他的字。\n\n也不是完整的别字。\n\n只是一个谁也没写完、却已经让人心口发冷的陌生起手。\n\n灰槽里彻底静了。\n\n岳怀川没说话。\n\n一号脸上的血色，一点一点退干净。\n\n沈照看着那道歪在灰里的陌生起笔，掌心白痕忽然又轻轻烫了一下。\n\n像在提醒他。\n\n这笔欠，还没完。\n",
    "outlineExpectation": "承接第二十二章末尾的东三先亮，沈照、岳怀川与一号赶到抹名廊东三匣时，必须在追兵和净页火压近前，分清那道自己亮起的“姓笔第一笔”究竟在认谁。章中既要坐实十二年前不是单纯补缺，而是有人以“撞位活一、押名代欠”的方式把沈照硬拖出死账，也要让收笔役和暗手这条旧流程仍在追补的线露出真身。章尾要让沈照虽然暂时没有替那一笔写完，却付出新的记忆代价，并第一次写不稳自己的姓。 "
