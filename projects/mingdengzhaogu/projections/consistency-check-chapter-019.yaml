    "chapterContent": "# 第十九章 第一眼不真\n\n“下面到了。”那句压低的示警才落下，一号那句“原册上的照，别信第一眼”还钉在耳边。\n\n拖板先撞地。\n\n像一截骨头被什么软东西托了一把，又轻轻磕回石面。\n\n@{岳怀川}闷哼一声，先从前头滑了出去。\n\n@{沈照}紧跟着伏身落地。\n\n槽口在他背后缓缓合拢。\n\n上头悬腹廊里的白火、钩铁和人声，一下全被石腹吃住。\n\n不是彻底听不见。\n\n只是都隔远了。\n\n远得像沉进很深的水底，只剩一阵阵发闷的震。\n\n眼前这一层，却和上面几层都不一样。\n\n不是井。\n\n不是廊。\n\n更不像养息腹、主息槽背那种还留着活人走动痕迹的地方。\n\n这里像一部被拆开后横着埋进山腹里的旧簿。\n\n两边石壁不是整面。\n\n而是一层层斜插进去的黑薄骨片。\n\n每片都只有掌宽。\n\n边缘打磨得极薄。\n\n上头还刻着细密得几乎看不清的小字。\n\n拖板方才滑过时带起的风，拂过这一整面骨片墙。\n\n墙里便传出一阵极轻极碎的簌簌声。\n\n像很多很多页旧簿，在最深夜里同时翻过半角。\n\n岳怀川已经翻身而起。\n\n裂灯白意压在掌心，没有立刻放大。\n\n“别照太亮。”\n\n“这里靠认热、认声，也认字。”\n\n沈照也看出来了。\n\n这地方的冷，和上面那几层不一样。\n\n不是阴冷。\n\n像每一丝凉气里，都掺着被磨碎的旧墨和陈骨。\n\n人站在这里，连呼出来的气都像会被它们拿去比对。\n\n拖板落地处是一道很窄的灰桥。\n\n桥面由整块黑石磨成。\n\n中间嵌着两道浅浅的滑痕。\n\n一直往前延。\n\n像专门给拖板、骨架和什么不方便自己走的东西反复拖出来的。\n\n左边是壁。\n\n右边却是空。\n\n空得看不见底。\n\n只有更下头隐约浮着一层发白的雾。\n\n雾里偶尔会闪一下暗铜。\n\n像更深处另有别的轮轴与槽道，在慢慢转。\n\n一号说过。\n\n第二道转骨卡，别碰左壁。\n\n左壁会认热。\n\n沈照抬眼往左。\n\n这一看，他后颈立刻麻了一下。\n\n左壁不是单纯的骨片墙。\n\n那些斜插进去的黑骨片里，每隔几尺就嵌着一只极薄的铜眼。\n\n眼口只有指尖大。\n\n却都朝着灰桥这边。\n\n眼下还吊着细细一根白丝。\n\n像蛛丝。\n\n却明显是铜拉出来的。\n\n一旦有人带着热气从左边擦过去，那些铜眼怕是全会一起睁。\n\n“往右。”岳怀川低声道。\n\n“脚别重。”\n\n“也别说话。”\n\n沈照点了点头。\n\n两人一前一后，沿灰桥往前挪。\n\n才走出七八步，桥底忽然“当”地轻响一声。\n\n不是他们踩出来的。\n\n更像是更前头某块簿片自己弹了一下。\n\n岳怀川立刻抬手，示意停。\n\n前方三丈外，桥面侧边缓缓立起一根细铜舌。\n\n舌尖沾着灰白。\n\n像刚从极久的齿缝里抬出来。\n\n它立住后，背后那片黑骨忽然浮出一线很淡的白字。\n\n先是一横。\n\n再是一撇。\n\n最后缓缓聚成一个完整的字。\n\n`照`\n\n沈照眼皮骤然一跳。\n\n那字不是刻在上面的。\n\n更像被什么从骨里慢慢照出来。\n\n而且照出的瞬间，桥下白雾也跟着轻轻涌了一下。\n\n像底下整层东西，都朝这边偏过了半寸。\n\n岳怀川没有回头，只压着嗓子说了一句：\n\n“别认。”\n\n沈照本也没想认。\n\n可真正危险的不是他想不想。\n\n而是那根细铜舌在亮出这个“照”字后，竟又轻轻翻了一面。\n\n另一面没有字。\n\n却传出一道极轻的气音。\n\n像有人贴着他耳后，用和他自己极像的声线，叫了一句：\n\n“在么？”\n\n沈照掌心那道白痕猛地一烫。\n\n差一点。\n\n真的只差一点。\n\n他喉口那点下意识要应的气，几乎已经顶到牙关。\n\n还是岳怀川手更快。\n\n裂灯白意极细地一挑，正打在那根铜舌根部。\n\n“嗤。”\n\n一缕极淡的焦灰冒起来。\n\n铜舌一歪。\n\n那道几乎和沈照自己一模一样的气音立刻断了。\n\n桥下白雾也跟着沉回去。\n\n沈照后背已出了一层冷汗。\n\n“这不是点名。”他低声道。\n\n“它是在试你开口。”\n\n“先试你会不会顺着第一反应答。”\n\n岳怀川收回灯意。\n\n“所以一号才说，第一眼别信。”\n\n“这里不是给人看真相，是给人顺着旧规自己送进去的。”\n\n话音刚落，头顶石腹深处忽然传来一串更闷的钩响。\n\n上层人没停。\n\n他们已经摸到别的回路了。\n\n沈照不再耽搁。\n\n两人继续往前。\n\n越往里走，这道灰桥越像从一整部旧簿脊背上硬削出来的细缝。\n\n左壁骨片越来越密。\n\n右边空处也渐渐起了风。\n\n那风卷着底下白雾，时不时拍上桥沿。\n\n每拍一下，桥底便会亮起一行又一行极浅的小字。\n\n不是完整句。\n\n全是零碎的记法。\n\n`候二`\n\n`暂止`\n\n`归后复照`\n\n`先应再核`\n\n沈照看得心里发寒。\n\n这些不是给活人看的话。\n\n像一整套专门处理“认回册里的人”时留的工记。\n\n把名字、次序、先后和处置，全拆成一根根冷冰冰的骨条，插进这座山腹。\n\n他们走到桥中段时，前面终于出现了第二道卡口。\n\n那是一座很低的半圆拱。\n\n拱下并没有门。\n\n却悬着三串细索。\n\n索上各坠一枚扁平铜片。\n\n铜片朝下。\n\n正好拦住人胸口到喉间那一线。\n\n最左那枚铜片后面，还拖着一道很细的赤痕。\n\n像很多年以前，真有人被它刮掉过一层热皮。\n\n“左壁认热，第二卡口认息。”\n\n岳怀川蹲下看了眼拖板。\n\n“一号让拆青扣，不只是防翻。”\n\n“还要借这块板身的冷膏，把我们气息压过去。”\n\n他说着，把拖板横过来，先推到拱下。\n\n拖板一入，那三枚铜片果然同时轻轻一晃。\n\n不是要落。\n\n更像在嗅。\n\n嗅完后，最右那枚铜片慢慢向上抬开半寸。\n\n留出一条只够人弓身钻过去的缝。\n\n“快。”\n\n岳怀川先过。\n\n沈照跟着压低身形。\n\n钻过拱下时，他还是感觉左颈侧微微一麻。\n\n像有一道极细的凉意，贴着他耳后扫了一下。\n\n扫过去的瞬间，他眼前又闪过一截不是自己的影。\n\n不是记忆。\n\n更像这座总簿廊自己曾见过的东西，被它顺手往他脑子里塞了一点。\n\n那是一张薄骨页。\n\n页上写着两行字。\n\n第一行很亮。\n\n只有两个字：\n\n`沈照`\n\n第二行却被水一样的白意压着，看不清。\n\n只能隐约看见前头那个字不是“沈”。\n\n而是另一个同样带着火边的“照”。\n\n影像一掠即逝。\n\n沈照一步落地，胸口那盏小铜灯已自行震了一下。\n\n他猛地回头去看拱后左壁。\n\n壁上那些斜插的黑骨片里，竟有好几片同时浮出极浅的白纹。\n\n纹路像笔画。\n\n只是还来不及完全成字，便被拖板上残留的冷膏压灭。\n\n岳怀川看见他神情，立刻问：\n\n“看见什么了？”\n\n“一页簿。”\n\n“第一眼就是‘沈照’。”\n\n“第二行被压住了。”\n\n岳怀川眸光一沉。\n\n“那便对上了。”\n\n“这条廊一直在先给你看最容易信的那层。”\n\n前面终于不再是灰桥。\n\n而是一方略微开阔些的平台。\n\n平台尽头立着一道黑门。\n\n门不是木，也不是铜。\n\n像整块发乌的骨石磨出来的。\n\n门面没有锁眼。\n\n只在正中嵌着一道竖长的白痕。\n\n细。\n\n浅。\n\n和沈照掌心那道白痕形状几乎一样。\n\n痕旁刻着四个已经被磨浅的旧字：\n\n`总簿先照`\n\n不是回册总簿四个完整的大字。\n\n而是更阴一点、更像内部人才会知道的提示。\n\n先照。\n\n先看。\n\n先被看。\n\n也先被照进去。\n\n沈照心里那点不安一下落了实。\n\n“门怎么开？”\n\n岳怀川没立刻答。\n\n他先抬灯往黑门下沿一照。\n\n门底堆着极薄的一层白屑。\n\n像有人最近才从这里拖过什么。\n\n屑里还夹着半枚断开的指甲。\n\n颜色发灰。\n\n不是新伤。\n\n更像哪个快被拖散的人，临进门前最后抠出来的一点东西。\n\n“用人开。”\n\n岳怀川站起身，看向门中那道白痕。\n\n“或者说，用被它认得的人开。”\n\n沈照没说话。\n\n这一路下来，他们本就没有别的钥匙。\n\n而且追兵声已经更近了。\n\n头顶那层闷震，开始能听出明显的节奏。\n\n不是偶发钩响。\n\n是有人在一层层试压、拆锁、逼近。\n\n他把掌心按上去。\n\n白痕贴住门心那一瞬，黑门里像有一整道凉水顺着骨缝倒灌出来。\n\n冷得他指骨发麻。\n\n下一刻，门里缓缓浮出字。\n\n门里浮出的不是一排。\n\n而是一整面。\n\n密密麻麻，从上到下，全是“照”。\n\n不同深浅。\n\n不同新旧。\n\n有的像刻。\n\n有的像烧。\n\n还有的像被人一遍遍拿指节抠出来。\n\n而在这一整面的“照”里，最中央那枚忽然一点点亮起，最终变成两个完整的名字。\n\n`沈照`\n\n门随之向内缓缓开了一线。\n\n岳怀川伸手一把扯住他后肩。\n\n“记住。”\n\n“这是它先给你的。”\n\n“不是你先看明白的。”\n\n沈照点头。\n\n两人一同挤进门缝。\n\n门内不是室。\n\n是井中有室。\n\n整座黑门后面，竟然是一口向下掏空的圆井。\n\n井壁一圈圈嵌满了翻开的簿叶。\n\n有黑骨的。\n\n有旧铜的。\n\n也有半透明、像被白膏反复浸过的薄皮页。\n\n每一圈簿叶都被细索吊住。\n\n层层叠叠，一直垂到井心。\n\n井心最中央悬着一根竖直的黑轴。\n\n轴不粗。\n\n却把上下所有簿页全串在一起。\n\n每隔一息，黑轴便极慢地拧一下。\n\n于是整口井里的簿页，也跟着错开半寸，再重新停住。\n\n翻页。\n\n归位。\n\n再翻页。\n\n像整座山腹直到此刻，都还在替某些名字不停记账。\n\n井下没有水。\n\n只有一层近乎凝住的白光。\n\n光不刺。\n\n像把多年没见天的月色，一层层压在最深处。\n\n而那团白光里，果然躺着一本真正意义上的“总簿”。\n\n不厚。\n\n甚至可以说很薄。\n\n只有三页。\n\n三页都被黑轴最底那一截细索单独吊着。\n\n每翻一次，整井所有簿叶都像是在给它让路。\n\n“回册总簿……”沈照低低道。\n\n“原来不是一册记满的账。”\n\n“是只有三页，却能叫上面所有页都跟着改。”\n\n岳怀川盯着井底那三页，眼里全是冷意。\n\n“主簿三页。”\n\n“上层那些残纸、残签、记签旧库，怕都只是它翻过之后溅出去的边角。”\n\n他们面前沿井壁绕着一圈很窄的骨阶。\n\n一圈圈下去。\n\n能下到井心最近那一层。\n\n可骨阶太窄。\n\n每一阶都只能踩半脚。\n\n更麻烦的是，骨阶外侧没有护栏。\n\n只要一步错，便会从无数翻页间直接摔进井心。\n\n偏偏就在他们立住的这一层，最近那页薄皮簿上，也慢慢浮起了字。\n\n只有一行。\n\n和门上一样。\n\n`沈照`\n\n沈照盯着那两个字，胸口一阵发空。\n\n不是喜。\n\n也不是“终于找到了”的落定。\n\n而是一种更坏、更黏稠的感觉。\n\n仿佛这两个字一亮，整口井都在轻声告诉他：\n\n你本来就在这里。\n\n你所有往下爬、往深追、往旧案里刨的动作，不过是在走回自己原来的位子。\n\n只要再往前半步。\n\n再看清一点。\n\n再承一句。\n\n一切就会合上。\n\n那种诱力不重。\n\n甚至可以说很轻。\n\n轻得像一只手，只在他背后轻轻推了一下。\n\n可越轻，越像真。\n\n沈照已经迈出了一步。\n\n骨阶极窄。\n\n他那一步下去，鞋底正落在一片翻开的黑骨叶上。\n\n叶面冷得不正常。\n\n却也正是这一踩，他眼前那两个“沈照”忽然一下散开。\n\n散成许多重叠的笔迹。\n\n有新有旧。\n\n有粗有细。\n\n最上面那层仍是沈照。\n\n但底下分明压着另一道更老的烧痕。\n\n痕迹头一个字也带着“照”。\n\n却不是名字后一个字。\n\n而是前头就写了“照”。\n\n沈照心口重重一跳。\n\n不是他看出来的。\n\n是脚下这片黑骨叶因为受了他的热，自己把底层旧痕往外顶了一点。\n\n可也就在这一点顶出来的瞬间，最中央那根黑轴忽然“咔”地轻响了一下。\n\n井里所有簿叶齐齐一停。\n\n像全都盯住了他这一步。\n\n岳怀川喝道：\n\n“退！”\n\n沈照猛地回神，立即想抽脚。\n\n可那片黑骨叶边缘，竟像有细软的白丝正从缝里慢慢渗出来，要往他鞋底缠。\n\n岳怀川裂灯当空一劈。\n\n白意斩落。\n\n那几缕白丝被瞬间烧卷。\n\n沈照趁机退回原位。\n\n井里那些停住的簿叶这才重新开始转。\n\n只是这一回，转动的速度明显比刚才快了半分。\n\n像总簿已经记下，有人真正摸到了底层那点被压住的东西。\n\n“不能让它一直拿你试。”岳怀川沉声道。\n\n“得先把第一层假字剥掉。”\n\n他立刻从沈照怀里抽出那两张残纸。\n\n一张写着`二免应`。\n\n一张写着`改列：沈照`。\n\n又把那枚写了`……照`的旧签残片夹在指间。\n\n“它上面能先亮‘沈照’，说明现在所有簿叶都在顺着后补名往上翻。”\n\n“要翻到底下那一层，只能拿旧证去顶。”\n\n他明白了。\n\n不是争辩簿上写的对不对。\n\n而是要拿它自己旧账里的互相矛盾，逼它把先后顺序露出来。\n\n他接过那张`二免应`残纸，踩着骨阶往下再挪两层。\n\n这一次他不去看井心三页。\n\n只看最近那片薄皮簿。\n\n簿面上那两个“沈照”还在。\n\n白得几乎晃眼。\n\n他把残纸贴上去。\n\n纸一碰簿面，竟不是落上。\n\n而像被一层湿冷的皮轻轻吸住。\n\n下一瞬，两个字最末那一笔忽然一抖。\n\n不是人写字时那种抖。\n\n更像一张压在上头的纸，被底下顶起了边角。\n\n白字一翘。\n\n底下另一层痕迹终于露出更多一点。\n\n仍是先见“照”。\n\n接着是第二个字的一角。\n\n不是沈。\n\n也不是他如今名字里的任何一笔。\n\n而是一撇折下去、带一点冰裂纹的生笔。\n\n沈照盯着那一角，脑中忽然一阵剧痛。\n\n不是新的残忆。\n\n更像有什么本来属于他自己的东西，被这一角生生顶开了。\n\n他眼前发白。\n\n脑子里第一个闪过的，竟不是十二年前。\n\n而是废照棚。\n\n草席。\n\n周小棘蹲在棚口朝他笑。\n\n可等他真的想去看清那张脸时，那里却忽然变成一片模糊。\n\n不是周小棘没了。\n\n是他一时竟想不起来，对方笑起来左边有没有虎牙。\n\n这一忘不大。\n\n却叫他第一次清楚怕的不是死。\n\n是再往下追，连废照棚里那张会笑的脸都要被自己忘干净。\n\n残灯的代价，已经啃到他想护住的活人上了。\n\n“沈照！”岳怀川已经察觉不对。\n\n“退回来！”\n\n沈照咬了下舌尖，硬把视线从那一角旧字上撕开。\n\n“我没事。”\n\n“它在拿我换。”\n\n“每多翻一层，我就得丢一点自己的东西。”\n\n岳怀川脸色发寒。\n\n“那就别拿你去硬翻。”\n\n他话一落，手上裂灯忽然转向井壁另一侧。\n\n白意细得像一根针，准确扎进一枚最不起眼的旧铜页缝里。\n\n“当。”\n\n那页旧铜页被火意一顶，竟自行弹开。\n\n页背后藏着一行更细的工记：\n\n`原照未销，后补二名`\n\n只八个字。\n\n却比什么都狠。\n\n原照未销。\n\n后补二名。\n\n也就是说，第十九章一路追下来的怀疑，到这里终于有了总簿层面的冷账旁证。\n\n沈照根本不是原册一开始写下的人。\n\n他是后来被塞进“二”这个位置里，用来补账的。\n\n而门上、桥上、簿上、乃至他方才第一眼看见的那两个字，全是这套旧规为了让“后补二名”顺利回册，特意先给他看的假照。\n\n岳怀川立即把那行字照给沈照看。\n\n“先记这个。”\n\n“别记门上那两个字。”\n\n他看着那八个字，胸口那点几乎要被总簿带偏的空白，终于一点点退下去。\n\n可退下去后，涌上来的不是轻松。\n\n而是更重的冷。\n\n原照未销。\n\n那个人没被真正抹掉。\n\n只是一直没被允许完整出现。\n\n“再找改列钩。”岳怀川道。\n\n“既然有‘后补二名’，就必有改列的承转页。”\n\n上层钩响忽然更近了一层。\n\n这一次，不再只是头顶。\n\n而像已经进了总簿廊前半段。\n\n他们时间不多了。\n\n沈照压住掌心白痕，沿骨阶又往下走了三层。\n\n越接近井心，那三页主簿越安静。\n\n安静得不像死物。\n\n更像三张从不需要自己发声、只要等别人把名字送来就行的口。\n\n他这次没再盯着字看。\n\n而是去看吊着三页主簿的那根黑轴。\n\n轴上果然不是光的。\n\n中段缠着密密两圈细索。\n\n每一圈索上都挂着极小的签骨。\n\n签骨上刻字太小，本来看不清。\n\n可当裂灯白意隔空照下来时，其中一枚忽然翻了一面。\n\n`改列`\n\n沈照眼神一紧。\n\n找到的就是这枚。\n\n可那枚小签骨挂得极深。\n\n几乎贴着井心白光。\n\n人若要去碰，得再往下两层。\n\n而那两层骨阶已细得近乎没有落脚处。\n\n“我去。”他说。\n\n“我照你。”岳怀川立刻回。\n\n沈照没再争。\n\n他把那枚写着`……照`的旧签残片咬在齿间，双手都腾出来，贴井壁往下压。\n\n脚底每落一步，四周无数簿页便会跟着轻轻翻一次。\n\n像不是他在往下。\n\n而是整个总簿井，在顺着他这条“二名”主动给路。\n\n这感觉太坏。\n\n坏得像有人在很耐心地等他自己走到最中央。\n\n最下那两层果然险。\n\n骨阶薄得只剩一掌半。\n\n沈照侧身贴壁，呼吸压得极轻，终于够到那枚挂着`改列`的小签骨。\n\n签骨一触即冷。\n\n不是铜那种硬冷。\n\n更像刚从活人舌底取出来的凉。\n\n他手指微微一抖，还是一把捏住，往上一扳。\n\n“咔。”\n\n很轻的一声。\n\n可整个井心忽然亮了。\n\n不是灯亮。\n\n而是最底那三页主簿同时朝上翻开半寸。\n\n白光一下从页缝里冲起来。\n\n照得沈照眼前一片发空。\n\n空白里，他还是看见了第一眼。\n\n又是“沈照”。\n\n而且这一次，不是一页。\n\n是三页全都在第一眼里亮出这两个字。\n\n一瞬之间，连他自己都差点生出一种荒谬的念头：\n\n会不会一号也错了？\n\n会不会门上、桥上、总簿底下，其实都在说同一件事？\n\n可就在这最危险的一瞬，齿间那枚旧签残片被他咬得一滑，边缘猛地划破了舌侧。\n\n一点血腥味散开。\n\n主簿第一眼里的“沈照”忽然像被血气打碎。\n\n白字哗地散开。\n\n底下真正那层旧痕终于全露出一瞬。\n\n不是完整的名。\n\n却足够看见次序。\n\n第一行：\n\n`照……`\n\n第二行：\n\n`后补二：沈照`\n\n第三行：\n\n`一撞承`\n\n只这一瞬。\n\n下一刻，三页又重新被白光压住。\n\n可这一瞬已经够了。\n\n岳怀川在上头看得清清楚楚，声音都沉了：\n\n“退！”\n\n“再不退，它要起回册了！”\n\n沈照这次不再恋战，反手将那枚`改列`签骨猛地往上一拔，整个人借力往上扑。\n\n也就在他拔签的同时，黑轴最底那两圈细索忽然同时收紧。\n\n井里无数簿页疯狂翻动。\n\n不是先前那种慢翻。\n\n而是整口井一瞬活过来般的急转。\n\n左边井壁上传来无数细细的气音。\n\n全在叫。\n\n有叫“照”的。\n\n有叫“二”的。\n\n还有一声又一声，像极了第十八章悬腹廊里那些待转旧笼里压着的喉音：\n\n“归……”\n\n那喉音不是一声。\n\n而是一截截从井壁里往外挤。\n\n沈照头皮都炸起来。\n\n这不是查账了。\n\n是总簿在发现底层承转页被人扯动后，开始顺着后补名主动回收。\n\n岳怀川从上头一跃而下，半跪在高一层骨阶边，一把扣住沈照手腕，把他往上硬拽。\n\n“那枚签给我！”\n\n沈照把刚扯下来的`改列`签骨拍进他掌中。\n\n岳怀川只扫一眼，立刻就看见签骨背后还藏着另一行极小的字。\n\n`主索同轴`\n\n两人同时一震。\n\n一号没说错。\n\n吊着他的主索，果然就系在这根总簿黑轴上。\n\n毁轴，就能松索。\n\n可毁轴的代价，也极可能是整口总簿井一起塌。\n\n到时一号、上层那些待转残留、甚至他们自己，都未必出得去。\n\n可若不动，回册一旦起全，他们马上就会被这一层先认回去。\n\n岳怀川只用了一息就做了决定。\n\n“不毁整轴。”\n\n“毁它最底这圈回册引索。”\n\n“能乱主索，也能给上面松一口气。”\n\n“用什么卡？”沈照问。\n\n他刚问完，自己就先想到了。\n\n第十七章那块骨片。\n\n那块写着`照，不要应。`的骨片。\n\n不是纸。\n\n不是签。\n\n是一口真正从旧身上剥下来的骨。\n\n也许这一路追下来，它等的就是这一刻。\n\n沈照立刻把骨片摸出来。\n\n白骨边缘因一路贴身带着，早被焐出一点体温。\n\n可当它接近黑轴最底那圈细索时，骨片上那行字竟自己泛出极淡的白。\n\n不是亮给他们看。\n\n更像它和这里，本就是同一套旧规里被强行拆开的两部分。\n\n“我压骨片。”\n\n“你断引索。”\n\n岳怀川点头。\n\n裂灯白意已在掌中收成极细的一线。\n\n沈照不再迟疑，俯身便把骨片狠狠卡进黑轴最底那圈索轮之间。\n\n“咔！”\n\n这一声，比方才任何一次都重。\n\n整口总簿井猛地一顿。\n\n像齿轮里忽然嵌进了一截生骨。\n\n下一瞬，岳怀川手中那线裂灯白意已经斩下。\n\n他斩的不是黑轴。\n\n正是骨片卡住后、最先被绷直的那根最细的白索。\n\n“嘣。”\n\n索断。\n\n不是一根琴弦断那么简单。\n\n而像什么东西从极高处陡然松了一口。\n\n头顶石腹深处，几乎同时传来一道闷闷的重响。\n\n像上层悬腹廊里吊着一号的某根主索，真的跟着松了一寸。\n\n可断了一根还不够。\n\n井里所有簿页都疯了似地翻起来。\n\n比刚才更快。\n\n那些“归”字气音也一下密成一片。\n\n沈照感觉自己喉口那点答应的冲动，猛地被放大了十倍。\n\n不是有人逼他说。\n\n而是整个总簿井，都在替他把那口气往外拽。\n\n只要他说一个“在”。\n\n只要应一下。\n\n这口井就会立刻顺着后补二名把他合进去。\n\n他牙关咬得发酸。\n\n眼前甚至开始晃出许多不属于现在的画面。\n\n废照棚。\n\n灰井。\n\n养息腹白池。\n\n还有那张白帘后苍白得近乎透明的脸。\n\n所有场景都在重叠。\n\n像这一路以来他追的不是同一条线，而是许多被拆散的“照”，正在这一口井里朝他身上合。\n\n岳怀川也看出不对。\n\n他一手抓住沈照肩膀，一手反拧拖板前端那枚青扣，猛地把整块拖板卡进下层骨阶与井壁间。\n\n“再断一根，我们走！”\n\n“不能让它全起。”\n\n沈照死死压着喉咙里那口要外冲的气。\n\n他知道自己已经到了边缘。\n\n再多看一眼。\n\n再多记一点。\n\n真可能连“沈照”这两个字是不是后补，都要被它重新揉浑。\n\n可就在这时，井底白光里忽然浮出一道影。\n\n不是字。\n\n是人影。\n\n影子先像他自己。\n\n瘦。\n\n肩窄。\n\n命灯被抽过的少年骨相。\n\n几乎和悬腹廊第三只闭笼里那团轮廓一样。\n\n可白光微微一晃后，那影子下颌线却变了。\n\n比他更薄。\n\n眼尾更长。\n\n喉结下那道痕，也不是他掌心白痕那样的横裂。\n\n而是一道很浅很直、像被什么东西从正中穿过后留下的细印。\n\n沈照心头猛震。\n\n这不是他。\n\n至少，不全是他。\n\n原册里的“照”，在总簿第一眼之后，终于露出了第二眼。\n\n也就在这一瞬，井底第三页主簿边角忽然掀起。\n\n掀起处露出半行极小的尾字：\n\n`……照生`\n\n只半行。\n\n只两个半字。\n\n却足够让人知道，原册上那个人的名字，至少不是“沈照”。\n\n他几乎本能地想再看清前头一个字。\n\n岳怀川却已经一把把他往上扯。\n\n“够了！”\n\n“再看就是它要的了！”\n\n同一刻，外层黑门方向终于轰然一响。\n\n有人破进总簿室了。\n\n紧接着便有怒喝顺着井壁砸下来：\n\n“下头！”\n\n“他们动总簿了！”\n\n井上白火一闪。\n\n追兵已经到了门口。\n\n岳怀川反手第二次斩灯。\n\n这一次又是一根细索应声而断。\n\n黑轴最底那圈索轮顿时歪了半边。\n\n卡在里面的骨片被猛地带着一转，井里所有簿页随之乱翻。\n\n不是回册。\n\n而是全乱。\n\n乱得上头那拨刚冲到井口的人都齐齐顿住。\n\n因为他们脚下最近那圈骨阶，也开始跟着错位。\n\n“走！”\n\n岳怀川不再往上，反而一脚把卡住的拖板整个踹下了井心侧边那道从未完全显形的暗槽。\n\n原来总簿井最底层，真的还藏着一条更下行的路。\n\n只不过先前一直被主簿三页的白光压住，看不出来。\n\n如今最底两根引索一断，白光一乱，那条槽才显了形。\n\n槽不宽。\n\n却比悬腹廊那道转骨槽更深、更直。\n\n像整部总簿的簿脊，被人从最中央一刀劈开，直通更下面那层真正藏“原照”的地方。\n\n他最后抬头看了一眼。\n\n井口白火晃动。\n\n追兵下不来。\n\n上层悬腹廊方向，则又隐约传来一声更远的重响。\n\n像某根吊着活证的主索，真的因这两根引索断开而被扯松了一截。\n\n一号还没脱。\n\n但也没被当场扯死。\n\n他们这一刀，至少砍到了它。\n\n“先下去！”岳怀川喝。\n\n“上面会乱一阵，但乱不了太久！”\n\n沈照把那枚`改列`签骨、两张残纸和半枚旧签全数拢紧，最后又一把抽回卡在索轮里的那块骨片。\n\n骨片边缘已经崩掉一角。\n\n可那句`照，不要应。`还在。\n\n像被这口总簿亲自咬过一遍后，反而更硬了。\n\n他不再迟疑，翻身跃上拖板。\n\n岳怀川紧跟其后。\n\n两人几乎是一前一后压进那道新显出的暗槽。\n\n拖板一入槽，背后整口总簿井便轰然乱翻起来。\n\n无数骨页、铜页和薄皮簿叶互相拍击，声音像一场极冷的暴雨。\n\n而在这片暴雨里，井底那道只露过第二眼的人影，也随白光一起猛地沉了下去。\n\n沈照只来得及在最后那一瞬，看见白光深处又翻起半张残面。\n\n那张脸第一眼像他。\n\n第二眼却明显不是。\n\n第三眼还没来得及看清，拖板已经被更深的黑暗整个吞下。\n\n只剩总簿井上方混乱的人声、下方越来越近的白冷，以及岳怀川在他前头压得极低的一句：\n\n“下面那层，恐怕才是真原簿。”\n",
    "outlineExpectation": "沈照与岳怀川顺着第十八章末尾的转骨拖板落进回册总簿所在的簿廊与井室，第一次把“一号那句‘原册上的照别信第一眼’”从警告推成可验证的机制：总簿会先亮后补名，把沈照诱成原册本人。章中既要让两人从总簿冷账里坐实“原照未销，后补二名”“一撞承”的先后关系，也要让翻真账本身继续啃掉沈照的自我。章尾要让他们斩断与一号主索同轴的回册引索，暂时搅乱上层锁梁，并顺着更深的暗槽追向真正藏着原照的下一层。 "
  },
