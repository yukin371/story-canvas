    "chapterContent": "# 第十五章 丁井吊板\n\n井底那一下磕响落下去后，黑里便再没了第二声。\n\n像下面的人故意停手。\n\n也像在等。\n\n@{岳怀川}没再迟疑。\n\n他先把裂灯沿井沿一抹，白火顺着旧滑槽往下爬了半尺，立刻照出井壁右侧一块被磨得发乌的铁页。\n\n铁页不大。\n\n边角却有一处极细的灯纹缺口。\n\n正和那块`丁井`铁牌背后的旧钩对得上。\n\n“把牌给我。”他伸手。\n\n@{沈照}把铁牌拍进他掌心。\n\n岳怀川反手一压。\n\n铁页里顿时传出一声低沉的卡响。\n\n不是开门。\n\n更像一段藏在井壁里的短梯，被旧簧片硬推了出来。\n\n三枚半尺来宽的铁踏先后弹出，正贴在第三道粗绞索旁边。\n\n绞索上缠着发白的旧麻皮。\n\n最外层还压着一道浅字：\n\n`三绞下行`\n\n方才那半截号签说的，就是这一道。\n\n“他们昨夜走的活路在这儿。”岳怀川压着声，“正吊板给运物，第三绞给换膏人抢前后脚。守井的没骗我们。”\n\n沈照低头看了一眼。\n\n下头仍旧深得看不见底。\n\n可第三道绞索旁那几枚铁踏上，全有新蹭开的湿灰。\n\n说明不久前才有人踩着它下去。\n\n而且不止一个。\n\n“他们既然留了接应，就不会只守下面。”沈照道，“半井多半还有截人的地方。”\n\n“所以更不能慢。”岳怀川把裂灯咬在齿间，先一步踏上第一枚铁踏，“你跟着我。若下面真有验壳位，先毁锁槽，再抢人。”\n\n验壳位。\n\n这三个字像一根冷针，顺着沈照背脊直扎下去。\n\n他想说“抢的未必还是人”。\n\n喉头却先被怀里那盏小铜灯顶了一下。\n\n白意很沉。\n\n沉得像井底有一只手，隔着多年旧灰和活膏，仍能摸准他现在往下踩的每一步。\n\n沈照吸了一口冷气，踩上第二枚铁踏。\n\n鞋底刚落稳，井壁里忽然扑出一阵极薄的腥风。\n\n不是从下往上。\n\n是从旁边横着钻出来的。\n\n像半腰某处还有一圈藏着不见光的作业环。\n\n岳怀川显然也察觉到了。\n\n他没继续直下，而是身子一偏，贴着第三道绞索往右荡了半步。\n\n白火一扫。\n\n黑里果然浮出一圈窄窄的铜缘。\n\n铜缘后头，是嵌在井腹里的半圈作业台。\n\n台面只够两三个人转身。\n\n边缘挂满了旧钩、短夹、引膏壶和绑人用的皮带。\n\n最里侧还支着一面矮架。\n\n架上平码着四只浅木匣。\n\n三只空。\n\n最下一只却没盖严。\n\n里面白膏翻着红，像刚合到一半又被人匆忙抽走。\n\n“先上去。”岳怀川落到作业台边，手腕一沉，把裂灯压低。\n\n沈照紧跟着翻上铜缘。\n\n脚一落地，他便闻到了更重的味道。\n\n白膏、活血、热铁，还有一种烧过又没烧净的皮肉腥。\n\n这不是存物台。\n\n是给人换膏、补绳、临时验壳用的中腰作业环。\n\n正中那片铜地上，果然刻着一圈早被鞋底磨花的旧字。\n\n沈照俯身抹掉浮灰。\n\n露出来的只剩半行：\n\n`候承立验`\n\n他指节一紧。\n\n“看这里。”岳怀川已经掀开最下那只木匣。\n\n匣子里没有灯。\n\n只有一截被白膏封住的皮套。\n\n皮套内壁嵌着细铜丝。\n\n铜丝尽头是一排更细的倒钩。\n\n尺寸正好能卡住人的肩颈和两侧肋骨。\n\n若真把活人塞进去，再从外头扣膏、上索、接灯，那就不是押送。\n\n是拿人当壳来养。\n\n沈照掌心那道白痕立刻发烫。\n\n不是认得器具。\n\n是这玩意儿也在认他。\n\n他指尖才碰到皮套边缘，耳中便猛地炸开一阵旧井里的索声。\n\n这回比第十四章里那一闪更近。\n\n近得像有人正贴在他耳边说话。\n\n“别让他站到候承位上。”\n\n“那二号怎么办？”\n\n“二号还小，壳不稳，先吊一号。”\n\n“若一号不接呢？”\n\n“那就把名字抹干净，再换一个进去。”\n\n沈照眼前微微一黑。\n\n手却没缩回来。\n\n他咬着牙，硬把那阵旧声顶过去，再往匣底一摸，竟真摸到一张折成三角的小纸签。\n\n纸很薄。\n\n边角全沾了膏。\n\n展开后，只剩几行还能看清：\n\n`丁井`\n\n`活段过环`\n\n`候承暂空`\n\n最后一行被血抹花了大半。\n\n却还能认出两个字：\n\n`二号`\n\n岳怀川眼底冷意一沉。\n\n“候承暂空，说明昨夜下去的不是完整承壳。”他道，“他们把能动的那部分先送到底，留给上头的空位还在。”\n\n沈照喉间发紧。\n\n所以守井人那句“替身”，不是威吓。\n\n而是流程。\n\n就在这时，作业环下方忽然传来一声极轻的滑轮回拽。\n\n不是上头追兵。\n\n是下头的人在收索。\n\n岳怀川抬手便灭了裂灯边上那点白。\n\n整座作业环瞬间又沉回黑里。\n\n只有怀中小铜灯隔着衣料，透出极淡的一点白意。\n\n那点白刚一露头，下方井腹便也回了一下。\n\n不是灯火。\n\n是某种被白膏包着的东西，沿着吊索轻轻一晃，从更深处慢慢升了上来。\n\n先露出来的是木板角。\n\n再往上，是绑板的四道细索。\n\n最后浮出黑面的，竟是一张只够躺半个人的窄吊板。\n\n板上固定着一副半开的白膏皮架。\n\n皮架里压着一团裹得极紧的东西。\n\n不像尸。\n\n也不像完整的人。\n\n更像有人把一个还会喘的躯干从中截住，拿膏和铜丝硬封在了里头。\n\n吊板离作业环还差半丈时，那团东西忽然在白膏里极轻地抽了一下。\n\n不是错觉。\n\n沈照看得分明。\n\n那是一口还没断透的息，在板上挣了挣。\n\n怀里的小铜灯也随之一震。\n\n白意猛地撞上他的肋骨。\n\n几乎是在同一瞬，板上那层白膏里便透出一缕极淡的热。\n\n像里面那东西，也认出了他。\n\n“别出声。”岳怀川低喝。\n\n可已经晚了。\n\n吊板下头忽然传上一声极低的金属碰击。\n\n有人在更深一层敲了两下索环。\n\n下一刻，一道沙哑得分不清年纪的声音便顺着井腹浮了上来。\n\n“上头怎么停了？”\n\n没人应。\n\n那声音又道：\n\n“丁井回板，照规验空。”\n\n沈照和岳怀川对视了一眼。\n\n验空。\n\n说明这块作业环本就该有人接板、查壳、再决定要不要补新的候承。\n\n若让下面那人看见环上没人，立刻就会起疑。\n\n若让他看见环上站着沈照，事情只会更糟。\n\n岳怀川口型一动。\n\n不是说话。\n\n是数息。\n\n一。\n\n二。\n\n三。\n\n话音刚落，他便猛地一脚踢在吊板侧缘。\n\n不是踢翻。\n\n而是把板硬生生荡向作业环内侧。\n\n沈照同时扑上去，借势一把扣住那团白膏皮架边的铜扣，把整块板往自己身前拽。\n\n板很沉。\n\n沉得不像只吊了半个人。\n\n更像把血、膏、骨和灯息一起钉在了一处。\n\n作业环下方立刻传来怒喝。\n\n“谁在上面！”\n\n岳怀川抬手便是一道裂火，顺着绞索往下劈去。\n\n白火没照到底。\n\n却照见井腹更深处另有一圈更宽的平台。\n\n平台边站着两道人影。\n\n一个提索。\n\n一个持钩。\n\n最中间还悬着一口黑色立架。\n\n架子很高。\n\n两臂外张。\n\n正像给活人卡肩收肋用的承灯刑架。\n\n而立架顶端，钉着一块黑牌。\n\n白火照过去的瞬间，牌上字迹一闪而过：\n\n`二候`\n\n沈照胸口重重一沉。\n\n不是怀疑。\n\n是坐实。\n\n他这条命从十二年前开始，就一直在这座井里被人留着一个空位。\n\n下头那人显然也看见了白火。\n\n怒声顿时变了味。\n\n“上头不是回板的人！”\n\n“起锁！”\n\n话音一落，整座作业环下方忽然“咔”地一声。\n\n铜地里藏着的齿轮一起咬合。\n\n沈照脚下一麻。\n\n方才那圈被磨花的`候承立验`四字，竟沿着旧槽亮起了一层极淡的白线。\n\n那不是灯。\n\n是膏里混了某种会认白痕的东西。\n\n白线一亮，沈照掌心那道旧伤也跟着亮。\n\n两边一牵，他半个身子都像被人拽进了铜地。\n\n“退开！”岳怀川喝了一声，反手来抓他。\n\n可那圈白线已经先一步顺着沈照脚边往上爬。\n\n像无数细小的虫，专往骨缝里钻。\n\n沈照眼前一晃，又看见了一截更近的旧景。\n\n同样的作业环。\n\n同样的白线。\n\n只不过那时站在圈里的不是他。\n\n而是一个背影。\n\n那人瘦，高，肩线被白膏压得微微往前塌。\n\n可在白线真正收紧前，那背影忽然回了下头。\n\n没看圈外的执索人。\n\n只看向角落里另一个被按住、尚未应第二声的小孩。\n\n紧跟着，那人猛地一挣。\n\n不是往外逃。\n\n而是主动往更深那口黑架上撞了过去。\n\n撞的同时，有一句几乎要被井声吞没的话逆着岁月冲回来：\n\n“别应二。”\n\n记忆轰地一下断开。\n\n沈照喉间一腥，险些当场跪下去。\n\n一号不是被动被吊下去的。\n\n至少在那一瞬，他自己撞上了承灯位。\n\n为什么？\n\n是替沈照挡。\n\n还是为了把另一个名字也一并埋进井里？\n\n这念头才起，作业环下头又是一声索响。\n\n比方才更急。\n\n下面那两个人已经顺着正吊索往上爬。\n\n而上头那批追进井里的收尾房，也终于摸到工索缝出口。\n\n两头都在合。\n\n岳怀川看了一眼沈照脚边那圈白线，脸色第一次真正沉了下去。\n\n“这不是普通验空。”他声音极低，“他们在借你的白痕开位。再拖三息，你会被整圈认进候承槽里。”\n\n“怎么断？”沈照咬牙。\n\n“污了它。”\n\n岳怀川话落，竟直接把自己左手掌心按进吊板边缘那团半凝的热膏里。\n\n白膏一沾活血，立刻滋地冒出一层细烟。\n\n他反手将那团掺血的膏狠狠抹向地面白线。\n\n白线果然一乱。\n\n却没全灭。\n\n反倒被血一激，顺着铜槽朝那口半开的白膏皮架窜了过去。\n\n板上那团被封住的“活段”忽然更重地抽了一下。\n\n紧接着，一只被白膏裹得只剩半截指骨轮廓的手，竟从皮架缝里慢慢顶了出来。\n\n只有一瞬。\n\n可那根手指，分明朝沈照这边勾了一下。\n\n不是抓。\n\n像在阻他靠近那口`二候`立架。\n\n下方那道沙哑声音第一次透出真怒：\n\n“收板！”\n\n“把二号留下！”\n\n沈照心口狠狠一撞。\n\n对方不是临时起意。\n\n是本来就知道他会来。\n\n或者说，这口井从昨夜起就在等他自己走到候承位上。\n\n岳怀川没给下头第二次起锁的机会。\n\n他一把揪住沈照后领，另一手直接将裂灯砸进吊板与作业环之间的铜钩。\n\n“退！”\n\n白火这次不是劈索。\n\n是顺着整副回板铜扣一起炸开。\n\n吊板猛地一沉。\n\n下方回索的人显然没料到上头会直接断扣，怒吼还没传全，整块板便连着那团活段一起往下一坠。\n\n却没直坠到底。\n\n板刚落半丈，侧边另一道暗扣忽然绷住。\n\n像更深处还有第二重保险，把它半悬在了黑里。\n\n也就是这一下，板上那团白膏包着的东西，被震得偏过半边。\n\n一张只露出下颌和喉结的脸，短短一瞬，从膏里斜了出来。\n\n不是完整人脸。\n\n却足够看出那不是陌生骨相。\n\n沈照瞳孔骤缩。\n\n那喉结下方，赫然有一道和他掌心白痕同源的旧烧纹。\n\n像同一口灯，先在另一个人身上烧过一遍。\n\n“走！”岳怀川厉喝。\n\n上头脚步已近。\n\n下头索声也在重起。\n\n继续留在作业环，只会被当成夹在两头之间的新壳。\n\n沈照猛一咬牙，反手把那张写着`候承暂空`和`二号`残字的小纸签塞进怀里，又抄起木匣里那副最小的皮套。\n\n“你拿这做什么？”岳怀川问。\n\n“既然它会认我，就总有用。”沈照喘得发紧，“要么开路，要么害人，不能留给他们。”\n\n作业环侧后方有一道原本挂工具的窄门。\n\n门后不是路。\n\n是一条只容一人缩肩挤过的检索缝。\n\n方才裂火炸开时，沈照看见缝口里有风。\n\n也有更淡、更冷的一层白意，在黑里时断时续。\n\n像真正藏着养息腹的，不是正井下那块明平台。\n\n而是这条给换膏人巡锁、补槽、偷绕背身的小缝。\n\n“走这边！”他低喝。\n\n岳怀川没有犹豫，先一步侧身撞门。\n\n旧门栓被他一肘撞断。\n\n两人几乎同时挤进缝里。\n\n身后下一刻便有钩铁砸上作业环边缘。\n\n不是一把。\n\n至少三把。\n\n有人从上头落环。\n\n也有人从下头翻板。\n\n缝道窄得像一截死人喉管。\n\n可越往里，白意越清。\n\n沈照怀里那盏小铜灯也不再只是发热。\n\n它开始一下一下，极缓、极沉地跳。\n\n像另一口多年没见光的命灯，正在更深处隔着黑井与膏槽，拿同样的节律回他。\n\n而在那节律底下，竟还压着一道比记忆更轻的、几乎不像活人能发出的声气。\n\n不是从背后。\n\n是从缝道更深处传来。\n\n只短短两个字：\n\n“别应。”\n",
    "outlineExpectation": "沈照与岳怀川顺着工索缝抢到转灯井半腰作业环，第一次正面看见“候承验壳”的中段流程，确认沈照从十二年前起就一直在这口井里被人留着一个可替补的承灯位。章中既要把一号可能曾主动撞上承灯位、替沈照挡过一次“二号应位”的旧影推到明处，也要让井下那口仍会回应的小铜灯把钩子推进养息腹：更深处似乎还有能认出沈照、并劝他“别应”的活证。 "
  },
