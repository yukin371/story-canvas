    "chapterContent": "# 第一章 灯尽人未绝\n\n夜已经很深了，废照棚里却没有半点安静的意思。破木梁被风一吹，便吱呀作响，像一副快散架的骨头。棚下横七竖八躺着十几个人，有人咳得撕心裂肺，有人蜷在草席上发抖，还有人睁着眼直勾勾望着棚顶，像是在等那点吊命的余火自己熄掉。这里住的都是命灯快烧干的人，青烬宗懒得把他们逐出去，便丢在这处废棚里，让他们在山门脚下慢慢烂完。\n\n@{沈照}靠在最里侧的土墙边，膝上搭着一件洗得发白的旧外袍。墙面潮冷，寒气透过布料往骨头里钻，可他连挪一挪的力气都懒得省。胸口那盏命灯像是被谁用指甲掐住了灯芯，时明时暗，每一次跳动都带出肺腑深处的钝痛。三个月前那次替人顶下的封火杂役，本来只是灼坏了半条经脉，后来欠下灯债，命火一日日往下塌，到如今，连最下等的外门药汤都快压不住这股空烧的劲了。\n\n棚门口忽然传来一阵低低的哭声。一个瘦得只剩骨架的少年抱着膝盖，喃喃说自己不想死在这里，不想连尸骨都被拖去喂炉灰。旁边没人安慰他。大家都知道，外门里最便宜的不是杂役，也不是伤药，而是这种命灯将熄的人。活着时拿去顶脏活，死了再记一笔“宗门抚恤”，账面反倒更好看。@{沈照}听着那哭声，眼神没动，只是把袖口往手腕上拢了拢。他不是不怕死，是怕得太久，怕意早就被磨平了。\n\n他原本还有一个能稍微撑住的念头。只要挨到下月初，或许能想法子去外山接一趟短差，换点灯油回来，再偷一两日命。但这个念头刚起，就被胸腔里那一阵剧烈的空灼掐断了。喉间涌起铁锈味，@{沈照}偏头咳出一口发黑的血。血落在地上，竟比油还亮，映出他自己苍白得近乎死气的脸。棚里有人看过来，很快又移开目光。这样的血，他们见得太多了。\n\n破门被人一脚踹开时，棚里的咳喘声瞬间压了下去。进来的是@{庄无烬}，外门执事，袖口整齐，靴底干净，和这满棚子的潮气与病气格格不入。他扫了一眼棚内众人，像是在挑哪块木头还能再丢进火里。最终，他的目光落在了@{沈照}身上。“还没死？”他说这话时甚至没带情绪，“正好，旧炼灯炉场那边出了裂火，今晚缺个去压炉灰的人。你去。”\n\n棚里顿时更安静了。谁都知道那不是压炉灰，那是去填命。旧炉场废了很多年，里头积的不是灰，是旧火、怨气和没散尽的灯煞。前两个月有个外门弟子被扔进去清炉，第二天抬出来的时候，胸口灯窍都烧成了黑洞。@{沈照}抬眼看着@{庄无烬}，脸上没有求情的神色，只问了一句：“若我压住了，欠灯库的那两盏下等油，可算清么？”@{庄无烬}像是听见了什么笑话，嘴角一扯：“你若能活着回来，自然好商量。”\n\n门外忽然传来一声嗤笑。站在夜色里的，是外门近来最得势的弟子@{祁连烛}。他披着半旧的乌纹外袍，抱臂倚在门框边，像是特地来看一场戏。“庄执事，这种快熄的灯，还值得往旧炉里送？”他看着@{沈照}，眼神里没有恨，只有一种把人当成废料称斤论两的轻慢，“依我看，三息都撑不过。何必浪费炉场通牌。”\n\n他说完，又把一只旧铜牌扔到@{沈照}脚边。铜牌上刻着早已斑驳的炉纹，边缘还有暗红的焦痕。那是旧炉场的临时通牌，只有被派去送命的人才会拿到。@{沈照}盯着那牌子看了片刻，弯腰把它捡起来，掌心却被金属里的寒意扎得一缩。那不是普通的冷，像有谁隔着铜牌在摸他的骨头。棚里有人低声骂了一句，又很快闭嘴。@{庄无烬}已经转身往外走，只留下一句：“天亮前不回来，便当你自己跳了山。”\n\n从废照棚到旧炼灯炉场不过半刻路，@{沈照}却走得像踩在一层薄冰上。山道两侧风灯稀疏，灯焰被夜风吹得东倒西歪，映得脚下石阶忽明忽暗。越靠近旧炉场，空气里的焦糊味越重，里面还掺着一点说不清的甜腥，像旧血长年闷在火里烤出来的味道。山门里的人都说旧炉场只是废弃了，其实谁都知道，那里被弃下的不只是几座炉子，还有许多本该有名字的人。\n\n走到半途时，后山忽然敲了一声短钟。那是外门夜禁前最后一次巡山钟，钟声一落，旧炉场外围的封山火纹就会彻底合拢。若里面的人还没出来，便会被一并锁死在裂火区，第二天是活是焦，宗门只看结果。@{沈照}抬头望了一眼远处山脊，夜色沉沉，没有半点退路给他留着。他这才明白，@{庄无烬}从一开始就没打算让他活着回来。\n\n炉场入口塌了半边，断墙后露出一座黑沉沉的旧炉。炉身裂开了一道长口，里头有暗红色的火纹一闪一闪，仿佛深处有什么东西正在失控。地上散着一层厚灰，灰里偶尔会浮起一点微亮的火星，明明没有风，却偏偏会朝人脚边贴。@{沈照}才跨进去两步，胸口命灯便猛地一沉，像是被那道裂口盯住了。他知道不对，却没有退路。外门弟子的命，向来只分能烧多久，不分该不该烧。\n\n他在旧炉前站定，把那块铜牌按进槽口。下一瞬，整座炉场像被惊醒了一样，裂开的炉纹同时亮起，沉积多年的旧火从缝隙里呼啸冲出，直接扑向他胸前命窍。那一刻，@{沈照}甚至没来得及生出恐惧，便先听见了自己经脉崩开的细响。热意不是从外往里烧，而是从骨缝、从血肉、从灯窍深处同时炸开，像有人捏着一把滚烫的铁砂灌进了他的四肢百骸。他单膝跪地，手指死死抠进灰里，喉间一甜，血就顺着嘴角涌了下来。\n\n旧炉里的火却没给他喘息的机会。那些暗红色的火纹攀上他的手背、手臂、脖颈，像活物一样往命窍里钻，恨不得把他胸口最后一点余火也连根扯走。裂火撞进命窍的一瞬，@{沈照}忽然明白了为什么旧炉场最爱吞他这种人。将熄的命灯最轻，也最薄，像一层快破的纸，只要火势再猛一点，便能把一个人的寿数、骨血和最后一点自我一起卷进去，连挣扎都不会留下。\n\n可也正因为太薄，那一下撕裂便格外清楚。@{沈照}眼前发黑，耳边却忽然响起了一阵极轻的金石摩擦声，像有人在很远很远的地方擦亮一盏灯。不是幻觉。那声音一响，扑进他胸口的旧火竟有了一瞬迟疑，仿佛在畏惧什么。@{沈照}本能地想挣开，可那声音反而越来越近。下一刻，他胸膛深处某个原本早该空掉的位置，竟真的亮起了一点极细的光。\n\n那点光起初像针尖，随后却在剧痛里稳稳撑开。不是青烬宗常见的赤焰，也不是灯库油火那种混浊的黄，而是一种冷得近乎苍白的微光，像雪下的余烬。它一亮，扑向@{沈照}命窍的旧火竟硬生生顿了一瞬，紧接着像被谁反手拽住一般，沿着他的经脉倒卷回去。更可怕的是，@{沈照}分明感觉到那盏新亮起的东西不是在救他，而是在翻看他。它顺着血、顺着骨、顺着记忆一寸寸掠过去，像在挑拣什么，最后从他心底硬生生扯走了一块东西。\n\n就在那一块东西被扯离的瞬间，旧炉最深处忽然传来一声极轻的裂响。像是什么封得很久的东西，被这盏灯照见了一缝。@{沈照}听不清那声音，却清楚感觉到一股陌生的恶意从黑暗里擦过他的后颈，短得几乎抓不住，却比旧火更危险。那不是炉火能有的东西，更像有谁隔着很多年、很多层灰，在炉底睁开眼看了他一瞬。\n\n炉场里安静下来的时候，天边还没亮。@{沈照}趴在灰里，浑身都像被拆过一遍，胸口却真的还在跳。那盏本该熄灭的命灯没有灭，反而在极深处留下了一点极难察觉的余白光。他撑着地慢慢坐起来，先摸了摸自己的心口，又摸了摸袖里的旧铜牌，最后才后知后觉地发现，自己忘了什么。那不是名字，也不是一句话，而是一段本该很重要、很不该丢的旧事。明明它方才还压在他心里，沉得像块石头，可此刻想去抓时，只剩下一片空白。@{沈照}望着旧炉裂口中渐渐黯下去的火纹，第一次生出一种比等死更冷的念头。\n\n如果方才真有东西在炉底看他，那是谁？如果这盏灯会替他活命，又为什么要先从他身上拿走一块记忆？这不是白捡来的生路，更像有人把一把锁塞进了他胸口，再顺手拿走了开锁前最重要的一页纸。@{沈照}扶着炉壁站起身，听见远处第二声短钟传来，心里竟比刚才临死时还冷。危险并没有过去，它只是换了一张脸，开始跟着他一起呼吸。\n\n青烬宗北侧山脊上，夜风卷过残雪。有人在黑暗里睁开眼，垂眸望向旧炉场的方向。那人掌中原本熄着的铜纹忽然亮了一点苍白的线，细得像针。片刻后，他指腹压住那道细线，低低吐出一句：“总算有回响了。”  \n\n他活下来了。可从这一刻起，活着这件事，显然已经不是白来的了。\n",
    "outlineExpectation": "先立住沈照命灯将熄的死局、青烬宗底层的燃命秩序，再让不灭残灯在濒死中第一次回应，留下“他活了，但丢了什么”的钩子。"
  },
