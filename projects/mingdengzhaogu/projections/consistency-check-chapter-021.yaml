    "chapterContent": "# 第二十一章 锁梁抢人\n\n“快！”\n\n@{岳怀川}压在前头的催声还没散。\n\n第二十章页腹尽头那句“上头那口梁在回紧”，像还贴在返槽两侧的黑壁上。\n\n他们才从真原簿掉头往上冲，这条返槽就已经不再像路。\n\n更像一截正往回合的骨缝。\n\n两侧黑壁一直在缓慢挤紧。\n\n拖板早在半途就卡住了。\n\n@{岳怀川}先翻上去，单手扣住壁上凸出的旧钉，回头朝沈照压了压手。\n\n“别踩中缝。”\n\n“这条槽在回收。”\n\n沈照没废话。\n\n他把怀里那片页芯往衣内更深处一塞，贴着右侧石棱往上挪。\n\n石面冷得发硬，不是井下那种潮寒。\n\n更像有人把一层薄纸按在骨头上，再一点点往里透。\n\n他手指刚扣稳，掌心忽然一滑。\n\n不是石上有水。\n\n是他本能地想换另一只手去接，脑子里却空了一瞬。\n\n像曾经有过一个极熟的动作。\n\n寒夜里先把什么温热的东西捧稳，再缩回袖里，免得热跑掉。\n\n可现在，他只记得“捧稳”。\n\n不记得捧的是什么。\n\n那一下空得太突兀。\n\n沈照肩背险些擦中中缝。\n\n缝里立刻有极细的白丝朝外探。\n\n岳怀川反手一灯，白意贴着缝口一抹，才把那几缕刚露头的丝压回去。\n\n“你又被拿走了什么？”\n\n“一点热。”\n\n沈照稳住身，继续往上。\n\n说完这句，他自己都觉得古怪。\n\n不是一句完整的实话。\n\n可他现在能说出来的，也只有这么多。\n\n那只粗陶碗的分量、碗沿硌掌的粗糙、雪夜里被他护在怀里不肯立刻喝掉的珍惜，都像隔着一层蒙白的旧纸。\n\n看得见轮廓。\n\n摸不着心口那点该有的暖。\n\n返槽越往上，合口声越重。\n\n咔。\n\n咔。\n\n像一根根原本被他们在下头扯乱的梁锁，正在重新找位。\n\n岳怀川贴着前壁停了一瞬。\n\n“听见没有？”\n\n沈照也听见了。\n\n不止锁声。\n\n上头还夹着白帘被扯动的闷响。\n\n以及某种很轻、很密的摩擦。\n\n像许多细线正从墙里抽出来，一层层往同一个地方缠。\n\n再晚半息，一号就不是被吊在上头。\n\n而是会被这些线连着页、连着梁，一起缝回那口再也撬不开的旧位里。\n\n一号。\n\n这念头刚起，胸前那片页芯便跟着热了一下。\n\n烫意不重。\n\n却准。\n\n像一截活着的针，隔着衣料，正往左上方微微偏。\n\n“它在认路。”沈照低声道。\n\n岳怀川瞥了他胸口一眼。\n\n“认的不是路，是缺口。”\n\n“上头若真在补一号，这东西会先热。”\n\n“别让它直接贴肉太久。”\n\n沈照嗯了一声。\n\n可刚应完，他就觉出那片页芯比方才更活。\n\n仿佛下面那张被断了一枚骨钉的厚活页，并没有因为他们离开而彻底合上。\n\n它还在更深处喘。\n\n而这口喘，顺着页芯一路追到了他胸里。\n\n返槽再往上十余步，黑壁忽然分出两岔。\n\n一道直上。\n\n一道朝左横切。\n\n直上的那条更窄，缝口里白丝翻得快，像已经快与上头总簿井的乱流重新接上。\n\n左边那条则低矮许多，边缘全是被人反复踩亮的磨痕。\n\n岳怀川伸灯一照，只照见半枚被刮去字面的旧铁牌。\n\n牌角留着一个残缺的“返”。\n\n“补梁人走的侧返道。”\n\n“直上会撞回总簿井。”\n\n“走左边。”\n\n两人同时矮身钻了进去。\n\n这道侧返比簿脊返槽更短，也更险。\n\n脚下不是整石。\n\n而是一截一截嵌在壁里的薄木踏。\n\n每踩一步，木里便有闷沉的回响往深处传。\n\n像有人在替他们数。\n\n数还差几步，就该回到原位。\n\n沈照走到第五踏时，忽然听见前头传来一声极短的闷哼。\n\n不是岳怀川。\n\n也不是追兵。\n\n更像喉咙被什么勒紧后，硬从齿缝里挤出来的一线气。\n\n他脚下一顿。\n\n岳怀川已经抬手压住。\n\n“快到了。”\n\n“一号还活着。”\n\n再往前，侧返道尽头的黑忽然被一片惨白顶开。\n\n不是灯。\n\n是廊。\n\n是他们之前来过的那条悬腹廊。\n\n可眼下的悬腹廊，已经和下潜前不一样了。\n\n原本垂在两侧的白帘全都被卷上了梁腹。\n\n一排排待转旧笼正顺着轨槽慢慢滑动。\n\n每只笼底都拖着细长的白线。\n\n那些线没往下。\n\n全在往廊中央那具吊着的人影身上汇。\n\n一号还在原处。\n\n却不再只是被主索悬着。\n\n他两肩、两腕、喉下，已经多出四道新缠上的白索。\n\n索上还沾着刚抽出来的湿亮。\n\n像这地方正趁锁梁回紧，把他重新往某个旧位里缝。\n\n更糟的是，廊尽头那面写着“回册者止”的黑木牌已经裂开。\n\n牌后露出三道半人高的瘦影。\n\n像人。\n\n又不像活人。\n\n它们身上披着发灰的旧罩衣，脸却被白纸蒙死，只在口鼻位置烧出两个细孔。\n\n每个纸面中央，都钉着一枚米长短的骨钉。\n\n手里则各拖着一轴细索轮。\n\n索轮转一格。\n\n一号身上的白索便紧一分。\n\n“守梁役。”岳怀川声音极低。\n\n“不是活人，只认流程。”\n\n“要么斩轮，要么断副索，不能硬砍主索。”\n\n沈照盯着一号喉下那几道新缠上的白索。\n\n他怀里的页芯正在一下下发热。\n\n热意并不冲一号胸口。\n\n而是冲左肩下第三道副索去。\n\n那道索比其他几道更细。\n\n却最亮。\n\n几乎像刚从真原簿页腹里抽出来的新丝。\n\n一号也在这时睁开了眼。\n\n那双眼比先前在白帘后更浑。\n\n可看见沈照和岳怀川时，还是狠狠定了一下。\n\n“别碰主索……”\n\n他喉咙被勒得厉害，每个字都像带血沫。\n\n“左三……右二……先断……”\n\n“断慢了，它就合口。”\n\n守梁役显然也听见了动静。\n\n最左边那道瘦影猛地转头。\n\n纸面上的两个细孔黑得发沉。\n\n下一瞬，它手中索轮骤然急转。\n\n一号左肩那道副索立刻绷直。\n\n沈照几乎没有多想，翻手便把那块崩了一角的骨片掷了出去。\n\n骨片不锋利。\n\n却正好卡进索轮齿缝。\n\n“当”的一声脆响。\n\n那道守梁役半边手臂都被扯得一歪。\n\n岳怀川同一时间扑向右侧。\n\n裂灯不去烧纸面，专劈它拖在地上的第二轴索轮。\n\n白意落下，索轮外圈炸开半环。\n\n廊中细索乱抖。\n\n一号右腕那道副索顿时松了一寸。\n\n可中间那道守梁役却没退。\n\n它猛地朝前一跨，纸面上那枚骨钉亮了一下。\n\n整条悬腹廊的梁腹同时发出一阵低鸣。\n\n沈照后颈骤寒。\n\n他听见了和返槽里一样的合口声。\n\n只是这一次，声音更近。\n\n就在一号身上。\n\n一号喉下那道主索后头，不知何时竟又浮出一截淡白的页边。\n\n像只要四道副索全部合紧，那张被吊着的人，就会顺势往那一页里折回去。\n\n“沈照！”岳怀川喝了一声。\n\n“左三！”\n\n沈照已冲到了廊中央。\n\n他没有去看那张浮出来的页边。\n\n第一眼太像诱。\n\n他只盯着页芯发热最烫的位置。\n\n就是左肩下那道第三副索。\n\n那索外头裹着一层新补的白丝，里芯却隐约透出旧黄。\n\n像年头更早，也更脆。\n\n沈照扑上去时，中间那道守梁役抬手便抓。\n\n五根手指又细又硬，像五截被削薄的骨签。\n\n若被它扣实，半边肩都得给它钉住。\n\n沈照没有躲全。\n\n他只偏开喉颈，把左臂硬迎上去。\n\n“嗤”的一下。\n\n罩衣底下那截骨指直接钉进了他臂外的皮肉。\n\n疼意直窜上肩。\n\n可也正因为这一顿，他手里短刀终于送到了那道左三副索上。\n\n一割。\n\n没断。\n\n那不是绳。\n\n更像被浸过页浆的筋。\n\n沈照咬紧牙，反手将页芯隔着衣料往索上一按。\n\n热撞热。\n\n那道最亮的副索顿时像被认出了来处，猛地一颤。\n\n亮意一散。\n\n刀再落下时，终于切了进去。\n\n“咔！”\n\n左三断。\n\n一号整个人猛地往右斜坠。\n\n中间那道守梁役发出一声极怪的嘶音。\n\n不像痛。\n\n更像流程里某一格被人强行撕掉后的空响。\n\n“右二！”一号艰难吐字。\n\n“快！”\n\n岳怀川早已逼近另一侧。\n\n他脚下一挑，把一只滑来的旧笼踹翻，正正卡住右边守梁役的下盘。\n\n那东西被绊得一晃。\n\n裂灯白意立刻从它膝下掠上，将右二副索照得纤毫毕现。\n\n沈照顺势扑过去。\n\n这一次，中间那东西仍不肯放。\n\n它手臂一折，钉在沈照皮肉里的骨指竟要往更深处钻。\n\n沈照眼前一黑。\n\n那一瞬，他竟忽然想到那只记不起内容的粗陶碗。\n\n若那点暖还在。\n\n他大概会本能地护着手，护着这点还能接住什么的热。\n\n可现在没有。\n\n空白像一层发冷的壳，把疼和惜都隔薄了半层。\n\n他反而更狠。\n\n左臂不退，右手提刀直切右二。\n\n“断！”\n\n这一刀下去，右二应声崩开。\n\n四道副索瞬间乱成一团。\n\n一号喉下那截刚浮出的页边还没来得及彻底展平，便被失去平衡的主索猛地一带，反向卷了回去。\n\n整个悬腹廊轰然一震。\n\n若再慢半息，这一卷就该先落在一号身上。\n\n梁腹上卷起的白帘齐齐落下半截。\n\n三道守梁役像同时被抽掉了脊。\n\n最左那道先是僵住。\n\n随即纸面自中间裂开一道细口。\n\n没有血。\n\n只有一撮撮被烧成灰白色的旧纸屑，从裂口里往外漏。\n\n“主索还在！”岳怀川喝。\n\n“接人！”\n\n不用他说，沈照已经扑到了主索下。\n\n一号坠得不算快。\n\n可他身上剩的不是完整人重。\n\n落到半空时，半边肩背竟像被抽去了骨，轻得发飘。\n\n沈照伸手去接。\n\n碰到的第一下不是肉。\n\n是冷。\n\n是那种在真原簿页腹里摸过活页之后，还残在指缝里的纸冷。\n\n他心头微沉，还是把人稳稳兜住。\n\n岳怀川随即一灯斩上主索。\n\n主索比副索难断得多。\n\n一灯只劈开外皮。\n\n里面竟还有一股极硬的黑芯。\n\n那芯一露，沈照怀里的页芯就跟着剧烈一烫。\n\n一号脸色瞬间变了。\n\n“别让它……照着页芯！”\n\n“那是引回去的……正梁芯！”\n\n岳怀川闻言立刻偏灯。\n\n不再直斩黑芯，而是顺黑芯外头那层已裂开的白皮快速剥。\n\n剥到第三层，里头果然露出一枚极小的旧铜扣。\n\n像有人曾用它把整条主索和别的什么地方暗暗连死。\n\n沈照只看了一眼，就认出来了。\n\n那铜扣样式，和总簿井底黑轴边挂着的旧扣一模一样。\n\n一号果然一直被和下面那套真页流程一并拴着。\n\n“扣子给我。”\n\n沈照把一号往肩上一压，腾出一只手。\n\n岳怀川没问，裂灯立刻点在铜扣侧边。\n\n铜扣遇白意发红。\n\n沈照抬刀，借热一撬。\n\n“叮”的一声轻响。\n\n铜扣终于崩飞。\n\n主索这才真正散力。\n\n剩下半截断绳似的软下来，被岳怀川两下剥开。\n\n一号彻底落地。\n\n也就在他双脚碰到廊面的那一刻，整条悬腹廊深处忽然响起了更沉的一声鼓索。\n\n不是这三道守梁役。\n\n像更远处，还有真正的人听见了这边断梁。\n\n岳怀川抬眼望向廊尾。\n\n“追的人到了。”\n\n“先走。”\n\n一号刚脱索，连站都站不稳。\n\n他喉下勒痕深得发紫，左肩那块肉更像被旧页泡过，发着不正常的白。\n\n可他一落地，第一件事竟是伸手去抓沈照胸口。\n\n不是抢页芯。\n\n是隔着衣料，死死按住那片还在发热的位置。\n\n“别一直贴着。”\n\n“它不是证。”\n\n“是钥匙。”\n\n沈照看着他：“开什么？”\n\n一号唇角动了动，像想笑，又根本没力气成形。\n\n“开缺的那一页。”\n\n“谁缺，它就往谁身上合。”\n\n这句一出，沈照立刻想起方才活页扑来的那缕白丝。\n\n不是在认他。\n\n是在找能补上的空位。\n\n而他身上，被后补、改列、留验一路钉到现在，本就是最大的空位。\n\n一号手指还压着那片页芯，没有松。\n\n“照生不是术。”\n\n“也不是你。”\n\n“是那个人留在原页上的尾名。”\n\n“姓……当年就被割走了。”\n\n他说到这里，气息狠狠一断，喉间又涌上一口血腥。\n\n岳怀川扶了他一把。\n\n“你还记得多少？”\n\n一号闭了闭眼。\n\n“不够多。”\n\n“只记得那夜……他们不是要补完我。”\n\n“是要拿我先钉住梁，再把后补的二……往那口缺页里送。”\n\n“我撞上去，只是把这一步拖断了半截。”\n\n沈照指节一紧。\n\n这比“挡了应二”更具体。\n\n一号当年挡的，不只是一个位。\n\n而是整套把后补二名往真页缺口里塞的最后一步。\n\n难怪他会被一直吊到现在。\n\n难怪总簿认的是“照”，真原簿贴的是“照生”，而他沈照夹在中间，总像差着最后那一下。\n\n廊尾那阵鼓索声越来越近。\n\n白帘后，隐约已有灯光晃了一下。\n\n不是守梁役这种旧规死物。\n\n是真有人在追。\n\n岳怀川立刻下决断。\n\n“边走边说。”\n\n“这廊还有没有不认梁的地方？”\n\n一号睁眼朝右侧那排待转旧笼后看去。\n\n“笼后……有条免签缝。”\n\n“给废页、废人……先丢进去等销。”\n\n“梁眼短时照不到。”\n\n岳怀川架起他就走。\n\n沈照跟在左侧，顺手把那枚崩飞的旧铜扣也捡了起来。\n\n铜扣入手发沉。\n\n扣心内侧隐约刻着两个极浅的小字。\n\n不是完整号。\n\n只剩一横一点，和半个弯钩。\n\n像又是一段被剐掉前名的残渣。\n\n三人刚绕过翻倒的旧笼，后头白帘便被人一把掀开。\n\n两道持灯人影冲了进来。\n\n衣色灰白。\n\n腰间却都挂着照命司样式的旧扣。\n\n不是岳怀川带来的明面人。\n\n更像这些年一直在替这处旧流程收尾的暗手。\n\n其中一人刚看见地上断开的主索，脸色就变了。\n\n“梁断了！”\n\n“先拿页芯！”\n\n这一句比什么都更快。\n\n沈照心口骤紧。\n\n对方根本不先追一号。\n\n先追页芯。\n\n这说明他们知道下面真原簿已经松了一钉，也知道那片薄页能干什么。\n\n岳怀川回身便是一灯。\n\n白意横扫，把前头那人逼得偏脸。\n\n另一人却不硬闯，反倒抬手抛出一把细钩。\n\n细钩不冲人。\n\n直冲沈照胸口。\n\n像早就知道钥匙在谁身上。\n\n沈照侧身闪过一枚。\n\n第二枚却擦着衣襟挂住了布料。\n\n他反手一扯，衣前立刻裂开一道口子。\n\n怀里的页芯险些滑出。\n\n也就在这一瞬，一号突然撑着最后一点力气，抬手朝那把细钩一指。\n\n“钩尾有回册灰！”\n\n“别让它沾页芯！”\n\n沈照刀光一转，直接把被挂住的那截衣摆削断。\n\n断布连着细钩飞了出去，落地便冒起一层极淡的白烟。\n\n真有灰。\n\n若方才让它碰到页芯，后果只怕比断条衣襟大得多。\n\n“进去！”\n\n岳怀川一脚踹开右侧最里那只旧笼。\n\n笼后果然露出一线只能容人侧身挤入的黑缝。\n\n缝边钉着半块歪斜木牌。\n\n上头残着两个字：\n\n`免签`\n\n沈照先把一号送了进去。\n\n岳怀川断后。\n\n他回手又斩出一灯，这才矮身钻入缝中。\n\n外头立刻响起脚步和厉喝。\n\n可那两人追到缝口时，竟真像被什么旧规绊住，只敢把灯往里照，却没能立刻踏进来。\n\n免签缝里窄得厉害。\n\n三个人几乎只能贴壁喘。\n\n沈照那条被骨指钉穿过的左臂这时才后知后觉地发起木。\n\n血顺着袖里往下淌。\n\n他下意识想像从前那样，把那点还能稳手的暖意往掌心里聚一聚。\n\n可胸口里回应他的，只有那片页芯隔着衣料传来的干烫。\n\n以及更冷的一层空白。\n\n最前头的一号缓了两口气，忽然低低咳了一声。\n\n这声咳不响。\n\n却让他唇角终于带出一点活人的血色。\n\n“他们不敢久照。”\n\n“这里原本就是丢废页的……”\n\n“照久了，连自己名下那页都可能脏。”\n\n岳怀川没有放松。\n\n他侧耳听着外头。\n\n“他们会去堵另一头。”\n\n“你若还能说，就把最紧要的说完。”\n\n一号沉默了几息。\n\n再开口时，声音比方才更轻，却也更直。\n\n“别再把细纲当死路走。”\n\n他像是根本没在回答岳怀川。\n\n而是在盯着沈照。\n\n“当年他们能把二往缺页里送，就是因为每一步都给人订死了。”\n\n“你只要照着它要的那条路走，它就会越来越顺。”\n\n“下回再见真页，别只问它给什么答案。”\n\n“要先看……它为什么急着让你那样选。”\n\n沈照一怔。\n\n这话不像旧规。\n\n更像活人。\n\n像一个当年真替他撞断过半步流程的人，到现在还在提醒他，别再被流程牵着鼻子走。\n\n而这提醒，正正压在他刚做出的那个“先救人再回拆真原簿”的选择上。\n\n不是所有偏离，都会坏。\n\n有些偏离，本身就是不被补完的唯一法子。\n\n一号说完这句，眼里的神就散了一点。\n\n可他还是强撑着，又补了最后一句。\n\n“还有……”\n\n“若再看见那张真页，先找姓。”\n\n“尾名能认人。”\n\n“姓，才认债。”\n\n外头脚步声忽然齐齐一转。\n\n像真有人绕去前头堵出口了。\n\n同一时间，更深的免签缝尽头，也传来一声极轻的落物响。\n\n不像石。\n\n像一小片金属，碰到了地。\n\n三人同时抬眼。\n\n黑缝更深处，看不见人。\n\n只看得见一点极淡的冷光，像有谁把另一枚旧铜扣，轻轻放在了前头的地上。\n\n然后退走了。\n\n一号眼底猛地缩了一下。\n\n“不是他们。”\n\n“那是……当年递线的人。”\n\n岳怀川握灯的手微微收紧。\n\n沈照则低头看了一眼自己掌心里那枚刚捡来的旧扣，又看向前头那点新落下的冷光。\n\n两枚扣。\n\n两条线。\n\n都在把他们往更深一点、也更真的旧名上引。\n\n而外头，堵缝的人已经开始试着从另一头撬开免签缝。\n\n他们刚把一号从梁上抢下来。\n\n新的追路，也已经在黑里张开了口。\n",
    "outlineExpectation": "承接第二十章末尾的返槽上行，沈照与岳怀川必须在锁梁回紧前从悬腹廊把一号抢下来。章中既要让真页代价在行动里具体显形，也要让一号把“照生只是尾名”“后补二名被送去补缺页”的机制再钉实。章尾要让三人带着页芯、旧扣和免签缝里的新递线人线索继续逃，从而把更深旧名与照命司暗手一起推到下一章。 "
