    "chapterContent": "# 第九章 转押灯廊\n\n那卷写着“旧案重开，留验转押”的灰纸令收起之后，屋里静得比方才更薄。\n\n像一层结了霜的水。\n\n一碰就会裂。\n\n@{沈照}没再去问那一号是谁。\n\n不是不想。\n\n是他忽然明白，方才那句“留验二号”一旦落实，若真有人急着把他收走，那一号这个名字，多半也不是问出来的。\n\n得从押他的人手里，自己看。\n\n@{岳怀川}像是看穿了他这一瞬的念头。\n\n“今夜就走。”他说。\n\n@{沈照}抬眼：“不是补录口供？”\n\n“路上也能录。”\n\n“你刚才还说，我在你灯下。”\n\n“现在也是。”@{岳怀川}道，“正因为在我灯下，才不能等到明早。”\n\n这句话落下来，分量比那卷灰纸令更实。\n\n不是吓人。\n\n是交底。\n\n等到明早，变数会更多。\n\n盯着他的，不只是外门。\n\n也不只是照命司外头那群人。\n\n“司里来的人，不可信？”@{沈照}问。\n\n@{岳怀川}没有直接答。\n\n他只把案上的留验簿合起，又将那卷调令收回铁匣，声音平得像在说一件再普通不过的事：“可信的人，不会催着我在青烬宗里当夜转押。”\n\n话到这里，已经够了。\n\n再往下，便是照命司自己的脏水。\n\n沈照没追。\n\n他只是在心里把这一夜重新压实了一遍。既然这条转押路已经压到脚下，他就得顺着它，把那一号也从旧案里逼出来，再低头看了看自己垂在袖中的右手。\n\n那道白痕自从见了旧编号后，便没再真正冷下去。\n\n它不烫。\n\n却像一根细针，一下一下，顶着掌心往里扎。\n\n像在催。\n\n催他快些跟过去。\n\n“走之前，我要拿一样东西。”@{沈照}道。\n\n@{岳怀川}看着他：“那半页？”\n\n“不是。”\n\n“那是什么？”\n\n“药。”@{沈照}说，“我肺口那点旧伤若在路上翻起来，二号没押到地方，先死半道，司里不好交代。”\n\n这句话半真半假。\n\n真的是他确实需要药。\n\n假的是他更想趁挪动前，把那半页旧录换个地方藏。\n\n袖里太显。\n\n一旦真有人半路接手，先搜的便是他身上。\n\n@{岳怀川}像也知道他不会只拿药。\n\n可他没有当场拆穿。\n\n他只起身，把那盏白罩灯提了起来。\n\n“我陪你去。”@{岳怀川}说。\n\n“看得倒紧。”@{沈照}道。\n\n“你现在值这个价。”\n\n这话冷。\n\n可沈照听完，心里反倒更定了一层。\n\n至少这一路上，岳怀川确实不想让他丢。\n\n账房门一开，外头夜气立刻灌了进来。\n\n比白日深。\n\n也更冷。\n\n照命司临征的偏屋在东边，往废照棚去要先穿一道半塌的旧灯廊。\n\n廊上悬着三盏窄灯。\n\n灯焰都压得很低。\n\n像怕照见什么不该照见的东西。\n\n门边还守着那两名照命司弟子。\n\n见@{岳怀川}提灯出来，其中一人立刻上前：“巡使，司里来使已在东坡门候令。”\n\n来得比想的还快。\n\n@{岳怀川}嗯了一声：“先候着。”\n\n那弟子一怔：“可对方带了司印……”\n\n“我说先候着。”\n\n不高。\n\n却硬。\n\n那弟子立刻低头，不敢再追。\n\n@{沈照}跟在一侧，没说话。\n\n可他把这一句听得很清。\n\n东坡门已有人等。\n\n说明这场转押，果然不是只写在灰纸令上的空话。\n\n夜风一过，廊下纸灯轻轻晃了一下。\n\n@{沈照}刚迈出第二步，掌心白痕便猛地抽了一记。\n\n不是热。\n\n是紧。\n\n像有一根旧线，从廊子更深处往他骨头里拽。\n\n他脚下一顿。\n\n@{岳怀川}侧头看他：“怎么了？”\n\n“这廊子……”@{沈照}皱了皱眉，“从前押过留验？”\n\n@{岳怀川}眼神微变。\n\n“你怎么知道？”\n\n“不知道。”\n\n@{沈照}慢慢张开手，又重新握紧，“只是这地方像认得我。”\n\n他这句不是装。\n\n越往里走，那道白痕便越像被什么旧东西隔墙碰着。\n\n很轻。\n\n却一下一下，不曾断过。\n\n灯廊两侧都是早年弃下的偏房，木门发黑，门楣上还残着旧火纹。\n\n有几扇门上，甚至还能看见被刀鞘磨出来的浅印。\n\n不是外门役弟会碰出来的东西。\n\n更像常年有人守过、押过。\n\n“青烬宗早年借照命司封过几回异灯卷地。”@{岳怀川}提着灯往前，淡淡道，“这条廊原本就是临押留验的路。”\n\n临押。\n\n不是收容。\n\n也不是护着。\n\n@{沈照}心里冷笑了一下。\n\n原来十二年前，他八成也从这里走过。\n\n只不过那时的他太小，或太乱，没把这点霉味和冷灯记下来。\n\n可残灯记下了。\n\n白痕也记下了。\n\n两人走到廊中段时，西侧忽然传来一声极轻的响。\n\n像什么东西在木梁上蹭了一下。\n\n@{沈照}眼神一抬。\n\n没有人影。\n\n只有一小撮新灰，从横梁缝里慢慢落下。\n\n灰落到白灯边沿，又被风卷开。\n\n很薄。\n\n薄得和西边旧账房梁上那女人脚下抖落的，几乎一样。\n\n他眸子一缩。\n\n那女人竟还在跟。\n\n@{岳怀川}也停了一步。\n\n“出来。”他没回头，只对着横梁上方道。\n\n没人应。\n\n廊顶安静得像空的。\n\n只有那点灰，慢慢沉到底下砖缝里。\n\n“你的人？”@{沈照}低声问。\n\n“不是。”\n\n“那你还敢今夜带我走？”\n\n“正因为不是我的人，才更要今夜走。”\n\n他这话一出口，廊外忽然传来一道急促脚步。\n\n先前门边那名照命司弟子快步追上来，声音压得很低，却掩不住发紧：“巡使，东坡门那边又催了。来使说此案不得过夜，若再拖，便按违令记。”\n\n@{岳怀川}脚步没停。\n\n“让他记。”\n\n那弟子僵了一下。\n\n大概没见过有人把照命司的违令记得这么轻。\n\n“还有，”@{岳怀川}又道，“从现在起，东坡门那边任何人不得近这条廊。谁硬闯，先封灯。”\n\n“是。”\n\n人退走后，廊里的气却没松。\n\n反而更紧。\n\n因为现在谁都知道，东坡门那拨人和岳怀川已经顶上了。\n\n@{沈照}心里那层算愈发清。\n\n若他只是个普通留验，绝不值得两拨照命司自己先掐起来。\n\n这一点，比任何解释都硬。\n\n走出旧廊，前头便是通往废照棚的岔道。\n\n夜里起了雾。\n\n白得发虚。\n\n远远看去，废照棚那片破屋像浸在一盆冷水里。\n\n@{周小棘}果然还没睡。\n\n他就蹲在棚门口，怀里抱着一只破炭盆，一见@{沈照}被白灯照着回来，整个人几乎弹起来。\n\n“阿照！”\n\n这一声刚出口，他看见旁边提灯的@{岳怀川}，又立刻把后半口气咽了回去。\n\n“岳……岳巡使。”\n\n@{岳怀川}没和他废话：“他取药，半刻钟。”\n\n@{周小棘}愣了一下，忙让开门。\n\n棚里还是白日被翻过后的样子。\n\n草席乱。\n\n木箱歪。\n\n角落里那只破药罐倒还在。\n\n@{沈照}刚弯腰去拿，周小棘便压着声音扑过来：“你真要被他们带走？”\n\n“像。”@{沈照}道。\n\n“带去哪儿？”@{周小棘}低声问。\n\n“不知道。”\n\n“那你还回来拿药？”\n\n“不拿也得回来一趟。”@{沈照}道，“总得先看清，今夜是谁急着把我这留验二号押出青烬宗。”\n\n他说着，手伸进乱草席底下，先摸到的是那包旧药，再往里探，指尖很快碰到一块冷硬的薄木片。\n\n不是他原先藏的东西。\n\n是新塞进来的。\n\n他手指一顿。\n\n周小棘还在一旁急：“阿照，你别不当回事。我刚刚瞧见东边有人牵了三匹角驼，不像只是换个屋关你，像要连夜出门。”\n\n角驼。\n\n连夜出门。\n\n沈照心里那根线立刻又绷紧了一截。\n\n若真出宗，路上更好动手。\n\n也更好灭口，更好把“留验二号”押成一件死物。\n\n“谁牵的？”他问。\n\n“两拨人。”周小棘道，“一拨是你见过的黑纹袍，另一拨没穿袍，只拿牌。可那些人看着比黑纹袍的还横。”\n\n拿牌，不穿袍。\n\n多半就是东坡门来的那拨司里来使。\n\n@{沈照}把药包先揣进怀里，随后不动声色地把那片薄木一并扣进袖内。\n\n木片边缘很糙，却是今夜第一样主动递到他手里的东西。\n\n像是从旧柜背板上随手掰下来的。\n\n可刚一碰到，掌心白痕便突地一缩。\n\n他眼皮一跳。\n\n这东西和那半页旧录，是一路的。\n\n“够了没有？”棚外，@{岳怀川}的声音隔着门板传进来。\n\n“够了。”\n\n沈照直起身，转头看向周小棘。\n\n“若明早之前我没回来，”他低声道，“谁问你今晚见过什么，你都说不知道。”\n\n周小棘脸一下白了：“阿照……”\n\n“听着。”\n\n沈照看着他，声音不高，却压得很死，“若有人再往我这席子里塞东西，别动。记住地方。等我回来。”\n\n他说“等我回来”时，自己都没把握。\n\n可这话不能不说。\n\n周小棘嘴唇动了动，最终只重重点了下头。\n\n出棚时，夜雾更深了一层。\n\n@{岳怀川}目光先扫过他怀里的药包，又扫到他袖口。\n\n“只拿药？”\n\n“不然呢？”@{沈照}道。\n\n“你不像会白回来一趟。”\n\n“你也不像会真信我只拿药。”\n\n@{岳怀川}看了他两息，忽然道：“上灯车前，把袖里的东西给我看一眼。”\n\n这话来得很准。\n\n准得像一直在等这一句。\n\n@{沈照}却没立刻顶回去。\n\n他只是道：“到了车前，我给你看一半。”\n\n“另一半？”\n\n“等我知道你到底把我押去谁手里。”\n\n这回@{岳怀川}竟没发作。\n\n他只是提灯转身：“走。”\n\n从废照棚回东坡门，要过外门晒场。\n\n夜里的晒场空得发阔。\n\n风一穿过去，地上的碎灰便打着旋跑。\n\n两旁守灯的人明显多了。\n\n除了照命司弟子，还夹着几个没穿黑纹袍、只在腰间挂铜牌的生面孔。\n\n那些人一见@{岳怀川}带人过来，目光便齐齐落到@{沈照}身上。\n\n像在验货。\n\n其中一人往前半步，抬手亮了亮牌：“东坡门接押。”\n\n他没穿照命司袍服。\n\n可说话的口气，比外门执事还硬。\n\n@{岳怀川}停在离他三步的地方：“接押文书。”\n\n那人抬手，把一卷新封纸递了过来。\n\n@{岳怀川}却没接。\n\n“打开。”\n\n那人眼神一沉：“岳巡使，你是要验我？”\n\n“不是验你。”@{岳怀川}道，“是验令。”\n\n场上风忽然大了点。\n\n吹得几盏照地矮灯一起晃。\n\n那人盯了他一会儿，到底还是把纸卷拆开。\n\n里头除了那道旧式转押令，还压着一片新签的火漆封页。\n\n页角盖的是照命司现印。\n\n可印边少了一道极细的并纹。\n\n那纹若不熟印的人，根本看不出来。\n\n@{沈照}本该不懂。\n\n可他掌心白痕一抽，视线竟不由自主地先落在那缺的一角上。\n\n像有什么旧印记，在提醒他这里不对。\n\n@{岳怀川}看完，眼神彻底冷下去。\n\n“副印？”\n\n那人脸色微变：“旧案紧急，副印先行，有何不可？”\n\n“留验转押，至少双印。”@{岳怀川}道，“你带一枚副印，就想夜里把人提走？”\n\n对方沉声道：“这是司里意思。”\n\n“司里谁的意思？”\n\n“岳巡使，你越问越过了。”\n\n“你越急，才越像有鬼。”\n\n话音刚落，西边忽然传来一声闷响。\n\n像什么重物砸进了灯架。\n\n下一刻，半个晒场的矮灯齐齐一暗。\n\n不是灭。\n\n是像被什么灰东西猛地罩了一层。\n\n风里顿时多出一股焦甜气。\n\n不是炭。\n\n是灯油里混了别的东西。\n\n“散开！”有人厉喝。\n\n可已经晚了。\n\n第一盏矮灯“噗”地一下炸开时，灰白火星直扑人脸。\n\n守在外圈的两名弟子当场后退，场子立刻乱了半寸。\n\n也就是这半寸里，站在最前的那名东坡门来使忽然探手，竟不是去护令，而是直取沈照袖口。\n\n他要的不是人。\n\n是东西。\n\n@{沈照}早在灯暗那一瞬便提了防，身子一偏，让那一抓擦着袖边落空，怀里的药包却被带得掉了出来。\n\n旧药撒地，苦气一下冲开。\n\n来使眸子一厉，第二手更快。\n\n这一次，他五指直接朝沈照右腕扣去。\n\n“别碰他！”@{岳怀川}厉喝。\n\n@{岳怀川}那声几乎和出手一起来。\n\n白灯一横，硬生生砸开了对方手臂。\n\n火光一晃。\n\n那来使袖口被灯焰扫到半寸，露出里头一截灰黑腕带。\n\n不是照命司常用的束口。\n\n倒像旧押犯才会用的缚带。\n\n@{沈照}只看了一眼，心里便又冷一层。\n\n连来接押的人，身上都带着旧押灯廊那一路的东西。\n\n这一手不是临起意。\n\n是早就候着他。\n\n“护令！”场边有人吼。\n\n“护个屁令。”另有人怒喝，“先封灯，灯里有灰！”\n\n一片混乱里，横梁上忽然又落下一撮新灰。\n\n比先前更快。\n\n也更近。\n\n那灰没往人头上落，而是直直落向东坡门那拨人的脚前，像给谁划了一道线。\n\n@{沈照}眼角一跳。\n\n梁上的女人还在。\n\n而且她在提醒。\n\n提醒那条线外头，别站。\n\n“退！”他几乎没多想，猛地拽了@{岳怀川}一把。\n\n岳怀川脚下只挪半步，下一刻，他们原先站着的青砖缝里便突地窜起一道细白火。\n\n火不高。\n\n却阴。\n\n像从地底旧灰里钻出来的。\n\n若不是退得快，这一下正好会扫中两人脚腕。\n\n东坡门那来使也没料到地下还有这手，往后急撤时，半只靴跟已被白火舔到，顿时闷哼了一声。\n\n他没叫。\n\n可脸色瞬间青了。\n\n显然那火不只是烧皮肉。\n\n“旧押灯路被动过！”@{岳怀川}眼神一沉，立刻反应过来，“不是来接押，是来逼我把人交在这里。”\n\n这话说得已经够明。\n\n在场照命司弟子脸色全变了。\n\n谁都听得出，这不是外门使绊子。\n\n是照命司内部有人借转押令设局。\n\n@{沈照}掌心白痕却在这时突然一阵狠抽。\n\n不是冲人。\n\n是冲地。\n\n冲那道刚窜出白火的砖缝下头。\n\n他低头看去，眼底忽然一缩。\n\n火星熄落后，那条砖缝边缘露出半枚极浅的旧刻痕。\n\n不是火纹。\n\n像数字。\n\n一。\n\n只露出半边。\n\n却比什么都扎眼。\n\n@{沈照}呼吸一乱，几乎想也没想便蹲下去。\n\n“起来！”@{岳怀川}一把拽他。\n\n“下面有东西。”@{沈照}低声道，“是一号留下的痕。”\n\n这一句让@{岳怀川}手上力道都顿了一瞬。\n\n也就是这一瞬，东坡门那来使忽然反手甩出一道灰索，直抽两人之间。\n\n他还是没放弃。\n\n不是抢人。\n\n是抢这条线上的秘密。\n\n@{岳怀川}抬灯一挡，索头擦着灯罩划过去，发出一声极刺的裂响。\n\n白罩裂了。\n\n灯焰却没灭。\n\n反而在碎口里猛地长高了一寸。\n\n那一寸火光照下去，地砖缝里的旧刻痕终于全露出来。\n\n不是一个“一”。\n\n是一行极浅、几乎被旧灰埋死的旧刻字。\n\n“一号未转。”\n\n四字短得发冷。\n\n却比当夜任何一句话都重。\n\n未转。\n\n说明当年该被转押走的一号，没有按令走成。\n\n要么死在半路。\n\n要么根本还在这条旧押灯路底下。\n\n风从裂灯口里穿过去，火焰猛地偏向西北。\n\n像在给路。\n\n也像在指人。\n\n横梁上，那撮新灰又轻轻落了一点。\n\n这一次，正落在那道砖缝旁边。\n\n像一个无声的催字。\n\n@{沈照}心口一沉到底。\n\n他忽然知道，今夜真正要转押的，不一定是他。\n\n也可能是这条埋了十二年的旧案。\n",
    "outlineExpectation": "沈照被一纸“留验转押”逼上照命司旧押灯路。岳怀川决定当夜挪人，路上却接连暴露司内也有人盯着这桩旧案；沈照在回废照棚取药时拿到一片新的旧木线索，最终在东坡门接押现场撞破伪令与埋伏，并顺着地底白火照出的旧刻痕，第一次摸到“一号未转”的实证。"
