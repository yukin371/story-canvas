    "chapterContent": "# 第十八章 不回册\n\n暗槽比第十七章末尾看上去还要陡。\n\n不是一路滑下去的陡。\n\n而是每往下半丈，石腹便会忽然收紧一次，像有看不见的手在底下替这条槽一节节收喉。\n\n@{沈照}先下。\n\n不是因为抢先。\n\n是因为他掌上那副认灯皮套还热着。\n\n热得像整条暗槽都在借这点残温辨方向。\n\n前头那一点更远的白，也不再只是隐约。\n\n它现在会动。\n\n不是摇。\n\n像人在很深很深的地方，隔着几层旧铜与石腹，缓慢抬了一下眼。\n\n身后铜壁外的钩铁与怒喝暂时被压住了。\n\n却没远。\n\n偶尔仍有一两下闷响顺着石腹传来。\n\n像外头那拨人已经知道里面还有下层路，正沿主息槽另一面找别的入口。\n\n“他们不会只追这一条。”@{岳怀川}在他后头压低声音，“主息槽既然能养出这种背道，就一定不止一处回路。”\n\n“那我们得比他们先见到下面那人。”\n\n“也可能不是人。”\n\n沈照没有接这句。\n\n不是不认同。\n\n而是自从第十七章里那块白骨片落到掌心，和那声“走……下面……”擦着铜壁磨出来以后，他心里那点猜已经不只是猜了。\n\n更下面那东西，至少知道“照”。\n\n还在阻他回册。\n\n这两点，就足够让他往下。\n\n暗槽再落三丈，脚下忽然变平。\n\n不是到底。\n\n而是转角。\n\n转角外横着一扇半塌的旧铜栅。\n\n栅栏不高。\n\n却被人从中间生生掰开过。\n\n掰开的口只够一人侧肩挤过。\n\n边缘还挂着两缕干到发黑的旧膏丝。\n\n像很多年前，真有什么东西被人从这里拖出去过。\n\n更怪的是，铜栅右下角还钉着一块快碎裂的黑牌。\n\n牌上原字磨得只剩半行：\n\n`……回册者止`\n\n沈照眼皮微微一跳。\n\n“回册者止。”\n\n不是候承免入。\n\n也不是巡锁、验空那套外层流程。\n\n这是更下面一层，专门拦“回册”的。\n\n岳怀川也看到了。\n\n“看来第十七章那道真声不是在胡乱提醒。”\n\n“它知道这下面是什么地方。”\n\n沈照把掌上的认灯皮套往紧里勒了勒。\n\n这一路下来，那股热一直没退。\n\n反而越近转角，越像活物在喘。\n\n他侧身挤过那道被扯开的铜栅，刚落地，鼻腔便猛地灌进一股更重的气味。\n\n不是白膏。\n\n也不是血。\n\n是久年不见天的潮铜里，掺着一丝极淡极淡的药苦。\n\n像有人一直在很深处拿某种药吊着最后一口息，不让它断，也不让它痛快活。\n\n转角后不是槽。\n\n是一段很窄的悬腹廊。\n\n廊下空着。\n\n看不见底。\n\n两侧石腹里却并列嵌着一排低矮铜笼。\n\n笼不大。\n\n每个都只够关一段东西。\n\n有的空着。\n\n有的只剩被撕断的皮套。\n\n还有三只笼门紧闭。\n\n门缝后白得发青。\n\n看不清里面是什么。\n\n可每只笼前都挂着一枚旧签。\n\n`息残`\n\n`待转`\n\n`不可归册`\n\n沈照喉口微微发干。\n\n他忽然明白第十七章那块骨片为什么会写“不要应”。\n\n因为下面不是单纯关着谁。\n\n而是关着一切“本该被处理掉、却又不能立刻处理掉”的残留。\n\n只要应了名，被这地方认成了归册者，恐怕就真要和这些笼里的东西一样，被重新分段、待转、再钉回某一层流程里。\n\n前头那一点白就在悬腹廊尽头。\n\n不再躲。\n\n反而像在等。\n\n两人贴着廊边慢慢前行。\n\n走到第二只闭笼前时，笼里忽然极轻地动了一下。\n\n不是撞门。\n\n只是那团被白膏封住的轮廓，在笼里偏了半寸。\n\n沈照脚下一顿。\n\n因为他分明看见，那团轮廓侧过来的地方，有一截肩线和自己太像。\n\n不是长相。\n\n是骨架。\n\n瘦，窄，像被命灯抽干过很久的少年骨相。\n\n“别看。”岳怀川低喝。\n\n“这地方会借眼认人。”\n\n话音刚落，笼门前那枚写着`待转`的旧签便轻轻一晃。\n\n晃得像有人从里面隔着膏与铜，在朝沈照这边慢慢偏头。\n\n他掌心一烫，立刻扭开视线。\n\n可那一瞬已经够了。\n\n脑子里再次炸开一截短而狠的旧影。\n\n还是十二年前。\n\n却不是夹壁，也不是养息腹白池。\n\n而是一个极窄的铁笼。\n\n笼里有人在拍门。\n\n手很小。\n\n声音却发不出完整的词，只能一下一下把指骨砸在门上。\n\n笼外有人低声说：\n\n“这个也带照字。”\n\n“主印话呢？”\n\n“先别归册。等一号撑不住，再看谁去补二。”\n\n记忆到这里便断。\n\n不是被外力打断。\n\n是沈照自己先喘不上来了。\n\n他扶了下廊侧铜栏，喉间一阵发腥。\n\n“怎么了？”岳怀川已经压近。\n\n“下面不止一个‘照’。”\n\n沈照低声道。\n\n“至少当年他们关过一个带‘照’字的笼。”\n\n岳怀川眸光一沉。\n\n“和你同名？”\n\n“不知道。”\n\n“但他们提过：等一号撑不住，再看谁补二。”\n\n这话一出，连悬腹廊尽头那点白都像跟着静了一瞬。\n\n若真如此，那第十七章残纸上那个“原……”后头的东西，就未必只是抽象的“原位”。\n\n也可能是个原本已经被准备好、却临时没有真正入册的人。\n\n前头忽然传来一声很轻的咳。\n\n不是主息槽里隔着铜壁磨出来的那种。\n\n而是就在这条悬腹廊尽头，确确实实，从一副还活着的胸腔里压出来的。\n\n两人同时抬头。\n\n尽头那点白终于全部露出来。\n\n不是灯。\n\n是一面半垂着的旧白帘。\n\n帘后坐着一个人。\n\n说坐也不准。\n\n更像被几道细铜索从肩、肋、腕三处吊着，勉强悬在一张低木椅上。\n\n他身上没穿完整衣。\n\n只罩了一层被膏浸透又晒干的灰布。\n\n布下露出的锁骨、喉结与小半侧脸，都苍白得近乎透明。\n\n可就在这片透明里，偏偏留着一线极细极浅的旧烧纹。\n\n从喉结下侧擦过去。\n\n和沈照掌心那道白痕，是一个路数。\n\n沈照胸口那盏小铜灯在这一刻猛地一震。\n\n不再是轻跳。\n\n而像隔着很久很久的灰与血，终于撞到了它一直追下来的那口灯心。\n\n椅上那人也随之极轻地偏了偏头。\n\n动作很慢。\n\n慢得像这个简单的动作，他也许已经很多年没做过。\n\n白帘边缘滑开一线。\n\n露出完整一点的脸。\n\n那不是沈照的脸。\n\n却也绝不是完全陌生的骨相。\n\n尤其那双眼尾与下颌转折，像极了如果沈照再长几岁、再瘦几分、再把命灯烧薄一层后，会有的模样。\n\n不是血缘那种像。\n\n更像同一套流程，在不同人身上反复做过后，留下的同一类残形。\n\n对方也看见了他。\n\n眼里没有惊。\n\n只有一瞬极淡的松。\n\n像终于等到。\n\n“你……”沈照喉头发紧。\n\n那人唇角动了动。\n\n先出来的不是话。\n\n是血。\n\n一点暗红，从嘴角极缓地渗下来，又被下巴边旧灰吸住。\n\n他像攒了很久力，才终于挤出一句极轻的：\n\n“别……靠近……左边。”\n\n左边。\n\n岳怀川反应比话快，几乎在对方开口同时，裂灯已往左侧一照。\n\n白火掠过帘后左壁。\n\n墙上赫然嵌着一排极细的黑针。\n\n针尖全朝外。\n\n针尾则并到一根灰线里，一路连到那张低木椅后。\n\n若他们刚才直接扑过去，第一脚就会踏断灰线。\n\n灰线一断，那些黑针怕是全要往这坐着的人身上一起钉进去。\n\n不是守人。\n\n是灭口。\n\n岳怀川眼神彻底冷了。\n\n“还有气的人，也留后杀手。”\n\n椅上那人听见这句，唇角竟像是极轻地牵了一下。\n\n“这地方……”他声音轻得厉害，“从来不养人。只养……能说话的证。”\n\n沈照心里那股寒意一下沉到底。\n\n证。\n\n这就说明，对方不是单纯剩下一口气的一号残段。\n\n而是被故意留在这层最深处、随时可以拿出来对照旧名、旧规、旧承灯位的“活证”。\n\n“你是谁？”沈照终于问出来。\n\n那人没立刻答。\n\n先闭了闭眼。\n\n像把“谁”这个字在心里慢慢过了一遍。\n\n再开口时，第一句竟不是名字。\n\n而是：\n\n“你……已经看见骨片了。”\n\n沈照呼吸一停。\n\n“那是你留的？”\n\n“留给……照。”\n\n“哪个照？”\n\n那人看着他，目光极缓地下移。\n\n落到他掌上那道白痕。\n\n又落到他怀里压着的残纸边角。\n\n最后才极轻地说：\n\n“还活着……那个。”\n\n这回答不算答案。\n\n却比直接说名字更狠。\n\n因为它说明，这口井底确实不止一个“照”，而且对方很清楚他们如今只剩谁还活着。\n\n岳怀川没有让这段对话散开。\n\n他直接切进最要命的地方：\n\n“一号是不是你？”\n\n白帘后那人安静了很久。\n\n久到身后悬腹廊上的那三只闭笼里，又先后传出两下极轻的挪动。\n\n最后他才道：\n\n“册上那一个……是我。”\n\n沈照胸口重重一沉。\n\n不是怀疑落地。\n\n是直到这一刻，“一号”才第一次从残灯、续息龛、回板、活段、骨片、残纸这些东西，真正落回到一个会说话的人身上。\n\n活人。\n\n或者说，曾经的活人。\n\n“那我呢？”沈照盯着他，“第十七章那张残纸上的‘改列：沈照’，是你看着写进去的？”\n\n一号眼底掠过一线极细的痛。\n\n痛得像连眨眼都重。\n\n“不是我写的。”\n\n“是我……撞上去的。”\n\n这话一出，第十五、第十六、第十七章里所有碎片都齐齐往中间一拢。\n\n回板作业环下的残忆。\n\n白池巡缝人的旁证。\n\n骨片上的“照，不要应。”\n\n以及这句最重的：\n\n是我撞上去的。\n\n沈照喉间发紧。\n\n“为什么？”\n\n一号看着他，像想看清他这张如今已经和当年不一样太多的脸。\n\n“因为那夜……你在笼里。”\n\n“因为主印已经改过一次册，不肯再改第二次。”\n\n“因为若我不先承，下一声点二……就会落到你身上。”\n\n沈照指骨一下收紧。\n\n不是感动。\n\n也不是单纯震惊。\n\n而是直到这句出来，他才真正知道自己活到今天，不是被谁顺手漏下的一条命。\n\n而是有人在那一夜，拿自己先撞进了承灯位。\n\n“那另一个‘照’呢？”他几乎是紧接着问。\n\n“残签上的那个照，笼里的那个照，是谁？”\n\n这一次，一号没有立刻答。\n\n不是不想。\n\n是椅后那几道细铜索忽然同时轻轻一颤。\n\n颤得很轻。\n\n却让他整个人都跟着绷了一下。\n\n像某个更高一层的锁，在感知到他说得太多。\n\n岳怀川立刻抬灯扫向椅后。\n\n灰布背下的确埋着三枚更细的黑扣。\n\n和方才左壁那排灭口黑针是一套。\n\n只不过这一套更凶。\n\n不是针。\n\n而是直接贴着后心与腰肋的断索钩。\n\n一旦起锁，这口还吊着的一号“活证”会先被自己身上的钩索扯断。\n\n“别再直接问名字。”岳怀川压低声线，“这地方会记关键信息。”\n\n一号眼底极轻地闪了一下。\n\n像是认同。\n\n也像是在用这仅剩不多的一点力气，配合他们绕开某种旧规。\n\n“那我换个问法。”沈照盯着他，“笼里的那个‘照’，和我是什么关系？”\n\n一号缓了两息，才慢慢道：\n\n“不是你的亲族。”\n\n“也不是替名的人。”\n\n“是……原册里，先写了‘照’的人。”\n\n原册。\n\n这个词一出来，沈照心底那根线猛地被拽直了。\n\n第十七章残纸上那半个“原……”，到这里终于第一次长出形。\n\n原册。\n\n也就是说，当夜在一切“改列：沈照”“二免应”之前，这桩事本来就有另一本册、一条原路、一个先被写下的“照”。\n\n而他，是后来被塞进去替补的。\n\n“那个人后来呢？”沈照追问。\n\n一号唇角微微动了下。\n\n不是笑。\n\n更像一个太旧、太疲惫的冷意。\n\n“后来……被分了。”\n\n“哪一部分留在笼里，哪一部分沉去井下，哪一部分记在主息簿上……都由那只印说了算。”\n\n“我只来得及，把你先撞出去。”\n\n悬腹廊那头忽然传来一声很轻的钩响。\n\n不是追兵直接到了。\n\n而是有人在外层重新试这条廊的锁路。\n\n岳怀川侧耳一听，脸色立刻更沉。\n\n“他们绕到正道了。”\n\n“最多再片刻，就会从悬腹廊正门进来。”\n\n沈照眼神一紧。\n\n如果真是这样，他们就没有时间在这里慢慢问。\n\n可更要命的是，一号现在每多说一句，背后那些钩索都像会多绷紧一分。\n\n“怎么带你走？”他几乎是脱口而出。\n\n一号看着他，眼里第一次真正有了一点明确的情绪。\n\n不是喜。\n\n也不是盼。\n\n像是某种早就不允许自己生出来、此刻却还是轻轻晃了一下的东西。\n\n“现在带不走。”\n\n“椅后主索……连着主息锁梁。”\n\n“你若硬扯，我会先断。”\n\n“那怎么断锁梁？”\n\n一号缓慢地抬了抬下巴，指向白帘右侧更深那面黑壁。\n\n“黑壁后……有转骨槽。”\n\n“槽尽头……压着回册总簿。”\n\n“毁了它，这一层的认名和回册……会先乱。”\n\n“主息梁也会松。”\n\n回册总簿。\n\n这四个字一出，连岳怀川呼吸都沉了沉。\n\n这已经不是单一旧名残签的价值了。\n\n这是整套地下旧规的账喉。\n\n可问题也很明显。\n\n那种东西，必然比第十七章的记签旧库更难碰。\n\n而且多半就在更深、也更险的下一层。\n\n身后又是一声更近的锁响。\n\n悬腹廊上某扇笼门似乎被外层机关牵动，微微弹开了一线。\n\n白得发青的膏气立刻从里头泄出来。\n\n廊上的待转旧笼要醒了。\n\n岳怀川只看了一眼，便已做了判断。\n\n“不能留。”\n\n“一旦外层人和这些笼子一起动，我们连转骨槽口都摸不到。”\n\n沈照明白。\n\n现在不是救不救一号的问题。\n\n而是若他们此刻不继续往下，把回册总簿和更深那条原册线摸到，一号留在这里就永远只会是个钉死在椅上的“活证”。\n\n“你还能撑多久？”他问。\n\n一号没有回答时辰。\n\n只极轻地说了一句：\n\n“比这层册……先乱的那一点点久。”\n\n这话已经够了。\n\n岳怀川转身便去看右侧黑壁。\n\n黑壁没有门。\n\n却在最底下嵌着一道贴地的狭缝。\n\n缝边一圈磨痕，比暗槽口那圈更深。\n\n像真有很多细长的骨、签、套和什么被拆开的东西，曾从这里一趟趟拖过去。\n\n“这就是转骨槽口。”他低声道。\n\n“人过不去。”\n\n“人直着过不去。”一号在帘后轻轻道，“躺着……可以。”\n\n沈照和岳怀川同时回头。\n\n帘后那张低木椅下，果然还压着一块窄窄的旧拖板。\n\n板上有索。\n\n也有半干的旧膏。\n\n像不是给活人舒舒服服躺着过去。\n\n而是给那些“该被往下转、却还剩一口气”的东西，一段段拖去更深层的。\n\n“你们若要过……”一号喘了口气，“先把左廊第三笼门边那枚青扣拆下来。”\n\n“为什么？”\n\n“没有那枚扣，拖板进槽半途会翻。”\n\n沈照没有再问。\n\n立刻转身冲向悬腹廊左侧第三只紧闭笼门。\n\n笼前旧签写的是：\n\n`不可归册`\n\n这六个字此刻看着已不只是警告。\n\n更像一种很深的讽刺。\n\n笼门边果然钉着一枚青黑色的小铜扣。\n\n扣不大。\n\n却和拖板前端的缺口尺寸极像。\n\n他刚要伸手去拔，笼里那团白膏封着的轮廓忽然动得更重了一下。\n\n不是偏头。\n\n而是整团东西都朝门边撞来。\n\n撞得极慢。\n\n却够让人毛骨悚然。\n\n岳怀川裂灯一抹，正好照见门缝里一截被膏包到发灰的指节。\n\n那指节正朝铜扣一点点挪。\n\n像笼里那东西也不想让他们碰。\n\n“退开。”岳怀川喝。\n\n沈照反手就是一扯。\n\n青扣被他生生拔下。\n\n笼门里顿时传来一声极低的闷响。\n\n像里头那团东西因失了一处锁扣，整块往下塌了半分。\n\n可也就在这一瞬，悬腹廊正门那头轰然响起一道更重的开锁声。\n\n外层人到了。\n\n岳怀川一把接过青扣，扣进拖板前端凹槽。\n\n刚一扣合，整块拖板便自己轻轻往前滑了半寸。\n\n像槽口在吸。\n\n一号看着那块板，眼底闪过一线极淡的急意。\n\n“先下一个。”\n\n“另一个在后头推。”\n\n“到第二道转骨卡时，别碰左壁……左壁会认热。”\n\n沈照已把怀里的残纸、旧签、骨片重新压紧。\n\n回册总簿在更下头。\n\n原册线也在更下头。\n\n而一号这口还没断完的灯，就吊在他们和下一层之间。\n\n“我先下。”他说。\n\n“你带灯。”岳怀川回得更快。\n\n“下面若真有回册总簿，你碰见认名的东西比我危险。”\n\n“可主息白意认我。”\n\n“所以你才得在后头盯准，不让它把我也认进去。”\n\n这话没得再争。\n\n悬腹廊正门那头已经有脚步踏上铜板。\n\n一道压低的喝令隔着白帘与旧笼传了过来：\n\n“活证还在里头！”\n\n“别让二号再往下！”\n\n二号。\n\n这两个字一出，悬腹廊里那几只闭笼几乎同时轻轻一震。\n\n像整层“待转”的残留，都被这句叫得一起醒了一下。\n\n岳怀川再不迟疑，翻身躺上那块窄拖板。\n\n板很短。\n\n他这般身量，上肩便几乎碰到槽沿，下腿则只能微微屈着。\n\n沈照一把把裂灯塞进他掌边，又用青扣卡稳前索。\n\n“看见总簿先别毁。”他压低声音，“先看它认不认‘照’。”\n\n“你先活着下来再说。”\n\n岳怀川话落，已经自己抬肘往槽里一顶。\n\n拖板“嗒”地一声咬进槽口。\n\n几乎同一瞬，左壁里便渗出一层极冷的风。\n\n不是吹。\n\n更像一张更深的嘴，开始把这块拖板往下慢慢吞。\n\n沈照双手抵住板尾，跟着往里送。\n\n悬腹廊那头白火骤亮。\n\n外层来的人已经掀开第一道白帘。\n\n而一号在椅上，终于用尽力气般又挤出一句：\n\n“沈照。”\n\n这是他第一次叫全名。\n\n也是第一次把这个名字，不当号，不当册，不当待补之位地叫出来。\n\n沈照猛地回头。\n\n一号看着他，喉下那道旧烧纹在白帘后浅浅起伏。\n\n“下面若看见……原册上的‘照’……”\n\n“别信第一眼。”\n\n这句话比“别应”“别回册”都更难懂。\n\n可也正因为难懂，才更像真正紧要的活话。\n\n还没等沈照追问，悬腹廊那头钩铁已破帘而入。\n\n岳怀川在槽中低喝：\n\n“送！”\n\n沈照再不犹豫，双臂猛地往前一推。\n\n拖板整块滑进转骨槽。\n\n黑里立刻传来一串细索擦铜的急响。\n\n像槽底真的有一张更深的网，正接住、再往下送。\n\n沈照紧跟着伏身扑进槽口。\n\n身后最后看见的，是白帘后那张苍白得近乎发光的脸，和悬腹廊那头一起扑来的白火与黑钩。\n\n再下一瞬，转骨槽口在他背后咔地合了半截。\n\n上头的喊杀、白火、笼门震响全被闷进石腹。\n\n只剩更下方那股越来越清的冷白，和拖板前头岳怀川压得极低的一句：\n\n“下面到了。” \n",
    "outlineExpectation": "沈照与岳怀川顺着第十七章末尾的转骨暗槽继续下潜，第一次正面见到被留在悬腹廊最深处的一号活证，把“撞位挡二”的旧事从残忆与旁证坐实到当事人口中。章中既要明确“原册上的照”不是简单等于沈照，也要把下一层目标从碎片物证收束到更核心的回册总簿。章尾要把悬腹廊失守与转骨槽再下的压迫一起推到下一层，让两人带着“一号不能立刻带走”“原册上的照别信第一眼”的新警告继续往下。 "
  },
