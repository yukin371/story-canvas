      "chapterHandoff": {
        "previousChapter": {
          "id": "chapter-009",
          "title": "第九章 转押灯廊",
          "direction": "沈照被一纸“留验转押”逼上照命司旧押灯路。岳怀川决定当夜挪人，路上却接连暴露司内也有人盯着这桩旧案；沈照在回废照棚取药时拿到一片新的旧木线索，最终在东坡门接押现场撞破伪令与埋伏，并顺着地底白火照出的旧刻痕，第一次摸到“一号未转”的实证。",
          "beatHints": [
            "岳怀川决定今夜就带沈照离开临时账房，沿旧押灯廊转押；白痕一路起反应，说明这条路与十二年前的留验旧案直接相连",
            "沈照借回废照棚取药之机换藏半页旧录，并从草席底下拿到一片新塞进来的旧木线索，确认除了梁上女人外，还有人继续在暗处递话",
            "东坡门来使持副印伪令强接留验，晒场灯阵随即被人动手脚引爆；沈照和岳怀川在混乱中撞见地底旧押灯路留下的“一号未转”刻痕，旧案从传闻变成可追的实证"
          ],
          "sceneGoals": [
            "岳怀川决定当夜挪人，带沈照走过青烬宗早年的旧押灯廊。白痕和残灯一路起应，逼出这条廊与十二年前留验旧案的直接关系，也坐实了司里来使来得太急并非好意。",
            "沈照回废照棚取药并重藏旧录，从周小棘口中得知东边已备角驼夜行，又在草席底下摸到一片新塞入的旧木线索，确认暗处递话的人仍在推动他沿旧案追下去。",
            "东坡门来使只持副印强接留验，随后晒场灯阵被人掺灰引爆。沈照与岳怀川在乱局里挡下抢物与碰手的埋伏，并顺着白火与旧刻痕看见“一号未转”，把旧案真正从纸面拉进了眼前。"
          ]
        },
        "currentChapter": {
          "id": "chapter-010",
          "title": "第十章 灰缝藏骨",
          "direction": "东坡门伪令局后，岳怀川当场封门扣人，不再把沈照交给明面转押。沈照借木片与“一号未转”的刻痕，逼出旧押灯路下的一处暗格，捞出与一号有关的焦骨旧牌和未交接痕迹，也在残灯回响里接到更痛的一段旧记忆；但照命司内线与青烬宗外门两边追索同时压来，岳怀川只能改走暗路，把沈照和这条旧案一起先藏起来。",
          "beatHints": [
            "岳怀川借副印伪令与旧押灯路被动手脚的证据，当场扣下东坡门来使并封住晒场，不让明面转押继续；沈照则抓住砖缝白火与木片反应，坚持下面还有未交接的旧东西。",
            "两人顺着地砖白火与木片来源撬开旧押暗格，找出一枚焦裂骨牌、半截旧缚带和未完成的交接记号；沈照在残灯牵动下接到更具体的旧忆，怀疑当年一号并非单纯失踪，而是替某个人挡下了转押。",
            "青烬宗外门与照命司另一拨人同时压到东坡门，岳怀川意识到明面流程已经不能用，只能临时改押，带沈照从旧押旁道脱身；沈照则把新物证扣在手里，确认自己接下来不是被动等审，而是要追到一号真身。"
          ],
          "sceneGoals": [
            "东坡门伪令局后，岳怀川当场扣下持副印来使，先把留验转押改成案发现场，也逼沈照看清今晚真正被争的不是他这条命，而是旧案物证。",
            "沈照与岳怀川借木片撬开旧押暗格，拿到焦裂骨牌、旧缚带和残纸，也由残灯回响接到一段关于一号与自己旧身份的半截记忆。",
            "庄无烬与东坡门副司吏同时压场，岳怀川和沈照当众破局，转入排灰沟旧路，带着骨牌与残纸线索朝北灰库暗线撤走。"
          ]
        },
