        "currentChapter": {
          "id": "chapter-001",
          "title": "第一章 灯尽人未绝",
          "direction": "先立住沈照命灯将熄的死局、青烬宗底层的燃命秩序，再让不灭残灯在濒死中第一次回应，留下“他活了，但丢了什么”的钩子。",
          "beatHints": [
            "沈照在外门废照棚等死，清楚看到底层弟子被命灯规则压榨的生存处境",
            "旧炼灯炉异动，沈照被逼着去处理本该由将死之人承担的脏活",
            "不灭残灯在沈照濒死时第一次回应，让他活下来，却烧掉了一段他本不该忘记的记忆"
          ],
          "sceneGoals": [
            "沈照带着将熄的命灯和肺腑旧伤在外门废照棚熬命，见识青烬宗底层弟子如何把寿数和尊严一起耗尽。",
            "庄无烬把处理旧炼灯炉异动的差事压到沈照头上，沈照被迫走进一座曾烧死过人的旧炉场。",
            "旧炉崩裂时，不灭残灯在沈照体内第一次主动亮起，替他扛过必死的燃烧，但也带走一段旧记忆。"
          ]
        },
        "nextChapter": {
          "id": "chapter-002",
          "title": "第二章 谁在照命",
          "direction": "承接首章活下来的余波，展现沈照的记忆缺口和异常灯息，同时让照命司与同门压力一起逼近，把他推上第一次公开测灯的场面。",
          "beatHints": [
            "沈照发现自己忘掉了一段重要旧事，却在身体里感到一盏不属于自己的灯还在余烬里呼吸",
            "照命司巡灯使岳怀川因异常波动进宗，庄无烬和祁连烛都开始试探沈照",
            "沈照在公开测灯中靠残灯勉强过关，第一次从将死废人变成值得被盯上的人"
          ],
          "sceneGoals": [
            "沈照从首章死局里爬出来，却发现自己真的丢掉了一段记忆，连恐惧都来不及整理。",
            "岳怀川奉命追查异常灯波，外门风声骤紧，祁连烛和庄无烬都盯上了沈照这条意外活命的杂鱼。",
            "在众目睽睽下，沈照不得不压着记忆缺口和灯息异动完成测灯，侥幸过关，也把自己摆上了更多人的视线里。"
          ]
        },
