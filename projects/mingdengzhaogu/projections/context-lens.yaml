      "chapterHandoff": {
        "previousChapter": {
          "id": "chapter-003",
          "title": "第三章 第一次借命",
          "direction": "在一场本不该由沈照扛的外门危机里，让他第一次主动借残灯翻盘，给出早期爽点，同时明确“每借一次，就会丢掉更多自己”的长线代价。",
          "beatHints": [
            "外门灯库或封火阵突发失控，庄无烬试图把责任继续压给沈照这种最不值钱的人",
            "沈照为了不被当场耗死，只能第一次主动借残灯，把本来撑不过去的灯灾硬生生压住",
            "危机过后沈照赢得短期活路，却再次失去一部分记忆或情感锚点，也让真正的猎手确认了这盏灯的存在"
          ],
          "sceneGoals": [
            "外门灯库和封火阵同时失稳，宗门第一反应不是救人，而是把代价往最底层弟子身上推。",
            "沈照在必死局里第一次主动借残灯，把原本会烧死自己的灯灾反过来压住，完成真正意义上的第一次翻盘。",
            "沈照暂时活下来了，却清楚感到自己又缺了一块；与此同时，真正识灯的人已经开始顺着这道灯息找他。"
          ]
        },
        "currentChapter": {
          "id": "chapter-004",
          "title": "第四章 灯下留人",
          "direction": "借灯风波后，庄无烬想把灯库之事做成沈照的脏账，照命司却选择先把人留住。沈照必须趁众人都想利用他的间隙，为自己换来一个暂时安全的位置，同时第一次正面感到情绪被残灯削薄。",
          "beatHints": [
            "灯库事后，庄无烬想顺手把责任和封口一起压到沈照身上，岳怀川却当众把人留下",
            "回到废照棚后，沈照一边处理伤势和余波，一边明确感到自己对人命和旧物的情绪正在变薄",
            "岳怀川私下逼问借命与铜牌来历，并抛出一个更危险却能暂保活路的选择，让沈照主动踏入下一步"
          ],
          "sceneGoals": [
            "刚压下灯库之火，外门众人就开始重新给这场事故算账，沈照第一次被当成一条值得争的命。",
            "回到废照棚后，沈照处理伤势、面对旁人的反应，也更清楚看见残灯代价已经从记忆烧到情绪。",
            "岳怀川深夜找上门，没有立刻拿人，而是给沈照一个以命换活路的新条件。"
          ]
        },
