      "chapterHandoff": {
        "previousChapter": {
          "id": "chapter-019",
          "title": "第十九章 第一眼不真",
          "direction": "沈照与岳怀川顺着第十八章末尾的转骨拖板落进回册总簿所在的簿廊与井室，第一次把“一号那句‘原册上的照别信第一眼’”从警告推成可验证的机制：总簿会先亮后补名，把沈照诱成原册本人。章中既要让两人从总簿冷账里坐实“原照未销，后补二名”“一撞承”的先后关系，也要让翻真账本身继续啃掉沈照的自我。章尾要让他们斩断与一号主索同轴的回册引索，暂时搅乱上层锁梁，并顺着更深的暗槽追向真正藏着原照的下一层。",
          "beatHints": [
            "两人顺着转骨拖板落进由骨片簿墙、试口铜舌和认热左壁构成的总簿廊，确认这里会先用“第一眼”与第一反应把后补名诱回册里，再借沈照白痕开出总簿黑门。",
            "两人在回册总簿井里用“二免应”“改列：沈照”等旧证剥开假照，坐实“原照未销，后补二名”“一撞承”的冷账先后，也让沈照为多翻一层真账再丢一点自己的日常记忆。",
            "总簿发现底层承转页被扯动后开始主动回册，岳怀川与沈照从签骨上确认一号主索与黑轴同轴，随后用骨片卡轴、裂灯断索，暂时搅乱上层锁梁并顺着更深暗槽继续下潜。"
          ],
          "sceneGoals": [
            "沈照与岳怀川落进认热、认声也认字的总簿廊，在试口铜舌与第二道转骨卡前硬顶“第一眼假照”的诱导，最终借沈照白痕开出总簿黑门。",
            "两人进入回册总簿井，借残纸、旧签与裂灯从“沈照”这层假照底下翻出“原照未销，后补二名”的冷账，也让沈照在逼近真相时再次付出被啃掉日常记忆的代价。",
            "总簿主动回册、外层追兵也闯进井口后，岳怀川和沈照从“主索同轴”的签骨上确认一号吊索与总簿黑轴相连，随即以骨片卡轴、裂灯断索，搅乱上层锁梁并顺着新显出的更深暗槽继续追下去。"
          ]
        },
        "currentChapter": {
          "id": "chapter-020",
          "title": "第二十章 真原簿",
          "direction": "沈照与岳怀川顺着第十九章末尾新显出的返页暗槽继续切进真原簿腹心，不再只对着总簿假照，而是第一次正面接触被钉在原页里的“照生”活页。章中既要让沈照为顶住原页贴合再烧掉一块更具体、更人间的记忆，也要让“原页未灭”“一未补完”变成能改变下一步路线的硬信息。章尾要让两人的目标首次明确偏转：不是继续闷头往更深处追真相，而是趁锁梁未复位先返救一号，再回来拆真原簿。",
          "beatHints": [
            "两人顺着总簿井下新开的簿脊暗槽坠进真原簿页腹，在满腹散页、废页和填缝页里确认最深那张被七枚骨钉钉住的厚活页才是接近原照的真页。",
            "被钉住的活页睁眼后先认出一号仍吊着，又借“照生”残字和贴页白丝往沈照身上补位；沈照被迫拿一段更具体的旧暖记忆去顶，岳怀川则劈断骨钉抢下一片写着“原页未灭”“一未补完”的真页芯。",
            "真页和页芯把“一号流程未补完、锁梁暂松”的事实钉实后，沈照第一次主动改路，决定先借返槽回救一号，再回头拆更深处那本仍在翻页的真原簿。"
          ],
          "sceneGoals": [
            "沈照与岳怀川沿新开的簿脊暗槽坠进真原簿页腹，在散页与废页之间认出最深那张被七枚骨钉钉住的厚活页，确认这里存的不只是名字，而是仍会被拿来补人的原页活命。",
