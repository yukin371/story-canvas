          "title": "第五章 灰井照骨",
          "direction": "承接第四章夜尾，沈照依约随岳怀川潜入旧炼灯炉场下层灰井。灰井会对残灯与旧铜牌产生直接回应，让沈照第一次拿回与失落记忆有关的半截线索，同时把照命司、宗门隐瞒和更深层追踪风险一起推到明面上。",
          "beatHints": [
            "丑时将至，沈照确认周小棘暂时脱离火差后，依约与岳怀川秘密进入旧炼灯炉场下层，发现灰井早已被人提前动过",
            "灰井对旧铜牌与残灯同时起反应，诱发灯骨灰潮和残缺记忆回返，沈照看见与自己过去有关的半截警告",
            "两人惊险退井后确认还有第三方在追灰井线索，沈照隐下最关键的记忆内容，只带着“灰井照骨”的新钩子回到废照棚"
          ],
          "sceneGoals": [
            "沈照在情绪持续变薄的异样里赴约，跟随岳怀川秘密进入旧炉下层，并确认灰井入口已经被他人提前开启过。",
            "灰井对旧铜牌和残灯起强烈共鸣，灰潮与余识暴动，沈照被迫在危险中触发一段与失落记忆有关的半截回声。",
            "沈照和岳怀川从灰井惊险脱身，发现还有第三方暗中跟线；沈照没有把全部记忆告诉对方，而是把“官灯不可尽信”的新威胁压回心里。"
          ]
        },
        "currentChapter": {
          "id": "chapter-006",
          "title": "第六章 官灯之外",
          "direction": "灰井一夜过去，白日压力立刻压到废照棚。沈照必须在庄无烬、祁连烛和岳怀川三方都盯着自己的情况下，把灰井带回来的东西和“不信官灯”的警告先藏住，同时顺着一条来自暗处的新线索，第一次主动偏离照命司给他的路。",
          "beatHints": [
            "天亮后外门借灰井封禁之名搜查废照棚，庄无烬和祁连烛率先逼问沈照昨夜去向，岳怀川随后以留验名义强行接管",
            "沈照发现除了外门和照命司之外，还有第三方先一步搜过自己的草席，并通过周小棘留下的目击和一根灰线确认对方在递消息",
            "在岳怀川要求申刻去临时账房复盘灰井之事的同时，沈照收到指向外门旧账房乙字炉旧卷的暗线提示，最终决定先走官灯之外的路"
          ],
          "sceneGoals": [
            "灰井余波刚入白日，废照棚便被外门翻查。沈照在众目睽睽下第一次稳定说谎，并看见留验身份既是护壳也是锁链。",
            "回到棚中后，沈照确认除了官面搜查之外，还有第三方先一步摸过自己的席位；祁连烛也借机再次试探，把白日里的敌意推到明处。",
            "沈照从灰线里拆出旧账房的门牌记号，在照命司申刻传唤到来前，决定先偏离岳怀川给他的路，主动去灯外追那条线。"
          ]
        },
