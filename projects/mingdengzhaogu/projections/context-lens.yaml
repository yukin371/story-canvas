            "回板从井底升上作业环，沈照与岳怀川借候承残签、白膏皮架和井下二候承灯架坐实“二号候承”的旧位；沈照也从更近的旧忆里看见一号曾主动撞上承灯位的那一瞬。",
            "井下回索、井上追兵同时压到作业环，候承白线借沈照白痕开位；岳怀川强断回板，两人带着候承残签和认灯皮套钻入养息腹检索缝，并在更深处听见那句劝他“别应”的活证回声。"
          ]
        },
        "currentChapter": {
          "id": "chapter-016",
          "title": "第十六章 养息腹",
          "direction": "沈照与岳怀川钻入养息腹后的旧巡缝道与白池腹室，第一次看清“候承”不只是井上转灯流程，而是一整套会借白痕、旧规和点名把人认回册里的地下系统。章中既要让巡缝人补出一号主动撞位替沈照挡过一次“应二”的旁证，也要把主息槽的危险立住：更深处不仅藏着被抹掉的旧名残签，还会主动点名逼沈照自己答那一声。章尾要把钩子推进主息槽背后，形成“只要应一声就会被整座旧规认回去”的更强压迫。",
          "beatHints": [
            "两人借认灯皮套骗过巡锁门，沿旧巡缝道摸进养息腹外围，确认候承系统会主动识别白痕和旧烧纹，不是单纯靠人押送。",
            "养息腹白池和巡缝人把一号主动撞上承灯位替沈照挡下一次“应二”的事实补成旁证，也明确指出当夜还有另一个被临时抹掉的名字。",
            "井上追兵与井下回索同时压到养息腹，沈照和岳怀川被迫转入主息槽背后的旧巡缝道；主息槽开始点名逼沈照“应二”，章尾要坐实只要他答一声，整套候承旧规就会自动把他认回去。"
          ],
          "sceneGoals": [
            "沈照与岳怀川在检索缝尽头撞上只认候承白痕的巡锁门，沈照借作业环顺来的认灯皮套反向骗过门栓，带着上下一起压近的追兵抢进养息腹外围。",
            "两人在养息腹白池与半截息壳前撞见被钉死在腹里的巡缝人，对方补出一号曾主动撞位替沈照挡下“应二”的旁证，也点明当夜另有一个被临时抹掉的名字。",
            "巡锁门外追兵与腹底回索同时合围，岳怀川和沈照被迫转入主息槽背后的旧巡缝道；主息槽一路点名逼沈照“应二”，把“只要应一声就会被旧规认回去”的新压迫推到章尾。"
          ]
