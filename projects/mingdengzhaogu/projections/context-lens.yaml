      "chapterHandoff": {
        "previousChapter": {
          "id": "chapter-014",
          "title": "第十四章 井下换膏",
          "direction": "沈照与岳怀川顺着续息龛后的湿黑井道继续下潜，在收尾房封桥追杀前抢进一处仍在运转的换膏井间，第一次把“一号被活养”从抽象猜测落成具体规程、具体人手和具体转移路径。沈照也会因为灯息贴骨而接到更近的一段旧押记忆，意识到自己若继续往下，不只是替名，甚至可能被推成新的承灯壳。章尾要把钩子推到更深的转灯井：他们拿到昨夜转移一号的鲜热痕迹，却发现真正关键的那一部分已经被人往井底送走。",
          "beatHints": [
            "两人钻入续息龛后的狭井，在收尾房封后路前沿着新鲜膏痕和拖运擦痕继续下潜；沈照掌心白痕一路发热，说明这条井道接的不是死库，而是仍在运转的活路。",
            "两人在井底换膏井间里看见绞盘、骨槽、换膏铜盆和轮值刻记，确认一号这些年不是被静置留证，而是被按规程分开养、分开运；一个被弃下的旧守井人也把“人不在龛，在下井转灯”说成了明牌。",
            "收尾房追手压到井间门口，岳怀川和沈照抢下昨夜转移记录与转灯铁牌，被迫朝更深的转灯井继续追；章尾要明确一号关键部分已在不久前被送下井底，而沈照自己也开始出现会被残灯接入替身位的危险。"
          ],
          "sceneGoals": [
            "沈照与岳怀川沿着续息龛后的湿黑井道强行下潜，在收尾房封后路前追着新鲜膏痕抢出几息领先；沈照掌心白痕与小铜灯一路共振，把“井下有活路”与“他自己要被接进去”的双重风险一起推高。",
            "两人闯进仍在运转的换膏井间，看见绞盘、铜盆与轮值刻记，也从一个被弃下的旧守井人口中确认一号并不在龛里，而是被按规程往更深的转灯井送。",
            "收尾房追手压进井间，岳怀川和沈照抢下昨夜转移一号的鲜热记录与转灯铁牌，被迫继续追向更深的转灯井，同时确认沈照自己也在被残灯往承灯壳的方向拖。"
          ]
        },
        "currentChapter": {
          "id": "chapter-015",
          "title": "第十五章 丁井吊板",
          "direction": "沈照与岳怀川顺着工索缝抢到转灯井半腰作业环，第一次正面看见“候承验壳”的中段流程，确认沈照从十二年前起就一直在这口井里被人留着一个可替补的承灯位。章中既要把一号可能曾主动撞上承灯位、替沈照挡过一次“二号应位”的旧影推到明处，也要让井下那口仍会回应的小铜灯把钩子推进养息腹：更深处似乎还有能认出沈照、并劝他“别应”的活证。",
          "beatHints": [
            "两人用丁井铁牌撬开转灯井半腰暗踏，沿第三绞索抢上中段作业环，确认这是给换膏人抢前后脚、也给候承验壳用的中腰作业位。",
            "回板升上作业环后，两人从白膏皮架、候承纸签和井底承灯架上坐实“二号候承”的旧位，并让沈照接到更近的一段旧忆：当年一号可能主动撞上承灯位，替那个还没应第二声的二号挡下一次转灯。",
            "井下起锁、井上追兵同时合围，候承白线借沈照白痕开位；岳怀川强断回板后，两人抢走候承残签与认灯皮套，钻进通往养息腹的检索缝，章尾要留下更深处那句“别应”的活证回声。"
          ],
          "sceneGoals": [
            "沈照与岳怀川借丁井铁牌和三绞号签撬开转灯井半腰暗踏，在两头夹追前抢上中腰作业环，也第一次摸到这条井里为候承验壳预留的中段流程。",
            "回板从井底升上作业环，沈照与岳怀川借候承残签、白膏皮架和井下二候承灯架坐实“二号候承”的旧位；沈照也从更近的旧忆里看见一号曾主动撞上承灯位的那一瞬。",
            "井下回索、井上追兵同时压到作业环，候承白线借沈照白痕开位；岳怀川强断回板，两人带着候承残签和认灯皮套钻入养息腹检索缝，并在更深处听见那句劝他“别应”的活证回声。"
          ]
        },
