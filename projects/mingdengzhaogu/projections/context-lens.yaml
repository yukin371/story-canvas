          "direction": "东坡门伪令局后，岳怀川当场封门扣人，不再把沈照交给明面转押。沈照借木片与“一号未转”的刻痕，逼出旧押灯路下的一处暗格，捞出与一号有关的焦骨旧牌和未交接痕迹，也在残灯回响里接到更痛的一段旧记忆；但照命司内线与青烬宗外门两边追索同时压来，岳怀川只能改走暗路，把沈照和这条旧案一起先藏起来。",
          "beatHints": [
            "岳怀川借副印伪令与旧押灯路被动手脚的证据，当场扣下东坡门来使并封住晒场，不让明面转押继续；沈照则抓住砖缝白火与木片反应，坚持下面还有未交接的旧东西。",
            "两人顺着地砖白火与木片来源撬开旧押暗格，找出一枚焦裂骨牌、半截旧缚带和未完成的交接记号；沈照在残灯牵动下接到更具体的旧忆，怀疑当年一号并非单纯失踪，而是替某个人挡下了转押。",
            "青烬宗外门与照命司另一拨人同时压到东坡门，岳怀川意识到明面流程已经不能用，只能临时改押，带沈照从旧押旁道脱身；沈照则把新物证扣在手里，确认自己接下来不是被动等审，而是要追到一号真身。"
          ],
          "sceneGoals": [
            "东坡门伪令局后，岳怀川当场扣下持副印来使，先把留验转押改成案发现场，也逼沈照看清今晚真正被争的不是他这条命，而是旧案物证。",
            "沈照与岳怀川借木片撬开旧押暗格，拿到焦裂骨牌、旧缚带和残纸，也由残灯回响接到一段关于一号与自己旧身份的半截记忆。",
            "庄无烬与东坡门副司吏同时压场，岳怀川和沈照当众破局，转入排灰沟旧路，带着骨牌与残纸线索朝北灰库暗线撤走。"
          ]
        },
        "currentChapter": {
          "id": "chapter-011",
          "title": "第十一章 北灰旧库",
          "direction": "沈照与岳怀川顺着排灰沟旧路潜入北灰库外围，先切断官印追索，再在押送中转灰库里找到“补录二，候印未成”的残纸与更接近当年的记忆，确认一号曾在转押途中把“二”这个位置硬推给沈照；可照命司更深的一只手已经顺路追到门外，两人只能在旧库更深处开启暗匣，最后看见一张写着“补录二号：沈照”的旧名签，把沈照早在十二年前就被写进这桩旧案的事实彻底钉实。",
          "beatHints": [
            "沈照与岳怀川在排灰沟旧路里辨出这不是逃生道而是押送运物路，岳怀川为断掉照命司追印，亲手烧断裂灯官印，两人顺着焦骨旧牌的反应推开北灰库外围中转门。",
            "两人在北灰库外围灰库里找到“乙路留灰未交”“补录二候印”的残纸与灰格记号；沈照借残灯回响接住更清楚的一段旧忆，确认有人曾逼他在点名到二时应声，等于把一号空出来的位置推给了他。",
            "照命司追手已经摸到北灰库外门，岳怀川和沈照在前后夹压下撬开灰车后的暗匣，最终抽出写着“补录二号：沈照”的旧名签，被迫带着这份更致命的真相继续往北灰库更深处撤。"
          ],
          "sceneGoals": [
            "沈照与岳怀川在排灰沟旧路里确认这条道是押送运物路，岳怀川当场烧断裂灯官印切断照命司追索，两人随焦骨旧牌的反应摸到北灰库外围中转门。",
            "两人在北灰库外围灰库里翻出“补录二，候印未成”的残纸和灰格记号，沈照也在残灯回响里接到更近的一段旧忆，知道自己曾被人逼着去应那个“二”号。",
            "照命司追手摸到北灰库外门，岳怀川和沈照被迫在灰车后的暗匣里抢出更深一层物证，并看见写着“补录二号：沈照”的旧名签，确认这桩旧案早就把沈照写了进去。"
          ]
        },
