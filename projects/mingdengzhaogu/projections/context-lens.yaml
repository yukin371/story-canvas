          "title": "第十二章 库底留灯",
          "direction": "沈照与岳怀川钻入北灰库真正的腹仓，在收尾房追手破门前翻到“留验一号暂存北腹”“留二应名”的残卷，确认沈照原本不在那册上，而是一号在旧押夜里强行替出来的补录人；两人随即在最深的黑木长盒里摸出一盏仍有回应的旧铜灯，第一次看到一号并非只剩纸灰，而是可能还留下命灯余息的活证。",
          "beatHints": [
            "岳怀川用旧灯印封住回栓，带沈照钻进北灰库真正的腹仓；两人在收尾房追手破门前看清这里封的不只是灰，还有未断干净的人、灯与旧卷。",
            "两人在最深的黑木长盒里翻到“留验一号暂存北腹”“留二应名”的残卷，沈照也接到新记忆，知道自己当年本来不在那册上，而是一号把他硬推成了应名的二号。",
            "收尾房追手撬开外壁压到门前，岳怀川和沈照被迫当场取走长盒里的旧铜灯，并发现灯芯里仍封着会回应残灯的命灯余息，意味着一号也许并未死透。"
          ],
          "sceneGoals": [
            "岳怀川拿旧灯印封住回栓，带沈照钻进北灰库真正的腹仓；两人在黑暗中辨出这里封的不只是灰，而是照命司没收干净的人、灯和案底。",
            "两人在最深铜轨下的黑木长盒里翻到“留验一号暂存北腹”“留二应名”的残卷，沈照也从残灯回响里确认自己当年本来不在那册上。",
            "收尾房追手破门在即，岳怀川和沈照被迫取走黑木长盒里的旧铜灯，并在灯芯余息对残灯作出回应时确认一号可能还留着没灭透的一口命灯。"
          ]
        },
        "currentChapter": {
          "id": "chapter-013",
          "title": "第十三章 灯息指路",
          "direction": "沈照与岳怀川顺着那盏小铜灯残存的白意继续潜入北灰库更深层，借追兵压近的时间差找到一处专门封存“未死透灯息”的续息龛，确认一号当年不是简单失踪，而是被人拆成“人不在册、灯仍在库”的半死状态；沈照也从更完整的残忆里意识到，自己被补录成二号并不只是替命，更像替另一个名字挡进卷里。章尾要把钩子推到下一层：续息龛里留下的是被人近期动过的痕迹，说明有人一直在更深处维护或转移一号的那口灯息。",
          "beatHints": [
            "北灰库腹仓后的黑路并非死路，小铜灯的白意在追兵压近时主动偏向更深层；岳怀川判断收尾房的人熟悉外层结构，却未必比他们更快摸到这条续路。",
            "两人在更深层找到专门维持残灯余息的续息龛，发现一号当年被切成“灯息留库、活人不见”的半死留存状态；沈照也借共鸣接到更完整的旧忆，知道自己被补录成二号不仅是替命，还是替另一个名字挡卷。",
            "收尾房追手追入续息层，岳怀川和沈照在仓中抢下被人近期动过的续息记录与新鲜灯灰，确认这些年一直有人维护或转移一号灯息，并被迫继续朝更深处那条有人走过的新路追去。"
          ],
          "sceneGoals": [
            "沈照与岳怀川借那盏小铜灯的白意继续潜入北灰库更深层，在收尾房追手破入腹仓前抢到一小段领先，把“灯还活着”转成“灯在指路”的新压力。",
            "两人在更深层的续息龛里看见一号被留成半死灯息的旧法，也从残忆里知道沈照当年替下去的不只是命，还有另一个本该入卷的名字。",
            "收尾房追手压进续息层，岳怀川和沈照抢下近期被动过的续息记录与新鲜灯灰，确认一号灯息这些年一直有人看守或转移，并被迫朝更深的新路继续追下去。"
