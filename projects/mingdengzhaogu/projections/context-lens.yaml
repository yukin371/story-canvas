          ],
          "sceneGoals": [
            "沈照与岳怀川沿返槽抢上悬腹廊，在梁锁回收与页芯指路中争分夺秒前行；沈照也第一次在行动里明确感到那段暖碗记忆被抽走后的具体空缺。",
            "两人重回悬腹廊时，一号已经被守梁役与四道新副索重新缝向旧位；他们在合口前按一号提示斩轮、断左三右二，再拆主索铜扣，把一号从锁梁上硬抢下来。",
            "一号落地后点明页芯与尾名机制，补足自己当年拖断“后补二名补缺页”那半步的关键真相；三人随后退入免签缝，外有照命司暗手追索，前头又出现新的旧扣递线。"
