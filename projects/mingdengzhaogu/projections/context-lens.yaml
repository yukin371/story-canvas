        "currentChapter": {
          "id": "chapter-022",
          "title": "第二十二章 灰里递名",
          "direction": "承接第二十一章末尾的免签缝逃路，沈照、岳怀川与一号必须在净页火和照命司暗手包抄前，顺着第二枚旧扣找到灰背乙四。章中既要回收梁上递线女人并坐实她属于旧流程内层，也要把“姓在灰背底册、欠目在抹名廊”这条中层旧账钉实。章尾要让三人转向东三匣时，发现已经有人先开姓笔，形成更强的追读钩子。",
          "beatHints": [
            "三人在免签缝两头被堵的情况下，用两枚旧铜扣拼出“灰背乙四”的去向，顺废页滑口坠进灰背仓，确认递线人留下的是活路而不是躲路。",
            "梁上递线女人在灰背仓后现声，坐实自己曾在旧流程里抹账埋灰；她带三人拆开灰背乙四的双层假匣，把“尾名归真页、姓笔封灰背、欠目另记”的旧账与抹名廊坐标一起翻出来。",
            "净页火和追兵压入灰背仓后，女人留下收尾断后，三人带着底册和签头转去抹名廊东三匣；章尾要明确有人已经先开东三匣，姓笔正在里头自行亮起。"
          ],
          "sceneGoals": [
            "三人在免签缝中靠两枚旧扣拼出“灰背乙四”的指向，被净页火逼着沿废页滑口下坠，第一次进入真正收废页废名的灰背仓。",
            "梁上递线女人在灰背仓后现声，指引三人拆开双层灰匣，翻出“尾名归真页、姓笔封灰背、欠目另记”的底册与抹名廊坐标，也坐实她是旧抹账线活下来的人。",
            "追兵顺净页火压进灰背仓后，递线女人留下抹灰断后，沈照三人则改道去抹名廊东三匣；但他们还未抵近，就发现已有别人先开姓笔，新的钩子先一步亮起。"
          ]
