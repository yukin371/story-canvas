    "chapterContent": "# 第十章 灰缝藏骨\n\n“一号未转。”\n\n四个字贴在裂开的白灯火里，短得像刀口。\n\n场上乱声却没因为这四个字停下。\n\n反而更碎。\n\n炸开的矮灯还在往外喷灰火，东坡门那拨人里有人去扶被白火舔伤脚腕的来使，有人还想往前抢那道砖缝；照命司守在晒场两侧的弟子被先前那声“旧押灯路被动过”钉得发紧，一时谁也不敢乱碰地面。\n\n@{岳怀川}手里的白罩灯裂了一半，火却比方才更亮。\n\n他没先去看那四个字。\n\n也没先去扶伤者。\n\n他第一眼看向的，是那名持副印来接人的东坡门来使。\n\n“拿下。”@{岳怀川}道。\n\n这两个字落得极平。\n\n平得没有余地。\n\n场边两名照命司弟子先是一怔，随即咬牙扑了上去。\n\n那来使脸色猛沉：“你敢！”\n\n“伪令夜接、旧路动手、当场夺物。”@{岳怀川}提灯横过去，白火正压在对方喉前半尺，“我有什么不敢？”\n\n对方袖口一振，像还要再甩那道灰索。\n\n@{沈照}却已先一步看见他左手小臂的筋肉绷了一下。\n\n他没出声，只抬脚把地上散开的药包一挑。\n\n旧布包卷着苦味，正砸在那人腕上。\n\n那一下不重。\n\n却让对方手势歪了半寸。\n\n半寸已够。\n\n岳怀川手里的裂灯往前一顶，白火沿着灯沿猛地一跳，逼得那人不得不缩手。\n\n旁边两名弟子趁势按住他肩背，硬生生把人掼到半跪。\n\n“岳怀川！”那人终于不装沉稳，声音一下拔尖，“你敢在青烬宗门内扣东坡门的人，明日司里就能记你一个翻不了身的黑案！”\n\n“那也得等你活着把黑案递上去。”\n\n岳怀川一句顶回去，连眼都没抬。\n\n他转而点向地上另外两处：“那两个，封灯索先绑。谁敢碰砖缝，先断手。”\n\n这话一出，晒场上真静了一瞬。\n\n不是因为凶。\n\n是因为所有人都听明白了。\n\n现在最值钱的，已经不是沈照这条“留验二号”的命。\n\n是那道砖缝下头压着的旧案。\n\n@{沈照}蹲在原地，心还在跳。\n\n不是被人喝得。\n\n是掌心那道白痕抽得太狠。\n\n它像一条硬线，一头扎在他骨里，一头死死拴在砖缝底下。\n\n他低头再看那四个字，喉间竟泛起一点铁锈似的涩味。\n\n那不是灰。\n\n也不是血。\n\n更像旧灯油熬久了之后留下的苦腥。\n\n十二年前的什么东西，被这股味道连着拖到了他舌根。\n\n“别碰。”\n\n岳怀川已挪到他身侧，声音很低。\n\n“这地方刚被人动过，下面未必只藏字。”\n\n“不碰，就等他们的人再来一拨？”@{沈照}盯着那条缝，没有起身，“你扣得住东坡门这几个，扣得住后头那一串吗？”\n\n“扣不住也得扣到该看的看完。”\n\n“那你还废什么话。”\n\n沈照说着，已把先前扣进袖里的木片滑到了掌心。\n\n那木片边角粗涩，沾着一点薄灰。\n\n若只看木色，和破柜上掰下来的废木没有两样。\n\n可它一挨到那砖缝旁边，白痕便像被针直扎了一下，猛地缩住。\n\n岳怀川目光立刻落下来。\n\n“这是什么？”\n\n“棚里新塞进来的。”@{沈照}道，“不是给我拿来当柴烧的。”\n\n他没把木片全亮出来。\n\n只翻出半边。\n\n那半边背面，隐约有一道被烟火熏黑的旧刻槽。\n\n像原先卡在什么地方。\n\n岳怀川看了两眼，忽然抬头扫向晒场西北角。\n\n横梁高处，先前那撮新灰落下之后，一直没再动静。\n\n可他显然不觉得那地方已经空了。\n\n“给我两盏稳灯，再拿撬钩。”他头也不回地下令，“把外圈人都退开五步。谁再往里挤，按共谋算。”\n\n“巡使！”一名弟子压着嗓子，“再不把人送走，庄执事那边……”\n\n“庄无烬若有胆子，叫他自己来接。”\n\n那弟子不敢再说，立刻转身。\n\n沈照听见“庄无烬”三个字，反倒冷静了几分。\n\n外门要的是把事压死。\n\n东坡门来的那拨人要的是抢东西。\n\n岳怀川要的，至少现在看，是把这件事看清。\n\n三拨心思不一样。\n\n这就还有缝。\n\n只要还有缝，他便能钻。\n\n很快，两盏稳灯被提了过来。\n\n灯罩厚，火色偏青，不像白罩灯那样照骨，却稳得很。\n\n岳怀川把其中一盏塞到沈照手里。\n\n“照着。”\n\n“你不怕我先下手把东西抢了？”\n\n“你若真能在我眼皮底下抢走，便算你的本事。”\n\n沈照没接这句。\n\n他只把灯压低，贴着那道裂缝照过去。\n\n火色一落，砖缝里的旧灰便显出层次来。\n\n最上头一层是新炸开的浅灰。\n\n再往下，是久年不动、已经发结的沉灰。\n\n而“一号未转”那四个字，正是被后者半埋着。\n\n字不是刀刻的。\n\n像是有人用铁钉之类的硬物，在灰未全冷透的时候，一笔一笔划进去的。\n\n划得很急。\n\n却异常用力。\n\n末尾那个“转”字，尾勾甚至把旁边一小片灰壳都崩裂了。\n\n像写字的人当时手在抖。\n\n又像不敢不写。\n\n岳怀川接过撬钩，先试着挑起缝边一块松砖。\n\n没动。\n\n他皱了皱眉，又沿着砖缝向北摸了半尺。\n\n指尖忽然一停。\n\n“木片。”\n\n沈照把那片旧木递过去。\n\n岳怀川只扫了一眼，便把木片翻了个面，卡进砖缝北侧一个极窄的小槽里。\n\n咔哒。\n\n声音很轻。\n\n却实得异常。\n\n像一把许多年没转过的小锁，终于对上了牙。\n\n沈照瞳孔一缩。\n\n这不是随手掰下来的柜板。\n\n这是钥片。\n\n岳怀川也意识到了这一点。\n\n他眸子里那点本就压住的寒意，顿时更深。\n\n“有人比我们更早知道这里有东西。”他低声道。\n\n“而且知道得很细。”@{沈照}盯着那木片，“不然不会把钥片塞到我那张破席子底下。”\n\n“你还觉得那是帮你？”\n\n“至少不是想让我今晚死在东坡门的人。”\n\n两人对了一眼。\n\n谁都没再多说。\n\n岳怀川手腕轻拧。\n\n那块原先死死咬住的青砖，竟真的慢慢松了一线。\n\n下一瞬，缝底忽然有冷气往上冒。\n\n不是夜风。\n\n是积在地下许多年的湿冷灰气，被人撬开后一下顶了上来。\n\n还带着一股极淡的焦糊味。\n\n沈照鼻腔一缩，胸口竟跟着一疼。\n\n像那股味道早就在哪一年，穿过他的肺。\n\n“退后半步。”\n\n岳怀川说完，自己却没退。\n\n他用撬钩一点一点把那块松砖挑起，露出底下一条仅容一臂探入的暗格。\n\n格子很窄。\n\n不像藏财。\n\n更像临时塞押送文牍或小件物证的地方。\n\n里头最上面覆着一层潮灰。\n\n灰下压着半截发黑的旧缚带。\n\n再往里，是一枚被烧得起裂的骨牌。\n\n牌角焦卷，只剩大半。\n\n可牌面正中那个刻字还在。\n\n一。\n\n就一个字。\n\n没有名。\n\n没有姓。\n\n也没有别的编号。\n\n像这块牌子原本的主人，从一开始就不配有自己的名字。\n\n沈照握灯的手指一下发紧。\n\n掌心白痕几乎是在骨牌露出的同时，猛地往里一缩。\n\n不是疼。\n\n是空。\n\n像有人从他胸口硬掏走一口气。\n\n下一瞬，灯火在他眼里陡地晃了一下。\n\n晒场不见了。\n\n夜风不见了。\n\n连岳怀川提灯时压得极低的呼吸声，都像被谁拿灰布一把捂住。\n\n他只听见雨。\n\n不是今晚的雨。\n\n是很多年前那种夹着冷灰的细雨，落在石板上，发出密密的轻响。\n\n他被人按在什么狭窄的地方。\n\n鼻前全是潮泥和旧血的味。\n\n视野里只有半张侧脸。\n\n那人年纪不大。\n\n也瘦。\n\n手腕上缠着的，正是这样的旧缚带。\n\n“别出声。”\n\n那声音沙得厉害，像咽过血。\n\n“小二，记住，若有人问，你没见过我。”\n\n小二。\n\n这两个字像一枚烧红的钉子，直直钉进沈照耳里。\n\n他整个人一震，眼前记忆便倏地裂了。\n\n只剩一只满是灰泥的手，把什么东西塞进他怀里。\n\n然后一推。\n\n推得很狠。\n\n像在把他往活路里推。\n\n“沈照！”\n\n有人猛地扣住他肩。\n\n现实一下倒回来。\n\n稳灯还在手里。\n\n骨牌也还在暗格里。\n\n只是他后背已出了一层冷汗，连肺口旧伤都像被谁拧过一把。\n\n岳怀川盯着他，指力不轻：“你看见什么了？”\n\n沈照喉结动了一下。\n\n他本能地想把那声“小二”压下去。\n\n可那称呼实在太旧。\n\n旧得像他本来就该记得，却被什么硬生生烧断了一截。\n\n“有人这么叫过我。”他哑声道，“不是现在。”\n\n岳怀川眼神一沉：“一号？”\n\n“不知道。”沈照吸了口气，“我只记得他手上缠着一样的带子。还有……他把我往外推。”\n\n“往哪儿？”@{岳怀川}问。\n\n“记不全。”@{沈照}道。\n\n这句不是敷衍。\n\n是真断。\n\n记忆到了最关键的地方，又像被残灯咬掉了一口。\n\n只剩下那种被人推得踉跄往前、自己却不敢回头的发冷感，还死死黏在脊梁上。\n\n岳怀川没再逼。\n\n他把那半截旧缚带挑出来，抖开一看，带子里层竟还裹着一小片被油灰粘住的薄纸。\n\n纸太旧。\n\n一见风就碎了一角。\n\n上头只剩两行勉强能辨的墨字。\n\n“乙路……未交。”\n\n“北灰……库。”\n\n后面的字全烂了。\n\n可这两行已经够重。\n\n未交，说明当年这里确实有一桩该交没交的押送。\n\n北灰库，则像一个去处。\n\n一个还没被完全烧掉的去处。\n\n沈照盯着那两个残字，心里那条线顿时绷得更紧。\n\n不是因为有了方向。\n\n是因为方向终于从纸上掉到了地上。\n\n十二年前那个人，不只存在过。\n\n他还曾被往“北灰库”送。\n\n或者，本该被送。\n\n“收起来。”岳怀川说。\n\n“给你？”\n\n“先给我一半。”岳怀川把那裂灯往他眼前一抬，嘴角竟极淡地动了一下，“不是你自己说的，到了车前只给我看一半？”\n\n沈照看着他，片刻后也把那点冷笑压了回去。\n\n到这一步，谁若还想独吞，谁就死得快。\n\n他伸手把那枚焦裂骨牌从暗格里捞出来。\n\n牌子一入掌，冷得惊人。\n\n不像骨。\n\n倒像一块埋了多年的冰灰。\n\n他想了想，先把骨牌塞进自己袖里，又把那片残纸递给岳怀川：“你拿字，我拿牌。”\n\n岳怀川接过残纸，没有讨价还价。\n\n“缚带呢？”\n\n“也归你。”沈照道，“反正我拿出去，别人只会当场搜我。”\n\n这话刚落，晒场外头便忽然传来一阵更乱的脚步。\n\n不是先前东坡门那几个人能闹出来的动静。\n\n是人多。\n\n而且甲叶摩擦声很杂。\n\n像外门戒灯队。\n\n下一刻，果然有人在外圈喝了一声：“庄执事到！”\n\n沈照眼神一冷。\n\n来得真快。\n\n还真是庄无烬。\n\n紧接着，又有另一道声音从更远一点的门道压过来：“东坡门副司吏在此，谁敢私扣司内接押令？”\n\n这句一出，连岳怀川都眯了下眼。\n\n东坡门后头的人，终于露头了。\n\n而且来得比想的还快。\n\n“把砖合回去。”岳怀川当机立断。\n\n“现在？”\n\n“现在。”\n\n“他们都到门口了，你还想把这东西埋回去？”\n\n“不埋回去，等着他们齐齐来看？”\n\n这话没错。\n\n沈照不再争，俯身便去扶那块撬开的松砖。\n\n掌心白痕还在抽。\n\n可这一次，它没再死拽着那暗格不放。\n\n像是那里面最该拿走的一点东西，已经被他扣进了袖里。\n\n两人动作都快。\n\n砖一合，灰一抹，那四个字便又被压回阴影里。\n\n只剩一道细缝。\n\n不趴下去看，根本看不出底下藏过东西。\n\n刚做完这一步，外圈已被人粗暴撞开。\n\n先闯进来的果然是@{庄无烬}。\n\n他身后跟着七八名外门戒灯弟子，各自提着青铁短灯，脸色一个比一个硬。\n\n庄无烬一眼扫过满地灰火、被按跪在地上的东坡门来使，以及岳怀川手里那盏裂了白罩却还亮着的灯，眼皮明显跳了一下。\n\n“岳巡使。”他开口时仍努力压着嗓子里的惊怒，“你在我青烬宗外门晒场上，演的是哪一出？”\n\n“不是演。”岳怀川淡淡道，“是抓贼。”\n\n“抓谁的贼？”@{庄无烬}冷声问。\n\n“拿伪令、动旧路、夜里来抢留验物证的贼。”\n\n“你说他是贼，他就是？”庄无烬往前两步，目光越过岳怀川，直落到沈照身上，“还是说，岳巡使查着查着，已经查到要拿我外门弟子做刀了？”\n\n沈照没接他这目光。\n\n沈照也没退。\n\n他只是低着眼，把那股从骨牌上传来的冷意压在袖底。\n\n庄无烬这会儿看得越急，越说明他怕。\n\n怕今晚这场灰火没把东西盖死。\n\n怕“留验二号”在岳怀川手里，真的掀起旧案。\n\n这时候，东坡门那位自称副司吏的人也进来了。\n\n此人没穿黑纹袍，只着一件灰青长褂，腰间悬着两枚铜牌，一新一旧。\n\n新牌亮。\n\n旧牌却磨得厉害。\n\n像是故意让人看见它老。\n\n他入场先扫了眼半跪的来使，脸色当场便沉。\n\n“岳怀川。”他不叫巡使，张口便点名，“你扣我东坡门接押人，封我司里转押令，是想把事做成公案？”\n\n“令若是真的，自然是公事。”岳怀川道，“令若是副印伪接，便是案。”\n\n“副印先行，司里不是没旧例。”\n\n“双印押留验，也是旧例。”\n\n那副司吏眼神一眯：“你拿旧例压我？”\n\n“你都敢拿旧例来半夜提人，我为何不能拿旧例验你？”\n\n这一来一去，场上火药味几乎立刻顶满。\n\n庄无烬站在一旁，脸色难看，却没有立刻插进来。\n\n因为他听得懂。\n\n这已不是外门能全然压下去的事。\n\n这是照命司自己在掐。\n\n而掐到这一步，他贸然偏向任何一边，都会脏到自己身上。\n\n沈照把这一点看得很清。\n\n正因清，他才更知道，再拖下去会出事。\n\n庄无烬不敢先动。\n\n不代表祁连烛那种人不敢。\n\n东坡门副司吏不肯退。\n\n不代表他手底下没有第二手。\n\n还有那位梁上的女人。\n\n她把木片塞给他，不会只是为了让他看一眼骨牌便算完。\n\n“你们要吵，去司里吵。”沈照忽然开口。\n\n这一句来得不高，却让三方目光都落到他身上。\n\n庄无烬眼里立时掠过一丝阴冷：“这里有你说话的份？”\n\n“没有。”沈照看都没看他，“但我若死在这儿，今夜谁都交不了差。”\n\n副司吏冷冷道：“你倒把自己看得重。”\n\n“不是我重。”沈照抬起眼，“是你们都想从我身上拿东西。既然都想拿，就别在这儿装谁是来讲规矩的。”\n\n这句一出，庄无烬脸色微变。\n\n副司吏眸光也沉了半分。\n\n岳怀川却没制止。\n\n他只是提着灯，像在等沈照把后面那句说完。\n\n沈照没辜负他。\n\n“今夜东坡门来接押的，先抢我袖口，再碰我右腕，连人都没先验。”他慢慢道，“他要的是我身上的东西，不是我这个留验二号。既然如此，你们谁真想按令办，就先把他为什么抢说清楚。”\n\n被按着的来使猛地挣了一下：“放屁！”\n\n“是不是放屁，把他袖子拆开看看便知。”\n\n这回不等别人动，岳怀川先一步出手。\n\n他灯柄一挑，直接把那人先前被火扫开的半截袖口又掀高了一寸。\n\n灰黑腕带彻底露出来。\n\n这不是普通束口。\n\n腕带内侧甚至还钉着一枚极小的旧铁扣。\n\n像专门拿来牵索或扣牌的东西。\n\n晒场上一时没人说话。\n\n因为谁都看得出。\n\n这不是来接人的装束。\n\n这是来押旧犯、拿旧物的装束。\n\n副司吏脸上那层稳意，终于裂了一丝。\n\n庄无烬则在这瞬间往后退了半步。\n\n不是怕。\n\n是要撇。\n\n沈照看见他这半步，心里冷得更明。\n\n今晚这事，庄无烬未必全知。\n\n但他至少知道有人要借转押做局。\n\n不然不会在这个点，带着外门戒灯队来得这么准。\n\n就在这片诡异的静里，晒场西侧的木梁上，忽然又轻轻落下一点灰。\n\n不多。\n\n就三两粒。\n\n落点却极巧。\n\n正落在沈照右后方一条废弃排灰沟的边沿。\n\n那条沟平日被碎石和焦灰堵着，看上去和普通地面没区别。\n\n可这几粒新灰一落，沈照掌心白痕竟又是一抽。\n\n不是冲砖缝。\n\n是冲那条沟。\n\n他心里猛地一动。\n\n梁上的人不是让他守着这暗格。\n\n是让他走。\n\n走另一条路。\n\n“岳怀川。”他忽然低声道，“你若还想把人和东西都带出晒场，就别在这儿跟他们对嘴。”\n\n“你有路？”@{岳怀川}低声问。\n\n“也许。”@{沈照}道。\n\n“也许？”\n\n“你不是本来就只信一半？”\n\n岳怀川目光压住他，只一息，便懂了。\n\n他没有再问。\n\n反手便把那片残纸塞进袖中，接着陡然扬声：“东坡门来使副印夜接、暗带旧押具、当场夺物，现按司案先行封押。庄执事，你若要护晒场弟子，就把外门人都撤到灯架外。副司吏，你若真认这案，明日去司里与我对印。”\n\n副司吏冷笑：“你还想走？”\n\n“不走，留这儿等你把第二拨人也叫齐？”\n\n话音未落，岳怀川手里的裂灯忽然猛地往地上一砸。\n\n白火不是炸。\n\n是铺。\n\n一线白焰沿着方才那块被合上的松砖猛地窜开，逼得最近几人同时退步。\n\n“封灯！”有人惊叫。\n\n“退开地缝！”另有人厉喝。\n\n场子再次乱了。\n\n而沈照就在这乱的一瞬，转身扑向那条排灰沟。\n\n沟口被半块烂木板压着。\n\n他一脚踹下去，木板当即塌了半边，底下竟真露出一条狭窄斜道。\n\n灰气扑面。\n\n比暗格里的还重。\n\n岳怀川半点不迟疑，提灯便跟了下来。\n\n“拦住他们！”庄无烬终于变了声。\n\n“别让人从灰沟走！”副司吏也跟着喝。\n\n可上头越乱，底下越黑。\n\n沈照几乎是滚着滑下去的。\n\n斜道极陡，鞋底一踩全是松灰。\n\n他肩背在石壁上狠狠擦了两下，疼得牙根发酸。\n\n岳怀川在后头单手按了他一把，才没让他直接撞到底。\n\n两人落地时，脚下溅起一层细灰。\n\n前头竟真是一条旧路。\n\n不宽。\n\n却足够两人并肩半错着走。\n\n石壁两侧打着很旧的火槽，早灭了，只剩焦黑痕。\n\n而路口西北方向，正有一点极淡的风往里灌。\n\n不是死路。\n\n沈照心口一震。\n\n梁上那人给的，不是死提示。\n\n是真路。\n\n头顶很快传来杂乱脚步和喝骂。\n\n有人试图从斜道追下来。\n\n可岳怀川回手便把那盏裂灯塞进沟口石隙。\n\n灯焰被卡住后，一下拉长，正好把上头最窄那截照成一片惨白。\n\n“你做什么？”沈照问。\n\n“让他们下来慢一点。”\n\n“你这灯还能撑？”\n\n“撑到够我们先走。”\n\n他这话说完，便从袖里摸出一枚小铁钉，反手钉进石缝。\n\n咔的一声。\n\n上头立刻传来碎石滑落。\n\n不是塌。\n\n却足够让追的人先顾脚下。\n\n沈照没再废话，转头就往风来的方向走。\n\n这条旧路很冷。\n\n冷得不像地底。\n\n倒像某种长年见不到光的骨缝。\n\n走出十几步后，前头石壁上忽然又出现一道极浅的旧刻。\n\n不是字。\n\n是一横一竖，像谁匆忙间留的箭头。\n\n箭头偏北。\n\n正与那片残纸上仅剩的“北灰……库”对上。\n\n“你看见没有？”沈照压低声音。\n\n“看见了。”岳怀川提灯靠近，眸色沉得厉害，“这路不是临时逃生道。是有人提前留过记。”\n\n“给一号留的？”\n\n“或者给后来会来找一号的人留的。”\n\n这句让沈照袖里的骨牌一下更沉。\n\n他忽然想起那句“小二，记住，若有人问，你没见过我。”\n\n那不是随口一托。\n\n像嘱托。\n\n像真有人把什么该落到自己头上的东西，硬改到他身上之前，先把他往外推了一把。\n\n“岳怀川。”\n\n“说。”\n\n“若当年一号真没转走，你觉得他还活着吗？”\n\n这问题一落，地道里只剩两人的脚步声。\n\n很短一会儿后，岳怀川才开口。\n\n“我不知道。”\n\n“你也会说不知道？”\n\n“我若什么都知道，今晚就不会被人拿副印堵在晒场上。”他顿了顿，“但我知道另一件事。”\n\n“什么？”\n\n“从现在起，明面上的转押路彻底废了。”\n\n沈照脚步没停。\n\n却把这句话咬得很紧。\n\n明面转押废了。\n\n就意味着岳怀川也被一并推下来了。\n\n他不再只是一个站在灯下审人的巡使。\n\n而是被迫带着人和案子一起躲路的当事人。\n\n这比任何口头结盟都实。\n\n“所以？”沈照问。\n\n“所以你若还想活着追一号，”岳怀川看向前方那道黑得更深的岔口，“接下来就别再只给我看一半。”\n\n沈照在黑里扯了扯嘴角。\n\n“你先把我带到北灰库门口。”\n\n“到了那儿呢？”\n\n“再看我还给不给另一半。”\n\n岳怀川没再跟他抬杠。\n\n他只是提灯先往北侧岔道一照。\n\n灯火尽头，石壁上隐约露出半枚被灰封住的旧库印。\n\n印边焦裂。\n\n中间只剩一个还勉强能认的字。\n\n北。\n\n沈照袖中的焦骨旧牌就在这时轻轻碰了碰腕骨。\n\n像有一只十二年前的手，从灰里隔着时光，重新按了他一下。\n\n不重。\n\n却让他后背无声发寒。\n\n因为他忽然意识到，那句“小二”，也许从来不是随口叫出的排行。\n\n也可能是有人在十二年前，就替他排好了这个位置。\n\n若北灰库里真压着一号留下的东西，那他这个“二号”便不是后来补上的名字。\n\n而是一条早就替出去、如今又被人亲手送回旧路的命。\n",
    "outlineExpectation": "东坡门伪令局后，岳怀川当场封门扣人，不再把沈照交给明面转押。沈照借木片与“一号未转”的刻痕，逼出旧押灯路下的一处暗格，捞出与一号有关的焦骨旧牌和未交接痕迹，也在残灯回响里接到更痛的一段旧记忆；但照命司内线与青烬宗外门两边追索同时压来，岳怀川只能改走暗路，把沈照和这条旧案一起先藏起来。"
