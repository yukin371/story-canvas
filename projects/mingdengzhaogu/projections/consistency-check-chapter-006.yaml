    "chapterContent": "# 第六章 官灯之外\n\n灰井里那句“阿照，若有一日灰井照骨，谁举着官灯来找你，都别信。”还像半截没烧尽的灯芯，断断续续烫在@{沈照}耳后，废照棚外头便先响起了铁尺敲门板的声音。\n\n一下，又一下。\n\n不急。\n\n却比催命还烦人。\n\n@{沈照}几乎是在第一下响起时就睁了眼。\n\n昨夜那枚灰白碎片还压在掌心里，睡了一夜也没暖过来，反而像把寒气一点点渗进骨缝。\n\n他摊开手时，先看见的不是碎片。\n\n是掌心里多出来的一道极淡白痕。\n\n像有人拿极细的灰线，在他皮肉底下轻轻勒过一回。\n\n那白痕不疼。\n\n可比疼更叫人难受。\n\n因为@{沈照}很清楚，井里那一夜并没有真正过去。\n\n它只是从外头烧，烧进了肉里。\n\n门外又是一声。\n\n“起身！庄执事查棚！”\n\n棚里本就睡得浅的人一下全醒了。\n\n有人咳着爬起来。\n\n有人慌得去摸自己怀里那点快灭的灯火。\n\n也有人下意识往角落缩，像躲得慢一点，就会被拖出去顶账。\n\n废照棚这些人，平日最怕的其实不是死。\n\n是死之前还要被翻一遍，看你身上有没有什么能再拿去换。\n\n@{沈照}手指一拢，把那枚灰白碎片和旧铜牌一起裹进破布，再塞进草席底下最烂的那道裂缝里。\n\n东西刚藏好，门就被人从外头踹开了。\n\n冷风卷着晨灰一灌而入。\n\n走在最前头的是两个外门役弟。\n\n后头跟着@{庄无烬}。\n\n再后头，竟还有@{祁连烛}。\n\n@{庄无烬}今早脸色比平时更阴，眼下压着一层没睡好的青，像夜里那把火不是烧在旧炉和灰井里，而是烧到了他自己的卷档上。\n\n他进门后先扫了一眼棚里众人，目光在@{沈照}身上停得最久。\n\n“搜。”他说。\n\n他没有解释。\n\n也不必解释。\n\n役弟立刻散开，去翻每个人的破席、药碗、旧衣和藏得住一把灰的角落。\n\n棚里很快响起一片压着不敢高的惊声。\n\n有人想问犯了什么事。\n\n话还没出口，便被役弟一脚踢在席沿上，连声也缩了回去。\n\n周小棘昨夜睡在最外头，被惊醒得最早。\n\n他撑起身时还迷糊着，一见这阵势，脸立刻白了。\n\n他下意识先去看@{沈照}。\n\n这一眼很快。\n\n却让@{沈照}心里一沉。\n\n不是因为怕查。\n\n而是他忽然意识到，自己第一反应竟不是安抚那少年，也不是提醒他别露昨夜的事，而是在算，周小棘若真顶不住，会先说到哪一句。\n\n这个念头像刀背一样贴着心口滑过去。\n\n不致命。\n\n却够凉。\n\n@{祁连烛}倚在门边，抱臂看着这一切，像在看一场早知结果的热闹。\n\n他目光扫过众人，最后又落回@{沈照}脸上，笑意很淡：“庄执事只是怕昨夜旧炉那边又漏了什么脏东西进棚。你们若心里没鬼，紧什么？”\n\n棚里没人接话。\n\n这种时候，越解释越像有鬼。\n\n@{庄无烬}已走到@{沈照}席前。\n\n他低头看了眼地上那盏快灭的破灯，又看了看@{沈照}的手：“昨夜丑时之后，你人在何处？”\n\n周遭一下更静。\n\n问得太直。\n\n直得连几个翻席的役弟都慢了一瞬。\n\n@{沈照}抬头看着他，脸上没什么表情：“在棚里。”\n\n这是谎。\n\n而且是蓄意的。\n\n他说出口时，心里竟比想象中还平。\n\n平得像是早就练过。\n\n@{庄无烬}眸子眯了眯：“有人看见你夜里出过门。”\n\n“外门夜里出门的人不少。”@{沈照}说，“将死的人睡不着，也不是什么新鲜事。”\n\n@{祁连烛}在旁边笑了：“那你去哪里了？”\n\n@{沈照}偏头看了他一眼。\n\n若是前几日，这样一眼过去，他心里总会先起烦，再起防。\n\n现在却只剩下防。\n\n烦躁像被谁先拿刀刮掉了。\n\n“去后头放风。”他说，“怎么，祁师兄连废照棚的人半夜喘口气，也要记账？”\n\n这话不算硬。\n\n却比平日的@{沈照}硬得多。\n\n周小棘在一旁听得心都提起来，差点出声。\n\n@{祁连烛}脸上的笑反而慢慢收了。\n\n“昨夜旧炉外有灰痕新动，今晨灰井那边又起了封禁令。”他盯着@{沈照}，“你真当自己还能靠一句放风混过去？”\n\n灰井两个字一出，@{沈照}背后那点寒意立刻又紧了半分。\n\n可他脸上没露。\n\n他只是把手掌垂进袖里，让那道白痕藏住。\n\n“我若真去过灰井，”他说，“今早你们就不是来搜棚了，是直接来拿人。”\n\n这话落下，@{庄无烬}和@{祁连烛}的神色都微微变了一下。\n\n因为这话说中了。\n\n若照命司真坐实了夜探灰井的人是@{沈照}，外门根本轮不到先搜一轮棚。\n\n而现在先动的是@{庄无烬}，便说明他也只是在抢一步。\n\n抢在别人前头，看看能不能先把什么东西翻出来。\n\n这时外头忽然传来一阵更轻的铃声。\n\n不是外门值夜那种粗铃。\n\n而是细，冷，敲在人耳里像一根银针。\n\n@{庄无烬}回头的速度，比棚里任何一个人都快。\n\n门口那片晨雾里，@{岳怀川}提着昨夜那盏白罩灯走了进来。\n\n他今晨又换回了照命司巡灯使的黑纹袍，衣摆几乎没沾灰，像昨夜闯灰井、压白灯、拽着人从塌井里退出来的不是他。\n\n只有那盏灯还在。\n\n灯色比清晨更白。\n\n照得废照棚里每个人脸色都发青。\n\n“庄执事。”@{岳怀川}看了眼满棚狼藉，“照命司今晨只借你的人封线，没借你来先翻我的留验。”\n\n一个“我的”，说得不重。\n\n却把棚里气息生生压了一层。\n\n@{庄无烬}忙道：“岳巡使误会。我只是怕昨夜旧炉和灰井那边惊出的东西，先一步流进废照棚。”\n\n“怕得对。”@{岳怀川}淡淡道，“但从现在起，怕归怕，手别伸过线。”\n\n他说着抬了下手。\n\n身后两名照命司随行弟子立刻把一张新写的封条拍在门边。\n\n红印未干。\n\n上头只有四个字。\n\n留验重地。\n\n这四个字比昨夜当众那句“列留验”更难看。\n\n也更有用。\n\n周小棘愣愣看着那张封条，眼神里先是怕，随即竟浮出一点压不住的亮。\n\n像是头一回知道，废照棚这种地方的门上，也能贴一张叫别人不敢乱伸手的纸。\n\n@{岳怀川}又看向@{沈照}：“你，跟我出来。”\n\n@{庄无烬}像还想说什么。\n\n@{岳怀川}却没再给他机会：“灰井封禁期间，@{沈照}的口供、去向和接触人，都归照命司记。庄执事若有疑义，去调你们外门昨夜值更簿。”\n\n他说完，转身就走。\n\n像是根本不在乎有人听出这话里是在护人，还是在圈人。\n\n@{沈照}起身时，周小棘袖口忽然轻轻碰了碰他。\n\n力道很小。\n\n小得几乎像是错觉。\n\n可@{沈照}低头时，还是看见那少年用极快的眼色往他草席那边掠了一下。\n\n只有一下。\n\n可够了。\n\n席子在他被盘问这阵，被人动过第二次。\n\n@{沈照}心里一点一点沉下去。\n\n有人来搜，不只是外门这拨。\n\n还有另一只手。\n\n而那只手，比@{庄无烬}更知道自己在找什么。\n\n棚外晨光还灰着。\n\n@{岳怀川}没走远，只停在引水沟边，等他出来。\n\n那盏白灯就垂在他手边。\n\n灯意很稳。\n\n稳得像昨夜井底那句“谁举着官灯来找你，都别信”只是他睡昏了做的一场假梦。\n\n“你今早说谎了。”@{岳怀川}开口便道。\n\n@{沈照}脚步没停：“你昨夜也没把话说全。”\n\n@{岳怀川}看了他一眼。\n\n这一眼不算意外，倒像是在重新掂人。\n\n“你比我想得快。”他说。\n\n“我若慢，昨夜已经被灰井拖下去了。”@{沈照}道。\n\n风过沟渠，把一层宿灰吹得贴地走。\n\n@{岳怀川}沉默片刻，才道：“外门今晨会查，是因为我封了灰井之后，发现门外还有第三个人留下的痕。”\n\n这话他昨夜没说。\n\n现在说，便是有意放一半出来。\n\n@{沈照}没顺着问。\n\n他只道：“那你来废照棚，是想看他拿没拿到东西，还是想看我会不会先藏？”\n\n@{岳怀川}眉梢极轻地动了动。\n\n“都有。”他说。\n\n这人难得直白。\n\n也因此更像实话。\n\n可实话未必就能信。\n\n@{沈照}心里那点昨夜刚生出来的戒线，反而绷得更紧了。\n\n“午时前别乱走。”@{岳怀川}又道，“申刻我让人来带你去临时账房。昨夜灰井的事，你我都要再过一遍。”\n\n@{沈照}抬眼看他：“只是过一遍？”\n\n@{岳怀川}淡淡道：“你若肯把该说的都说了，便只是过一遍。”\n\n这话听着像退路。\n\n可退路是别人手里的。\n\n@{沈照}昨夜已经吃过一次这个亏。\n\n他没答应，也没拒绝，只点了点头。\n\n@{岳怀川}看了他两息，像想再说什么，最后却只留下一句：“今晨开始，不要让任何人碰你的手。”\n\n他说完便走了。\n\n这句话没有解释。\n\n却比昨夜任何一句都更叫人上心。\n\n@{沈照}低头看了眼袖中那只手。\n\n掌心白痕静静横在那里，像半截没写完的字。\n\n等他回到棚里，里头的人已被役弟赶去门外站成一排。\n\n草席、破碗、药罐翻得七零八落。\n\n周小棘正弯腰收拾自己的薄毯，一见他回来，立刻低声道：“你席子下头那块烂木板被掀过。”\n\n@{沈照}神色不动：“谁？”\n\n周小棘摇头：“我没看清脸。那人来得比庄执事他们早，脚步很轻，像怕惊着什么。她……”\n\n他说到这里顿了顿。\n\n“她？”@{沈照}抬眼。\n\n周小棘压低声音：“我只看见一截脚腕。很细，不像壮役，也不像外门这些常年跑火场的。”\n\n这便对上了。\n\n昨夜灰井门外那半枚窄脚印，不是他的错觉。\n\n也不是@{岳怀川}随口放的风。\n\n真有人在自己前头和后头，都摸过这条线。\n\n@{沈照}蹲下去，掀开自己那张破席。\n\n席底裂缝还在。\n\n旧铜牌和灰白碎片都没少。\n\n可边上多了一点东西。\n\n是一小撮极细的灰。\n\n灰里压着一根比灯芯还细的旧麻线，线头上打了个很怪的结，不像外门常见的绑火砂法，倒像是故意留给懂的人看。\n\n@{沈照}刚碰到那根线，掌心白痕便轻轻抽了一下。\n\n很轻。\n\n却把他整个人的神都拽紧了。\n\n周小棘在旁边看得后背发麻：“这是什么？”\n\n“不是给你的。”@{沈照}说。\n\n周小棘一怔，随即反应过来，忙点头：“我没看见。”\n\n这句话说得很快。\n\n快得像生怕给他添麻烦。\n\n@{沈照}抬头看了那少年一眼。\n\n这一眼里本该有点什么。\n\n感激也好，心软也好。\n\n可他先感觉到的，还是算计。\n\n周小棘若真能闭嘴，便可多留。\n\n若闭不住，就得另想法子。\n\n这个念头一起，@{沈照}自己都沉默了一息。\n\n因为他知道，这不是昨夜以前的他会先想到的东西。\n\n残灯没再烧他的记忆。\n\n它开始烧他下刀前那点犹豫了。\n\n“有人留给我的。”他最后还是把声音放缓一点，“你今晨什么都没看见，也别单独往外跑。若有人问，就说役弟进来前，你一直在睡。”\n\n周小棘用力点头。\n\n他正要再说，棚门那边忽然有人冷笑了一声。\n\n“原来废照棚里，也学会背着人咬耳朵了。”\n\n@{祁连烛}不知何时又折了回来。\n\n他手里掂着一只刚从地上捡起的破药碗，站在门边看着两人，眸子里那点笑薄得像刀口反光。\n\n周小棘脸一下白了，站都站不稳。\n\n@{沈照}却没起身，只把席边那撮灰用袖口一抹，先压进掌心。\n\n@{祁连烛}走近两步，目光先扫过周小棘，再落到@{沈照}手上：“藏什么？”\n\n“药渣。”@{沈照}道。\n\n“给我看看。”@{祁连烛}道。\n\n“你若想看，”@{沈照}抬眼，“去问岳巡使要留验簿。”\n\n这话一出，连周小棘都愣了。\n\n@{祁连烛}眼神一下沉了。\n\n“你真把那张封条当护身符了？”\n\n@{沈照}站起身来。\n\n两人本就差着半头。\n\n可这一刻，他竟没像从前那样先退。\n\n“不敢。”他说，“我只是忽然想明白，祁师兄这么急着回来，不像是替庄执事搜棚，倒像怕有人先把什么看见了。”\n\n周遭几个人听得脸都白了。\n\n这话太险。\n\n险得几乎是在明着撕。\n\n@{祁连烛}唇角一扯，笑意全没了：“你昨夜真去了不该去的地方。”\n\n“你若没惦记那地方，”@{沈照}道，“今晨也不会一趟两趟往废照棚跑。”\n\n两人之间那点本就紧的气，一下绷到最满。\n\n周小棘连呼吸都不敢大。\n\n@{祁连烛}忽然抬手，药碗直砸@{沈照}面门。\n\n这一砸不算重手。\n\n可快。\n\n快得就是冲着试反应去的。\n\n@{沈照}偏头避过，破碗擦着鬓角飞出去，砸在门柱上碎成两半。\n\n碎片溅了一地。\n\n其中一片划过周小棘小腿，立刻见了血。\n\n那少年疼得一缩，却硬生生没敢叫。\n\n@{沈照}视线落到那道血口上，胸口深处竟没有先起怒。\n\n先起的是冷。\n\n冷得像在替人算账。\n\n这一瞬，他终于清清楚楚地知道，自己又少了一点什么。\n\n不是记忆。\n\n是那种还没看清伤口，心里便先跟着一紧的本能。\n\n这念头让他背后发麻。\n\n可面上，他反而更稳了。\n\n“你故意伤他，”他说，“是想试我会不会乱，还是想看我手里有没有东西会掉出来？”\n\n@{祁连烛}眸光微缩。\n\n这反应够了。\n\n@{沈照}没再退，反而往前半步，声音压得更低：“你若真什么都不知道，今晨最该急的是灯库，不是我的草席。”\n\n话音未落，门外忽然传来一声冷喝。\n\n“祁连烛。”\n\n@{岳怀川}不知何时又折了回来。\n\n他站在门外，白灯未提，只手里拿着一本新记的留验簿，脸上看不出喜怒。\n\n“你外门若想自查，先把自己名字记进去。”他说，“废照棚里第二次动手翻搜的人，我正准备一个个问。”\n\n@{祁连烛}手指微不可察地紧了一下。\n\n就这一下，@{沈照}便知道，自己刚才那几句没压错。\n\n@{祁连烛}也许不是那个窄脚印的人。\n\n可他至少知道，还有谁在找。\n\n这就够了。\n\n@{祁连烛}冷冷看了@{沈照}一眼，到底还是退开了：“我只是回来看看，庄执事的人搜得干不干净。”\n\n“现在看完了。”@{岳怀川}道，“出去。”\n\n这人说话时，总有种不需要第二句的冷。\n\n@{祁连烛}终究还是走了。\n\n可走之前，那道目光在@{沈照}掌心停了极短一瞬。\n\n短得像刀尖点水。\n\n却足够说明，他已经盯上那只手了。\n\n等人散了，@{岳怀川}才看向周小棘腿上的伤：“去账房外拿药。”\n\n周小棘哪敢多留，连忙应了一声，几乎是逃出去的。\n\n棚里一空，便只剩两人。\n\n晨风从门边穿过，把地上碎碗渣吹得轻轻作响。\n\n@{岳怀川}看着@{沈照}：“你刚才故意激他。”\n\n“你刚才也故意放我单独回来。”@{沈照}道。\n\n两句话对上，谁也不比谁更白。\n\n@{岳怀川}静了一息，居然没否认：“我想看，找你的人会不会比我更急。”\n\n“现在看见了？”@{沈照}问。\n\n“看见一半。”@{岳怀川}说，“另一半在你手里。”\n\n他说这话时，目光扫过@{沈照}掌心。\n\n那目光不是在扫灰。\n\n是在看那道白痕。\n\n@{沈照}忽然想起他今晨那句“别让任何人碰你的手”，心里那道戒线立刻又绷起来。\n\n“申刻账房，我会去。”他说，“在那之前，你也别碰。”\n\n这话说完，连他自己都听出了里头那点硬。\n\n像是在划线。\n\n而且是当着照命司巡灯使的面划。\n\n@{岳怀川}看了他许久，最后却只道：“好。”\n\n这个“好”，比追问更麻烦。\n\n因为它意味着，对方也在往后退半步。\n\n退一步的人，不一定就更可信。\n\n也可能是为了看你接下来往哪边走。\n\n等@{岳怀川}也离开，@{沈照}才摊开掌心。\n\n那撮灰早被他汗意压成了一点冷泥。\n\n只有那根旧麻线还在。\n\n他把线头轻轻一挑，里头竟还卷着一小片薄得几乎看不见的灰纸。\n\n纸上没字。\n\n只画了一道极简的门形，门下又点了三点灰。\n\n旁人看了，只当是孩子乱抹。\n\n@{沈照}却一眼认出来，那是外门西侧旧账房的门牌记法。\n\n三点灰，不是门下三阶。\n\n是乙字炉旧卷第三格。\n\n这不是乱留的记号。\n\n是有人在告诉他，灰井那条线，卷档里还有东西。\n\n并且不想让照命司先知道。\n\n他把那灰纸在指间捻了很久。\n\n掌心白痕便跟着一下一下轻轻发紧，像在应这道线。\n\n申刻去临时账房。\n\n这是@{岳怀川}给的路。\n\n西侧旧账房。\n\n这是昨夜那只窄脚印、今晨那根灰线递来的路。\n\n一条在官灯底下。\n\n一条在灯外。\n\n@{沈照}坐在那张被翻得七零八碎的破席边，忽然很慢地笑了一下。\n\n笑意很浅。\n\n却冷。\n\n他原本以为自己这一卷里最难的是活。\n\n现在才知道，活下来之后，最难的不是选哪条路。\n\n是选哪一条谎，先说给谁听。\n\n午后，外门的天终于亮开了一些。\n\n可云层还压着，太阳像隔了一层灰布。\n\n周小棘拿着药回来时，腿上已包好粗布，走路一瘸一拐。\n\n他把半块冷硬的杂粮饼塞给@{沈照}，声音压得很低：“刚才有人去问我，你昨夜是不是出过门。”\n\n“你怎么说？”@{沈照}问。\n\n“我说你一直在。”周小棘顿了顿，又补一句，“我没把那根线的事说出去。”\n\n@{沈照}接过那块饼，指尖先触到的，是凉。\n\n再往后，才慢半拍地尝出一点粗粮发苦的味。\n\n“做得对。”他说。\n\n周小棘像松了口气。\n\n可下一刻，他又小心看着@{沈照}：“你申刻……真去照命司账房？”\n\n@{沈照}低头咬了一口那块发硬的饼。\n\n饼渣落在舌根，干，粗，苦得发木。\n\n这种味道他吃过很多年。\n\n从前总觉得难以下咽。\n\n现在却像只是知道它苦。\n\n并不怎么在意了。\n\n“去。”他说。\n\n周小棘脸色更白了。\n\n“那你还会回来吗？”\n\n这问题问得很轻。\n\n轻得像随便一口气都能吹散。\n\n@{沈照}抬头看着他，隔了一息，才道：“若照命司那条路真是活路，我自然回来。若不是……”\n\n他没有说完。\n\n因为没必要。\n\n周小棘却像听懂了，手指不自觉攥紧衣角。\n\n@{沈照}把剩下那半块饼吃完，拍了拍手上的碎渣：“若我申刻前没回棚，你就当我已经先去账房了。谁来问，都这么说。”\n\n周小棘怔住：“可你……”\n\n“记住就是。”@{沈照}道。\n\n这话说得不重。\n\n却没有给人再追问的余地。\n\n这是他第一次，把一个活人当成替自己遮路的幌子来用。\n\n念头落稳的那一刻，他心里竟没先起愧。\n\n只先把这一步能替自己拦住谁，算了个清楚。\n\n那点后知后觉翻上来的寒意，只在胸口停了一瞬，便又被压下去了。\n\n申时之前，照命司的带人铃果然先在东边响了。\n\n铃声一响，废照棚里的人都下意识往外看。\n\n这是官灯来收口供的信。\n\n也是许多人这辈子最后一次被带出去前，最常听见的声音。\n\n周小棘脸都白了：“他们来了。”\n\n“我知道。”@{沈照}起身，把那枚灰白碎片重新裹进布里，贴身收好。\n\n旧铜牌压在心口。\n\n那张画着门形和三点灰的薄纸，则被他塞进袖口最里层。\n\n他走到门边时，没有往东看。\n\n东边有官灯，有账房，有@{岳怀川}昨夜和今晨都留过的路。\n\n他只偏头看了眼西面。\n\n那边是外门最旧的一排废屋。\n\n旧账房就在最里头。\n\n平日连老鼠都嫌灰太厚。\n\n今日风却偏偏往那边吹。\n\n吹得墙缝间像有人在里头轻轻磨纸。\n\n“你不是要去账房吗？”周小棘在后头压着嗓子问。\n\n@{沈照}没有回头。\n\n“我会让他们觉得，我是去账房。”他说。\n\n话落，他提步便往西走。\n\n废照棚外那点天光灰得发冷。\n\n东边的带人铃还在响，一声一声，催得人心发紧。\n\n西边却很静。\n\n静得像许多年都没有活人进去过。\n\n@{沈照}踩过旧灰和碎石，一直走到那扇半塌的旧木门前，才慢慢停下。\n\n门牌早烂了。\n\n可门槛底下，果然压着三点新灰。\n\n有人比他先到一步。\n\n也可能，正在里头等。\n\n@{沈照}垂在袖中的手轻轻一紧。\n\n掌心那道白痕立刻跟着微微发热。\n\n下一瞬，他推开了门。\n",
    "outlineExpectation": "灰井一夜过去，白日压力立刻压到废照棚。沈照必须在庄无烬、祁连烛和岳怀川三方都盯着自己的情况下，把灰井带回来的东西和“不信官灯”的警告先藏住，同时顺着一条来自暗处的新线索，第一次主动偏离照命司给他的路。"
