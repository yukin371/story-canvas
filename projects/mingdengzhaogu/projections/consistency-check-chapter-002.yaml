    "chapterContent": "# 第二章 谁在照命\n\n天还没亮透，废照棚里已经有人醒了。\n\n不是因为睡饱，而是因为冻。夜里那场山风刮到后半夜，破棚四面漏得像筛子，草席和旧衣都压不住寒气。有人在咳，有人在梦里抽搐，还有人半夜没熬过去，天将亮时就只剩一具蜷着的硬壳。潮草、冷灰和没熬开的劣药味搅在一起，闷得人舌根都发苦。可这一回，最先让众人发出低低吸气声的，不是死人，而是本该死在旧炉场里的@{沈照}。\n\n他靠着土墙坐着，眼睛已经睁开了，脸色还是白，却不再是昨夜那种将要散架的灰败。胸口命灯仍旧虚弱，灯火像被冷水浇过，薄得发青，可它偏偏没灭。更怪的是，那道原本日日往里塌的空烧感竟被压住了一截，像有一层极细的东西贴在灯芯外头，把那点余火硬生生拢了回来。\n\n昨夜旧炉里的事一幕幕往回翻，火纹、裂响、那点冷白微光，还有一块被生生扯走的空白。@{沈照}闭了闭眼，想把那块空白的形状摸出来，却只摸到后脑一阵发紧的疼。他知道自己忘了什么，而且不是小事。那种感觉并不模糊，反而太清楚了，像有人把一枚钉子从骨缝里拔走，留下一个不见血、却怎么也填不平的孔。\n\n昨夜哭个不停的瘦少年缩在旁边，盯着他看了半天，终于哑着嗓子开口：“你不是进旧炉场了吗？”\n\n@{沈照}低头看了看掌心。昨夜那块旧铜牌还在袖里，边缘凉得像冰，可他没把它拿出来。“进去过。”他说。\n\n那少年像见了鬼，眼珠都微微发直。棚里几个原本装睡的人也慢慢坐起来，悄悄往这边看。旧炉场是什么地方，他们比谁都清楚。进去还能活着回来的，不是没有，但那种人轮不到住进废照棚。像@{沈照}这种连命灯都快熄的人，回来本身就像个不该出现的笑话。\n\n可笑话很快就引来了真正不想笑的人。\n\n棚门外脚步声一停，@{庄无烬}掀开破帘子进来，身后还跟着两个抬尸的杂役。那两个杂役原本是来收死人，进门第一眼却都看向了@{沈照}。@{庄无烬}的脸色比昨夜还沉，像被谁当着面扇过一记耳光。他没立刻说话，只盯着@{沈照}看，像是在确认这人究竟是真活了，还是旧炉场里爬回来的一具会动的灰。\n\n“命倒硬。”他终于开口，声音压得很低，“旧炉裂火是谁压住的？”\n\n@{沈照}喉间还有焦血味，回答却很平：“不知道。我把铜牌按进去后就昏了，醒来时火已经退了。”\n\n这话不算撒谎，却也没一句能让人安心。@{庄无烬}眯了眯眼，像想从他脸上抠出点别的东西。就在这时，门外又有人笑了一声，不轻不重，像拿指甲弹了弹灯罩。\n\n“庄执事，看来你昨夜那笔账，没算干净。”\n\n走进来的是@{祁连烛}。他今日换了件更齐整的乌纹外袍，腕上还缠着一圈稳灯线，显然是要去外门测灯台露面的装束。他扫过棚里众人，最后把目光钉在@{沈照}身上，眼神比昨夜更细，也更冷。“昨晚旧炉场的封山火纹被人惊动，今早天没亮，外门灯楼就记到了异波。一个快熄的人进去一趟，出来不但没死，灯还没散。”他嘴角扯了一下，“你说巧不巧？”\n\n废照棚里一下更安静了。谁都听得懂这话里的意思。若只是命硬，那是笑谈；若牵出了异常灯波，那就是祸。\n\n@{庄无烬}显然已经不想把事压在棚里。他抖手丢下一块木牌，正落到@{沈照}脚边。那木牌正面刻着“外门测灯”四字，背面烙着晨时的火印。“辰正，去测灯台。”他说，“照命司的人已经到了。你若没问题，当众测一遍，自然清白。你若有问题……”他没把后半句说完，只抬了抬下巴。旁边两个抬尸杂役会意，默不作声把门口让得更开。\n\n@{沈照}弯腰把木牌捡起来，动作看着和平日一样慢，掌心却已经生出一层冷汗。照命司。\n\n这个名字外门弟子几乎从小听到大。谁私借禁灯，谁命灯失控，谁体内多出不该有的火，都归他们查。青烬宗平日里最会在底层人身上摆规矩，可真碰上照命司，也得把灯楼簿册一页页摊开。若昨夜那盏残灯留下的异息真还在他身上，这一趟就不是去测灯，是去把胸口剖给别人看。\n\n可他不能不去。\n\n从废照棚到外门测灯台这一路，比昨夜去旧炉场时还难走。不是因为伤重，而是因为人。天色才发白，山道两边就已经站了不少外门弟子，显然都是被异波和照命司进宗的消息引出来的。有人认出@{沈照}，脸上的神色从惊讶慢慢变成了看热闹。废人从旧炉场里活着爬出来，本就是今日最大的怪事。\n\n外门测灯台建在半坡，一方青黑石台高出地面三尺，周围立着七根旧灯柱。柱身刻满辨灯纹，平日是给外门弟子测火稳灯、分派资源用的，今日却多了另一层森然。石台正中站着一个陌生青年，青灰长衣，袖口收得很紧，腰间垂着一面暗铜命牌，牌面上只有一道细直的白纹。他站在那里并不显眼，偏偏让人一眼就不敢多看，像那人身上的每一寸气息都在替别人量灯、量命。\n\n那就是@{岳怀川}。\n\n他没有外门执事惯有的那种高高在上，也没有宗门弟子爱摆的锋芒，只是安安静静站着。可越是这样，越让人觉得难躲。台下已经有不少人被提前测过，轮到@{沈照}时，四周竟比方才还静了一些。昨夜旧炉场的事显然已经传开，人人都想知道，这条本该烂在废照棚里的命，究竟是怎么熬过来的。\n\n“上来。”@{岳怀川}看了他一眼，声音不高。\n\n@{沈照}踏上石台的那一刻，脚下辨灯纹微微亮了一圈。那光很薄，沿着石缝游走，像几缕没声息的冷火。台下一名灯楼执记报了名姓与旧档：“外门杂役，@{沈照}。旧伤在身，命灯衰竭，原判下月前后熄灭。”说到这里，那执记自己都顿了一下，才继续道，“昨夜入旧炼灯炉场，今晨生还。”\n\n“把手按上去。”@{岳怀川}指了指台中央那块照灯石。\n\n照灯石只有巴掌大小，通体灰白，边缘却像被无数火焰灼过。石台附近常年烧灯油，风一卷，便有一股焦苦气贴着鼻腔往里钻。@{沈照}一只手按上去时，先觉出的是冷。紧接着，一丝极细的麻意顺着指骨往上爬，像有无形灯芯正从他血里探路。他背后顿时发紧，昨夜那点冷白微光几乎是在同一瞬间于胸口深处轻轻一颤，像被谁隔着厚灰敲了一下。\n\n不能让它露头。\n\n这是@{沈照}脑子里冒出的第一个念头。可第二个念头来得更快，也更狠。他忽然意识到，自己昨夜为什么能活下来，眼下其实根本不重要。重要的是，只要今日被台上这些人看出半点异常，废照棚都回不去。到那时，无论残灯想从他身上拿走什么，他都连讨价还价的命都没有。\n\n照灯石上的灰纹一点点亮起来，先是一线微红，随后竟稳稳停住，没有像旧档里那样一触即灭。台下传来一阵极低的骚动。外门弟子的命灯层级说到底是门价码，像@{沈照}这种人，本该连站上台都没多少人愿意看，可现在，人人看他的眼神都变了些。\n\n@{祁连烛}就站在台下一侧，抱臂看着，眉峰一点点压低。@{庄无烬}站得更远，脸色比刚才还难看。若@{沈照}今日当众塌灯死了，那是旧档无误；可他若当众稳住了，昨夜那场送命差事就会变成另一种账。\n\n“继续。”@{岳怀川}忽然开口。\n\n照灯石上的灰纹随声再亮一层，这次不是探，而是逼。那股麻意顺着掌心往命窍里拧，像想把他胸口那点余火一并掀开。@{沈照}眼前一黑，脑中那块缺失的地方也跟着狠狠一抽。他险些失手，可就在这时，胸膛最深处那点冷白微光又轻轻亮了一下，快得像错觉，只替他把那一波冲击稍稍垫了一瞬。\n\n也就是这一瞬，照灯石上的火纹终于定住，没有失控，没有炸裂，反而在灰白中透出了一层极淡的清光，像一盏将熄未熄的灯被强行从灰里捞起。台下彻底静了。\n\n照命司随行的记录弟子低头看了眼石纹，迟疑着报：“命灯未熄，火势回拢……介于引灯边缘，疑有回照。”\n\n“回照？”有人失声重复。\n\n外门里不是没有回光返照过的人，可那种“回照”多半只意味着再多烧半天命。可眼前这一下，却不像将死前的乱跳，反倒像有什么东西真把@{沈照}往回拖了一把。@{祁连烛}脸上的轻慢终于褪了个干净，他盯着石台上的人，像第一次真正把@{沈照}看进眼里。\n\n@{岳怀川}却没有立刻下结论。他走近半步，垂眼看着照灯石，视线像刀子一样薄，似乎要顺着那层清光剖进人的骨头里。片刻后，他才把手收回袖中，淡淡道：“灯没有问题。”\n\n这句话一落，台下先是静，随后才炸出更低、更杂的议论声。没有问题，不代表没人起疑；但照命司的人既然当众这么说，至少今日没有人能把@{沈照}直接拖走。\n\n@{庄无烬}像是被硬塞了一口没法吐出来的灰，脸色青了一瞬，才勉强开口：“既已测过，那便……”\n\n“但人要留意。”@{岳怀川}打断了他。\n\n这句话说得不重，甚至像随口补了一笔，却比方才那句“灯没有问题”更让人后背发凉。@{岳怀川}终于抬眼看向@{沈照}，目光里没有敌意，也没有怜悯，只是一种近乎克制的确认。“旧炉场的异波不是寻常回火。你昨夜能活下来，是你的命，还是别的什么，还得再看。”\n\n他说完，便转身下台，像并不打算当众再逼问什么。可正因为他没有追问，台下众人看向@{沈照}的眼神才更复杂。照命司的人不曾把他定成祸，却也没有把他放开。那等于在他头顶挂了一盏还没落下的灯。\n\n@{祁连烛}缓缓笑了一下，只是那笑里已经没了昨夜的轻蔑。“恭喜。”他说，“从今天起，你不是废照棚里那种没人记得住的烂灯了。”\n\n这话听着像贺，落进耳里却比讥讽更冷。因为@{沈照}知道，他说得没错。\n\n昨夜之前，他只是一个等死的人。活不活，不过多记一笔少记一笔。可从他走下测灯台这一刻起，事情就变了。有人想知道他为什么没死，有人想知道他身上藏了什么，也有人会因为“照命司留意”这四个字，先一步对他下手。\n\n@{沈照}握紧袖里的旧铜牌，掌心被边缘硌得生疼。胸口那点冷白微光已经重新沉下去，像什么都没发生过，可那块被挖走的记忆空洞还在，照灯石压过命窍后的余麻也还在。他站在晨风里，忽然生出一个很清楚的念头。\n\n昨夜旧炉场替他留下来的，不是一条稳稳的活路。\n\n那是一张刚刚亮出来的牌。\n\n而从今天开始，所有盯着灯的人，都要来摸这张牌到底值不值命。\n",
    "outlineExpectation": "承接首章活下来的余波，展现沈照的记忆缺口和异常灯息，同时让照命司与同门压力一起逼近，把他推上第一次公开测灯的场面。"
