    "chapterContent": "# 第十四章 井下换膏\n\n井口窄得只够一个人侧身下去。\n\n@{沈照}先钻。\n\n骨托压在胸前，小铜灯扣在肋下，连呼吸都得往细里收。\n\n刚一进缝，后头桥上便炸开一声裂火闷响。\n\n是@{岳怀川}把追得最快的那只手先压回去了。\n\n“别停！”他在后头低喝。\n\n沈照没应。\n\n不是不想应。\n\n是井道太斜，也太湿。\n\n脚下那层石面被潮气和灯膏磨得发腻，稍一分神，人就会顺着斜坡直接滑进更深处的黑。\n\n这地方和上头那面续息龛完全不是一路气味。\n\n龛里是封久了的死白蜡和旧灰。\n\n井里却是活的。\n\n潮铁味里混着苦膏、血腥，还有一股刚被火温过的陈骨气。\n\n像有人不久前才沿这条斜井下去，把什么东西重新吊起、抹膏、再往更深处送。\n\n怀里那盏小铜灯也在发热。\n\n不是章十三末尾那种催路的轻烫。\n\n而是隔着衣料，一下一下往他掌心旧伤里顶。\n\n像下头有什么东西正顺着这股白意反过来认他。\n\n沈照咬了咬牙，手肘撑住两边岩壁，硬把下滑的身子稳住。\n\n他这一稳，眼角余光便瞥见左侧石面上有几道很浅的擦痕。\n\n痕不长。\n\n却一条压着一条往下。\n\n不是人手。\n\n是窄车轮边或者绞索铁扣，反复磨出来的印。\n\n“他们常走这条路。”沈照压低声音。\n\n“不止常走。”岳怀川在后头回了一句，“还走得很急。”\n\n“你怎么看出来的？”\n\n“右壁有三处新崩口，都是重物擦急了打出来的。若只是照例巡井，不会这么赶。”\n\n沈照胸口微微一沉。\n\n赶。\n\n说明昨夜寅刻那次换膏，不只是例行照看。\n\n更像一次转移。\n\n再往下半丈，井壁右侧忽然嵌出三枚旧铜钉。\n\n铜钉上缠着干硬的黑绳。\n\n绳头却新断不久。\n\n断口还带毛刺。\n\n像方才才有人把拖着的东西从这里强行放下去。\n\n沈照才看清，那点白意便在怀里轻轻一撞。\n\n他眼前随之一晃。\n\n不是彻底失神。\n\n是那种熟得过头的错位感。\n\n仿佛脚下这段湿井，他不是第一次走。\n\n仿佛许多年前，也有人把他这样贴着壁往下压过，耳边全是绳索吃力的吱嘎。\n\n“先移人。”\n\n有个极哑的声音从记忆深处掠过去。\n\n“灯还在上头，不怕断。”\n\n另一个声音立刻压下来。\n\n“那二号呢？”\n\n“先别让他看见井底。”\n\n记忆只亮了一瞬。\n\n下一刻，掌心白痕便像被针硬戳了一下，疼得沈照险些松手。\n\n“怎么了？”岳怀川已经贴近。\n\n“它又在往里翻。”沈照喘了一口气，“不是看见什么，是像……有人沿着这条井，提前替我记过一遍路。”\n\n岳怀川沉了沉声。\n\n“还能撑？”\n\n“现在不能停。”\n\n这话刚落，井道上头便有碎石簌簌滚下。\n\n收尾房的人已经摸到缝口了。\n\n岳怀川没再废话。\n\n他反手把裂灯往上一扬。\n\n白火没炸。\n\n只沿着井壁几处旧膏痕轻轻一抹，像在黑里画了一层极薄的亮油。\n\n“我留了个假亮。”他说，“他们追得快，先滑下来的未必是人，也可能是火。”\n\n沈照听懂了。\n\n若后头那批人以为井道里还能直接提灯追，就得先吃这一层被岳怀川借势引开的旧膏。\n\n不至于把人全拦住。\n\n但够换他们几息。\n\n两人继续往下时，斜井已不再单是滑。\n\n底下开始有冷风往上钻。\n\n风不大。\n\n却带着一种空心的回响。\n\n像更深处不是死巷，而是接着一个能转声的井腹。\n\n再下去十余步，斜道终于微微放缓。\n\n前方黑里浮出一抹极淡的黄。\n\n不是裂灯。\n\n也不是白意。\n\n更像土炉快灭前，埋在灰底的一点余炭。\n\n“前头有人待过。”岳怀川低声道。\n\n“现在呢？”\n\n“若还在，听见我们了。”\n\n沈照把骨托往怀里又紧了紧。\n\n掌心那道白痕却在这时烫得更厉害。\n\n不是朝前。\n\n是朝下。\n\n像斜井尽头那点黄光底下，还压着另一口比续息龛更沉的空。\n\n两人贴着壁转过去时，井底豁然开了一小间石室。\n\n室不大。\n\n却比上头那面续息龛更让人心里发寒。\n\n石室正中横着一张窄铜槽。\n\n槽边有旧火炉。\n\n炉上悬着一只浅口铜盆。\n\n盆里半凝着乳白色的膏，表面却被翻过，边缘还沾着没彻底冷透的红。\n\n不是朱砂。\n\n是血。\n\n铜槽后头立着一架黑绞盘。\n\n盘索细得像灯丝，却一圈圈缠得密，直没入石室地面正中的圆井口。\n\n井口边缘全是新划痕。\n\n旁边还斜放着一张窄木担。\n\n担面只够绑一人。\n\n更后头那面壁上，则钉着三块薄铁牌。\n\n最左一块刻着：`龛`。\n\n中间一块刻着：`井`。\n\n最右一块只剩半边字。\n\n能认出的只有一个：`转`。\n\n“这不是存灯的地方。”岳怀川眼神一下冷了，“这是换膏井间。”\n\n沈照没答。\n\n因为他已经看见铜槽另一头还靠着一个人。\n\n那人瘦得几乎只剩一层枯皮。\n\n一条腿被旧绳绑在铜槽脚上。\n\n两只手却都黑得发亮，像常年拿膏、烤火、碰骨，把皮肉都熬成了半焦的壳。\n\n他还活着。\n\n胸口起伏极慢。\n\n却没死。\n\n更怪的是，他身边地上拖着一道刚断不久的血印。\n\n血不是从他腿上淌的。\n\n是从石室中央井口边一路擦过去，停在他手边。\n\n像有人临走前，把他顺手拖到这里，任他自己慢慢断气。\n\n岳怀川提灯上前半步。\n\n那人眼皮忽然颤了颤。\n\n像早在装死。\n\n又像直到此刻才被灯火逼醒。\n\n他睁眼的第一下，没看岳怀川。\n\n也没看裂灯。\n\n而是越过两人，直勾勾盯住沈照怀里那盏小铜灯。\n\n接着，喉间挤出一声极难听的气。\n\n像半截烧坏的风箱。\n\n“还……真下来了。”\n\n嗓子是坏的。\n\n可字还听得懂。\n\n沈照心里一紧。\n\n“你认得这灯？”\n\n那人笑了一下。\n\n笑意薄得像快裂的灰。\n\n“我认得的不是灯。”\n\n“是拿它下来的人。”\n\n岳怀川眸光一沉。\n\n“你是谁？”\n\n“守井的。”那人靠在铜槽边，像每吐一个字都要磨掉半口气，“守膏、守绞盘、守那口……怎么都不肯断的命。”\n\n“照命司的人？”\n\n“以前算。”\n\n“现在呢？”\n\n“现在算脏布。”他喉咙里滚出一声低咳，“用完了，扔在井间自己烂。”\n\n岳怀川没有立刻信。\n\n他先扫了一眼石室四周。\n\n东壁上挂着三只空皮囊。\n\n囊口发白。\n\n像长年装灯膏。\n\n西壁地上则散着几枚骨签碎片，碎片旁压着半张被血糊住的旧纸。\n\n纸角露出两个还能认的字：\n\n`寅换`\n\n再往井口边看，还有一把带钩的小铜夹，夹齿上新膏未干。\n\n这地方不像假的。\n\n更不像临时拿来唬人的空屋。\n\n“昨夜谁下过井？”岳怀川直接问。\n\n那守井人看了他一眼，竟先笑了。\n\n“你们追到这儿，还在问‘谁’？”\n\n“那我换个问法。”岳怀川道，“一号现在哪儿？”\n\n这一回，那人脸上的笑意慢慢淡了。\n\n淡得近乎发苦。\n\n“龛里留的是灯。”\n\n“井下吊的是息。”\n\n“真要能动的那部分，昨夜寅刻后就往下转了。”\n\n沈照掌心白痕猛地一跳。\n\n“人？”\n\n“你们总爱问是不是‘人’。”守井人喘了喘，“卷里写活，就要留活的那口。卷里写死，又不能让它真死透。留到最后，人不像人，灯不像灯，册也不是原来的册。你说那算什么？”\n\n他说这话时，眼珠一直黏在沈照身上。\n\n像透过他，看另一个早就该死的人。\n\n沈照心里那股发凉的火越烧越紧。\n\n“昨夜是谁押下去的？”\n\n“两个收尾房的。”\n\n“还有一个不记名的。”\n\n“不记名？”\n\n“每次来都不挂牌。”守井人咳出一口黑红，“只带主印话。别的手都得听。”\n\n岳怀川冷声道：“他说了什么？”\n\n守井人闭了闭眼。\n\n“说上头那面龛不能再留了。”\n\n“说二号既然自己走进北腹，这地方迟早会被翻穿。”\n\n“说要先把井底那部分转下去，免得再让一个应名的人摸到旧位。”\n\n沈照胸口像被人迎面打了一拳。\n\n应名的人。\n\n那不是泛称。\n\n是在说他。\n\n守井人显然也看出了这一点。\n\n他舔了舔干裂嘴角，声音轻得像要断。\n\n“你手上那道白，不是单认灯。”\n\n“是接灯。”\n\n“再往下，你就不只是替名。”\n\n“还可能替身。”\n\n石室里一下静了。\n\n连井底往上返的那点风，都像在这句话后头停了一瞬。\n\n沈照只觉怀里那盏小铜灯热得发实。\n\n不是被揭穿后的恼。\n\n是身体深处某种更糟的东西，被对方一句话硬拎到了明处。\n\n他想起斜井里那一闪而过的旧声。\n\n先别让他看见井底。\n\n那时防的，恐怕就不是他知不知道旧案。\n\n而是他一旦真下到井底，会不会顺着这口灯，被直接推去顶上那个空出来的壳。\n\n“放什么屁。”岳怀川往前一步，挡在沈照半个身位前，“主印不到，谁敢擅自拿活人接灯？”\n\n守井人看着他，眼里竟掠过一丝近乎怜悯的东西。\n\n“巡使。”\n\n“你在照命司里待得还不够久。”\n\n“规矩是拿来让卷面干净的，不是拿来让人活的。”\n\n这句话刚落，斜井口忽然传下一声极轻的摩擦。\n\n不是风。\n\n是绳。\n\n有人在上头放索。\n\n岳怀川猛地回头。\n\n“他们下来了。”\n\n守井人却像早料到一样，眼里连波都没起。\n\n“他们不会先杀我。”\n\n“我知道昨夜转井用了哪块牌。”\n\n“那你最好现在说。”岳怀川声音已冷得发硬。\n\n守井人没立刻开口。\n\n他先抬起一只焦黑的手，极慢地指了指东壁最下那只空皮囊。\n\n“里面。”\n\n“昨夜换过的铁牌、绞索刻号、半张转签，都塞在那儿。”\n\n“本来今晨要一起焚。”\n\n“还没来得及。”\n\n沈照立刻过去，一把扯下那只皮囊。\n\n囊口打得死紧。\n\n他直接用焦骨旧牌边角一划，袋口裂开，里头哗啦落出三样东西。\n\n一块指长铁牌。\n\n半截发白的绞索号签。\n\n还有一张被膏和血糊住大半的小转签。\n\n铁牌正面只刻了两个字：\n\n`丁井`\n\n背面则是一笔极细的旧灯纹，灯纹末端带了一个几乎看不出的钩。\n\n不是照命司常规井牌。\n\n更像收尾房自己的暗记。\n\n号签上则压着一行浅字：\n\n`三绞下行`\n\n至于那张小转签，只剩中段还能看清：\n\n`寅后转下`\n\n`活段先行`\n\n`膏血另补`\n\n沈照看见“活段”两个字时，指骨都跟着一紧。\n\n不是灯段。\n\n不是骨段。\n\n是活段。\n\n这就说明昨夜往下送的，至少有一部分还带着“活”。\n\n“井底还有多深？”他抬头问。\n\n守井人盯着那张转签，像看见了自己这十几年都没敢碰穿的鬼。\n\n“两层。”\n\n“先过转灯井。”\n\n“再下养息腹。”\n\n“你们若还想追，就别走正绞盘。”\n\n“他们会在那里等。”\n\n“侧边还有路？”岳怀川追问。\n\n守井人点了点头，又像疼得厉害，整个人顺着铜槽往下滑了一寸。\n\n“井口北侧。”\n\n“有条工索缝。”\n\n“本来只给换膏的人走。”\n\n“细，险，但快。”\n\n“为什么告诉我们？”沈照问。\n\n那人这回看他的时间比先前都久。\n\n久到像要把他脸上每一道还没真正定住的轮廓都看清。\n\n“因为我昨夜看见了。”\n\n“看见他们把那东西往下送时，井里的白火忽然跳了一下。”\n\n“和十二年前，一模一样。”\n\n“我就知道，北腹迟早还会把另一个人送回来。”\n\n“只是没想到，是你自己走下来的。”\n\n他话音未落，斜井上头便猛地落下一声钩铁撞壁的脆响。\n\n这一下离得很近。\n\n不是还在试。\n\n是第一只手已经顺索下井。\n\n岳怀川不再耽搁。\n\n“正绞盘不能碰。”他声音压得极低，却快得像刀背抹火，“上头一收索，下头一钩板，人会直接挂死在半井。北缝是他们换膏人抄近的活路，也是我们现在唯一能抢前的路。”\n\n他一把抓起铁牌和转签，反手把裂灯压进铜槽边缘那层半凝的白膏里。\n\n白膏遇火不爆。\n\n却一下化开。\n\n化开的瞬间，整只铜槽里那点没冷透的血膏便沿着浅沟往前猛地一窜，像一条被火惊醒的白蛇。\n\n“走北侧。”他喝道。\n\n沈照转身时，守井人忽然又开了口。\n\n这次声音更哑。\n\n也更急。\n\n“二号。”\n\n沈照脚下一顿。\n\n“别让他们归册。”\n\n“一归册……你就真不是你了。”\n\n下一瞬，斜井口白光一闪。\n\n有人提灯下来了。\n\n而且不止一个。\n\n岳怀川抬手便是一记裂火，硬把井口前半段照成惨白。\n\n趁那一下晃眼，@{沈照}已经顺着守井人指的北侧摸到一条窄缝。\n\n缝比上头那道更窄。\n\n却真有风。\n\n而且风底下还带着一股更新的血膏味。\n\n不是井间这盆残血。\n\n是刚挪走不久，沿路滴下去的活血。\n\n两人一前一后挤进缝里时，背后忽然传来守井人极短的一声闷哼。\n\n像是谁替他们挨了第一刀。\n\n沈照牙根一紧，却没回头。\n\n不是不想。\n\n是回头也来不及了。\n\n北侧工索缝一路斜切向下。\n\n尽头竟直接开在另一口更深的圆井边。\n\n这井比换膏井间那只更大，也更空。\n\n四周全是铁索与旧滑槽。\n\n井壁上嵌着一圈早已磨白的脚踏孔。\n\n而正对他们的那道脚踏孔边，赫然还挂着一副刚离井不久的皮垫。\n\n皮面潮湿。\n\n绳结是新的。\n\n底下那只承人用的窄吊板还在轻轻摇。\n\n有人刚下去。\n\n而且走得很急。\n\n更糟的是，井口对面那排脚踏孔边还留着两点新刮出的火星灰。\n\n灰没散，说明刚才不止有人下井，还有人停在半腰接应。\n\n若他们再慢几息，下头那块“活段”要么被继续转走，要么会有人专门等着把追下来的二号钉回册里。\n\n所以这已不是追不追的问题。\n\n而是谁先一步下到井底的问题。\n\n怀里那盏小铜灯也在这一刻猛地一跳。\n\n不是朝旁。\n\n是朝井底直直一坠。\n\n白意沉得几乎要从灯芯里脱出来。\n\n@{沈照}下意识探头往下看。\n\n井太深。\n\n看不见底。\n\n可就在黑到快吞光的那一层里，忽然传上来极轻的一下金属磕响。\n\n像吊板撞到了井壁。\n\n也像井底有什么人，刚被拖着转过一道弯。\n\n紧跟着，小铜灯里那点白意便极轻地颤了三下。\n\n不像寻路。\n\n倒像认出下面那东西还没断。\n\n@{沈照}喉间一紧，几乎是下意识地攥住了灯柄。\n\n那不是单纯的“还活着”。\n\n更像井下那部分东西，也正在借着这点白意反过来找他。\n\n“岳怀川。”他声音压得很低，“下面不是只在押一号。”\n\n岳怀川已经把裂灯贴到井沿，目光冷得发硬。\n\n“我知道。”\n\n“他们还在替一号找新的壳。”\n\n“所以我们必须现在下去。”\n\n井底那一下极轻的磕响又传了上来。\n\n这一次，像是吊板停住了。\n\n也像有人在黑里，回头碰了一下井壁。\n\n若井底等着他们的不是一号，而是十二年前就替@{沈照}预好的那副壳，那被一路押下去的，到底是谁？\n",
    "outlineExpectation": "沈照与岳怀川顺着续息龛后的湿黑井道继续下潜，在收尾房封桥追杀前抢进一处仍在运转的换膏井间，第一次把“一号被活养”从抽象猜测落成具体规程、具体人手和具体转移路径。沈照也会因为灯息贴骨而接到更近的一段旧押记忆，意识到自己若继续往下，不只是替名，甚至可能被推成新的承灯壳。章尾要把钩子推到更深的转灯井：他们拿到昨夜转移一号的鲜热痕迹，却发现真正关键的那一部分已经被人往井底送走。"
