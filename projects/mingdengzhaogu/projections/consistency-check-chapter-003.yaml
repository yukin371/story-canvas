    "chapterContent": "# 第三章 第一次借命\n\n测灯台上那句“灯没有问题，但人要留意”还压在众人心口，西侧山腰忽然传来一声闷响。\n\n那声音不像雷，更像一口被烧得发胀的大缸从里面裂了一道缝。紧接着，七根旧灯柱上的辨灯纹同时一跳，原本稳着的灰光齐齐往西边偏了一寸，像被什么东西硬拽过去。台下不少外门弟子脸色都变了。\n\n“外门灯库！”有人失声叫出来。\n\n山腰那边紧跟着腾起一股赤白相间的火烟。火烟不高，却极凝，像有人把满库压着的灯油和碎灯芯一起煮开了，又被封火阵死死扣在半山，不许它炸出去。风一卷，那股又焦又腥的热味已经扑到了测灯台前。\n\n@{庄无烬}脸上的青气一下更重。他转头看了一眼西边，几乎没停，就朝身后几名杂役厉声喝道：“愣着做什么，去压库门，先把下层封住！”\n\n那几名杂役里有两个腿都软了。外门灯库不是寻常库房，里面堆的尽是废灯、旧油、裂过的灯盏和封存失败的灯灰，一旦失控，比旧炼灯炉场还难缠。平日修补都得挑时辰、看火脉，更别说这样明着炸。\n\n@{祁连烛}抬眼看了一下火烟，眉头微蹙，却没有动。他这种外门里快站稳脚跟的人，遇到功劳会抢，遇到这种随时要命的脏活，却知道该先让谁去填。\n\n@{岳怀川}也转过了身，目光落在那团火烟上，神色终于有了些变化。他没说话，只往西边走了两步，像在听什么。\n\n就在这几息工夫里，@{庄无烬}的视线已经重新钉回了@{沈照}身上。\n\n“你，跟我走。”他指的不是别人，正是刚从照灯石上退下来的@{沈照}，“你既然命灯回拢，正好去下层封火槽守一手。”\n\n台下顿时起了一阵更细的骚动。谁都听得出来，这不是什么“正好”，而是刚测出一条没死透的命，便立刻拿去试火。\n\n@{沈照}胸口那阵被照灯石压出来的余麻还没散，掌心里全是冷汗。他很清楚，下层封火槽是给整座灯库泄火用的，一旦火脉倒灌，守槽的人先死。@{庄无烬}让他去，不是信他稳，是觉得他今天就算烧死在里面，也比灯库真炸了划算。\n\n“我才测完灯。”@{沈照}声音不高，“命窍还乱着。”\n\n@{庄无烬}盯着他，像在看一件会不会突然裂开的器物：“你若真乱，方才照命司就该把你拿走。既然没拿，说明你还能烧。”\n\n这话一落，旁边竟有几人下意识往后退了半步。能不能烧，在青烬宗底层从来不是一句问话，而是一张价码。\n\n那瘦少年不知何时也被人从台下拽了出来，怀里还抱着一捆封火砂袋，脸白得发青，站都站不稳。显然，@{庄无烬}不只要一个替死鬼。\n\n@{沈照}看了他一眼，心口微沉。昨夜这少年还在废照棚里哭，今天就被塞到了灯库门口。青烬宗做事，一向讲究把还能喘气的人用到最后一口。\n\n“走不走？”@{祁连烛}忽然笑了一下，语气却冷，“灯库若炸，先烧的是整条外门火脉。你若现在就软，方才那点回照，可就成了笑话。”\n\n@{沈照}抬眼看向他。@{祁连烛}说得像激将，眼底却更像在等他露怯。只要他当众退一步，刚在测灯台上攒起来那点“活下来的人”的分量，立刻就会被踩回泥里。\n\n更远处，@{岳怀川}已经停下脚步，回头看了这边一眼。\n\n那一眼不重，却像一根细针，正钉在@{沈照}后背。\n\n他忽然明白，今日这一趟自己躲不过。躲了，外门这群人会顺手把他碾回废照棚；去了，至少还能在火里争一次气。至于争完之后会不会死，只能到时再算。\n\n“带路。”@{沈照}把袖中的旧铜牌按得更紧，先一步朝西侧山道走去。\n\n灯库建在半山凹处，三面石壁，只有一道向下斜开的黑门。门外封火阵已亮到刺眼，十几道火纹像烧红的锁链缠在石门上，不断发出细碎爆响。几个杂役正拼命往阵脚里填封火砂，可砂袋一落下去就被烤得起烟，根本压不住那股从地底往上顶的躁火。\n\n离得近了，@{沈照}才看清门缝里正往外渗的，不只是火，还有一点一点碎亮的灯星。那不是好兆头。只有库里压着的废灯被一齐烧裂，才会把这种东西逼出来。\n\n@{庄无烬}飞快交代：“下层有三道封火槽，最里那一道已经反冲。你们进去，把铜闸压回去，再把泄火口拧死。做成了，记功；做不成……”他没说完，只朝黑门抬了抬下巴。\n\n没人接这句空头账。\n\n一个年长杂役刚把手碰上门环，封火阵里忽然窜出一道白焰，擦着他的肩膀卷过去。那人连惨叫都没来得及喊全，半边衣衫就焦成了黑壳。门口顿时乱成一团，方才还想往前挤的人齐齐后退，谁都不想做第一个踏进去的。\n\n@{庄无烬}脸色阴沉，正要骂人，阵脚却又是一震。这一回，不止门在响，连山壁里都传出轰鸣，像下头已经有一口大火池被掀翻了。\n\n“再拖就一起死。”@{岳怀川}不知何时走了过来，目光落在石门下方一道发白的裂纹上，“最里层不是单纯失火，是旧灯煞翻出来了。”\n\n@{庄无烬}像是抓住了什么，立刻厉声道：“听见没有！进去！”\n\n他话音未落，竟伸手在那瘦少年背上重重一推。少年本就腿软，这一下直直朝门里跌去。@{沈照}眼神一沉，几乎是本能地伸手去拽，结果自己也被带得往前一晃。下一瞬，石门后的热浪猛地拍出来，把两人一并卷了进去。\n\n黑门在身后轰然合上。\n\n下层比外头还热，热得不见明火，只有一股压在肺里出不去的烫。四面墙上嵌着成排的旧灯槽，槽里本该封着废灯和残油，此刻却全亮着乱光，红的白的灰的，一团团在黑暗里跳，像一窝被惊醒的毒虫。\n\n那瘦少年扑在地上，咳得几乎要吐血。@{沈照}把人拽到身后，自己也被热气冲得眼前发黑。最深处那道封火槽已经裂开半尺，铜闸被顶得歪斜，下面正有火浆一样的东西一股股往上涌，每涌一次，整座灯库都跟着震。\n\n按@{庄无烬}的话，压回铜闸就行。\n\n可只看一眼，@{沈照}就知道那是放屁。铜闸早被旧火烧软了，别说压回去，就是靠近三步，都能把人烤穿。@{庄无烬}把他们送进来，本来就没指望有人活着出去。\n\n“师、师兄……”瘦少年声音都抖散了，“怎么办？”\n\n@{沈照}没立刻答。\n\n他听见了另一种声音。\n\n不是火响，不是铜闸崩裂，而是胸口最深处那点冷白微光，在这一片乱火里极轻地颤了一下。像有人隔着厚厚灰烬，用指尖敲了敲灯罩。\n\n旧铜牌在袖里冰得扎手。\n\n@{沈照}忽然想起昨夜旧炉场里，自己昏过去前似乎也听见过类似的动静。不是说话，更像一盏灯在等他自己开口。可一旦开口，要付什么，他心里并非没有数。\n\n第一章之后，他丢了一块记忆。\n\n如果再借一次，丢的就未必只是记忆。\n\n封火槽又是一震，这次裂口直接崩大，几团碎亮灯星裹着白焰冲了出来。离得最近的一个旧灯架当场炸裂，碎铜擦着@{沈照}脸颊飞过去，刮开一线血口。那瘦少年吓得连滚都不会了，只会死死抓着地面喘。\n\n不能再等。\n\n@{沈照}盯着那道裂口，慢慢把袖里的旧铜牌拿了出来。铜牌边缘依旧是凉的，可凉意里藏着一点很细的跳动，像脉。\n\n“昨夜你替我扛了一次。”他盯着铜牌，声音低得只够自己听见，“这次我自己借。”\n\n灯库里轰鸣不断，当然没人回应。\n\n可下一息，他掌心那道被碎铜划开的伤口里，血忽然自己渗了出来，沿着旧铜牌斑驳的纹路一寸寸爬开。胸口深处那点冷白微光随之亮起，比昨夜清楚，也更冷，像一根针从骨头缝里缓缓刺进去。\n\n@{沈照}浑身一僵。\n\n他忽然看见了。\n\n满库乱窜的不是单纯的火，而是一缕缕互相撕咬的灯息。那些废灯、残油、碎芯里还剩着一点没烧干净的命，平日被封火阵压着，如今阵一乱，全都翻了出来，争着往活人身上扑。最深处那道封火槽也不是自己裂的，是有东西在下头拼命顶，要借这满库废灯往上钻。\n\n而他胸口这盏灯，恰好能把它们压回去。\n\n代价是他自己。\n\n@{沈照}闭了闭眼，再睁开时，眼底已被那层冷白压得极静。他没再往后退，反而攥紧旧铜牌，迎着扑面而来的热浪一步步朝裂口走去。\n\n每走一步，胸口都像被人剜去一点什么。先是耳边那些杂乱的轰鸣变远了，接着连方才那股快把人逼疯的惧意也淡下去，像被谁从心里轻轻刮走了一层。\n\n这不对。\n\n可他已经停不下。\n\n裂口前的白焰猛地卷起，一下扑到他面门。@{沈照}抬手把旧铜牌按进那团火里，掌心皮肉立刻发出焦糊味，疼得骨头都在缩。可就在铜牌触火的一瞬，满库乱窜的灯星像被什么看不见的线齐齐扯住，竟齐刷刷停了一刹。\n\n就是这一刹，@{沈照}把另一只手按上了歪斜的铜闸。\n\n他不是在和火硬拼。\n\n他是在借胸口那盏残灯的势，把满库散掉的灯息重新往封火槽里按。那些本来见人就钻的乱光此刻像被强行拧回了同一条路，一缕缕贴着他的手臂、脊背、胸口往里灌，再顺着那点冷白微光沉进骨头，最后被他压回裂口之下。\n\n整个过程不过十几息，@{沈照}却觉得像把自己从头到脚烧了一遍。\n\n身后的瘦少年终于回过神来，哆哆嗦嗦把一袋封火砂推到他脚边。@{沈照}没回头，只嘶声吐出两个字：“倒上。”\n\n少年连忙照做。\n\n封火砂一落，铜闸外那层乱跳的白焰立刻暗了三分。@{沈照}眼前发黑，却还是死死按着铜闸不松。若是此刻收手，方才压回去的东西就会卷土重来，到时他们两个谁都活不了。\n\n门外不知是谁察觉了动静，开始拼命敲门。可这时再开门，外头的人一样会被乱火卷进来。\n\n“别开！”@{沈照}猛地喝了一声，嗓子里全是血腥气，“等它沉下去！”\n\n这一声喊出去，连他自己都愣了一下。\n\n那不是因为他忽然不怕死。\n\n而是他发现，自己真的不那么怕了。\n\n方才还贴在后背上的寒意，像被那盏灯顺手拿走了一半。取而代之的是一种冰冷得近乎锋利的清醒。他知道这清醒不属于好事，可此刻只有这股清醒，能让他把铜闸继续压住。\n\n又过了数息，裂口下头那阵拼命上顶的动静终于弱了。\n\n满库乱跳的灯星一颗颗熄灭，墙上灯槽也重新暗下去，只剩最深处还浮着一丝细白火线，像伤口缝里没擦净的骨色。\n\n@{沈照}这才慢慢松手。\n\n他一松，整个人也跟着向前栽去。那瘦少年慌忙扑上来扶，却被他身上的热意烫得一哆嗦。黑门这时终于被人从外面合力拉开，凉风和嘈杂一起灌进来。\n\n门外站着的人全愣住了。\n\n最里层封火槽前，原本该把人烧成灰的乱火已经沉了大半。@{沈照}半跪在地，手还搭在铜闸上，掌心焦黑见肉，胸前衣襟被汗和血浸得透湿。那瘦少年则活生生站在他身后，除了脸白得像纸，竟也没死。\n\n没人想到，进去的两个废人，真能把这口火压下来。\n\n@{庄无烬}脸上的神色难看得几乎挂不住。他显然更希望看到的是两具尸首，而不是一个把灯库从炸边上拖回来的@{沈照}。可火是当着所有人的面压下来的，这笔账他想抹，也抹不掉了。\n\n@{祁连烛}盯着最深处那道封火槽，眸子一点点缩紧。他看得出来，单靠封火砂和铜闸，绝不可能压到这个地步。从这一刻起，他再看@{沈照}时，眼里第一次没了看废人的轻慢，只剩被人突然挤到脚边的戒备。\n\n@{岳怀川}却没有看槽口。\n\n他在看@{沈照}。\n\n准确些说，他在看@{沈照}手里的旧铜牌，以及那点尚未完全散尽的冷白灯息。那灯息极淡，别人未必看得出来，可在他眼里，却像黑夜里一根被短暂点亮过的细针。\n\n“人先带出来。”@{岳怀川}开口时，声音仍旧平稳，“灯库今晚封死，谁也不许再动下层。”\n\n四下无人反驳。\n\n@{沈照}被人扶着走出黑门时，脚下轻得厉害，像踩的不是石阶，是一层薄灰。他本以为自己会疼得厉害，会怕，会后知后觉地发抖，可这些都没有。胸口那点冷白微光已经重新沉了下去，只剩一阵空。\n\n那空不是伤口，而像是心里某块原本该有东西的地方，忽然被掏净了。\n\n他低头看向手中的旧铜牌，想稳一稳神，却在这一瞬间僵住。\n\n这块铜牌他明明带了很多年。\n\n可他忽然想不起，它最初是谁交到自己手里的了。\n\n不是模糊，不是记岔。\n\n而是那个人、那只手、那句可能说过的话，像被整整齐齐剜掉了一截，只剩“这东西对你很重要”这一点空壳，还留在原处。\n\n@{沈照}指节一下攥得发白。\n\n比起掌心那片焦烂，这种空白更让他发冷。因为他很清楚，这不是偶然。这是那盏灯借给他的命，正在照价收账。\n\n他也同样清楚，自己从这一刻起，再不是废照棚里那个被人顺手丢进火里都不会有人记账的将死废人了。\n\n“现在知道怕了？”@{祁连烛}不知何时走近，目光落在他手上，话里带笑，眼底却全是审视。\n\n@{沈照}抬头看他，竟只觉得吵。\n\n连他自己都被这反应惊了一下。若是换作昨日，@{祁连烛}靠近一步，他心里都会先起戒备和烦躁；可此刻，那些情绪像隔了一层薄冰，浮得起来，却落不到实处。\n\n他没理会@{祁连烛}，只是越过人群，看向更外侧的石阶。\n\n@{岳怀川}正站在那里。\n\n山风穿过封火阵后，带着一点尚未散净的焦味，也带着那缕极淡的冷白灯息，一直飘到他袖边。@{岳怀川}垂眼看着那阵风，片刻后才重新抬眸，与@{沈照}遥遥对上。\n\n他的眼神比第二章测灯时更深，也更确定。\n\n像是终于看明白了什么。\n\n“不是回照。”@{岳怀川}轻声道。\n\n声音不高，只有离得最近的@{沈照}听见了。\n\n下一句更轻。\n\n“是借命。”\n",
    "outlineExpectation": "在一场本不该由沈照扛的外门危机里，让他第一次主动借残灯翻盘，给出早期爽点，同时明确“每借一次，就会丢掉更多自己”的长线代价。"
  },
