    "chapterContent": "# 第二十章 真原簿\n\n“下面那层，恐怕才是真原簿。”\n\n@{岳怀川}这句刚落，拖板已经不再只是滑。\n\n而是在坠。\n\n不是往直井里坠。\n\n像沿一根被人从整部旧簿脊背里硬剖开的暗骨，一路向更深的腹心塌下去。\n\n板身两侧不断擦出细碎的白火。\n\n火不热。\n\n像一层层被磨开的旧页边，在黑里自己发光。\n\n@{沈照}伏在板上，胸口还顶着总簿井里那股没有完全退干净的回册冲动。\n\n喉间发紧。\n\n牙关也酸。\n\n像只要再听见一声“归”，那口被他死死咬住的气就会自己往外冲。\n\n可比起那股冲动，更让他难受的是另一件事。\n\n他还记得周小棘。\n\n知道那是废照棚里会替人留半块冷饼、会蹲在棚口冲他笑的活人。\n\n却已经想不起那笑落在耳里，究竟是什么声。\n\n不空。\n\n也不疼得撕心。\n\n只是那里本来该有一点极具体的东西。\n\n现在没了。\n\n这个认知，比总簿井里那些浮起来的假字还更冷。\n\n“守住呼吸。”岳怀川在前头压低声音。\n\n“这条槽比上面认得更细。你一乱，它会顺着你胸里那口气往回翻。”\n\n沈照没答。\n\n只把那块崩了一角的骨片又往掌心扣紧了些。\n\n骨片上那句`照，不要应。`\n\n此刻摸着不再像警告。\n\n更像是有人在很久以前，替他把一句真正能救命的话先剥了下来。\n\n暗槽忽然一缓。\n\n拖板底下传来一声极轻的“咔”。\n\n像终于被什么卡住。\n\n下一瞬，前头整片黑陡然打开。\n\n不是井口。\n\n也不是廊。\n\n而是一座半倒着的页腹。\n\n无数薄得近乎透明的白膜，从穹顶一层层垂下来。\n\n有的长。\n\n有的短。\n\n有的只是撕裂后还连着一点边角。\n\n它们不整齐地垂在半空，像很多被人活活扯下、却又没被彻底丢掉的旧页。\n\n每一页里都封着一点东西。\n\n有的是血色。\n\n有的是发灰的指印。\n\n有的是一句已经碎得看不清的残字。\n\n还有少数几页里，分明压着半张会动的人脸。\n\n脸不完整。\n\n一会儿有眼。\n\n一会儿只剩嘴角。\n\n像谁被拆开以后，又胡乱按回了几片。\n\n拖板冲出槽口，斜斜卡在一方白石台边。\n\n石台不大。\n\n却正对着页腹最深处那一面黑壁。\n\n黑壁中央钉着七枚长骨钉。\n\n骨钉之间，绷着一张比周围所有白膜都更厚的活页。\n\n页心那点白，不是静的。\n\n而是一下一下，在起伏。\n\n像一口被钉在纸里的呼吸。\n\n岳怀川先落地。\n\n裂灯白意这回没有照远。\n\n只是沿石台边缘一扫，立刻扫出三道断裂的拖痕。\n\n新鲜。\n\n还没被页腹里的白潮彻底吃平。\n\n“有人比我们先来过。”他说。\n\n“不是今天。”沈照盯着那三道痕。\n\n“是总簿井乱起来前，这里就一直有人走。”\n\n页腹里没有风。\n\n却始终有极轻的翻页声。\n\n不从头顶来。\n\n也不从四周来。\n\n像就在每个人皮下那一层，贴着骨慢慢翻。\n\n石台尽头连着三条窄道。\n\n一条往左，贴黑壁。\n\n一条往右，钻进页膜群里。\n\n还有一条最细，直接通向那面被七枚骨钉钉住的厚活页。\n\n沈照才迈出半步，右边一张垂得最低的白膜忽然轻轻鼓了一下。\n\n不是被风吹。\n\n像里头那张半成的人脸，正朝他这边转。\n\n下一瞬，那张脸竟慢慢浮出了沈照的轮廓。\n\n眼窝。\n\n下颌。\n\n连喉结下那道浅浅的影，都像。\n\n只是更瘦。\n\n也更死。\n\n“别让它贴上你。”岳怀川声音一沉。\n\n“这里的活页会借眼、借热、借最近的骨相补自己。”\n\n他说着，裂灯朝右边那张白膜一抹。\n\n白意并不强。\n\n只在膜面划出一道极细的亮线。\n\n那张刚显出沈照轮廓的脸立刻碎开。\n\n碎成几笔被水泡胀后的旧墨。\n\n可也就在它碎开的同时，最深处那张被七枚骨钉钉住的厚活页，忽然重重起伏了一下。\n\n像有什么东西，被外头这一下惊醒。\n\n沈照心口一沉。\n\n“那张才是真的。”\n\n“至少，是最接近真的那张。”岳怀川道。\n\n“上面那些是散页、废页、填缝页。”\n\n“最深那口，才像被钉着不让走的原页。”\n\n两人沿最细那条窄道往前。\n\n越靠近黑壁，四周那些垂下的白膜便越安静。\n\n安静到连方才贴骨翻页似的轻响都没了。\n\n像这一整腹拆页，都在给最深那张让路。\n\n走到第二枚骨钉前时，沈照忽然闻到一丝很淡的味。\n\n不是膏。\n\n也不是血。\n\n是纸烧过之后留下的一点甜焦。\n\n他心里猛地一紧。\n\n那味道太像残灯每次啃掉他什么以后，胸口里剩下的余气。\n\n“这里不是只存名。”他低声道。\n\n“还存被烧出来的命。”\n\n岳怀川没否认。\n\n只抬灯往第三枚骨钉下照了一下。\n\n钉下果然压着一小片极碎的黑字。\n\n不是句。\n\n只是三个断开的记号：\n\n`原`\n\n`页`\n\n`活`\n\n沈照看着那三个字，后颈一点点发凉。\n\n总簿井上面记的是先后、承转、假照和回册。\n\n到了这里，记的已经不是“谁该归哪一册”。\n\n而是“谁的原页还活着，活到什么地步，又能拿去补谁”。\n\n最深那张厚活页又起伏了一下。\n\n这一次，动静比刚才更明显。\n\n像里头那口被钉住的呼吸，终于听见了外头有人说到“原页”两个字。\n\n窄道尽头没有完整台子。\n\n只有一圈贴着黑壁凿出来的半月石沿。\n\n人只能侧身站。\n\n站稳后，正好能看见那张厚活页中心。\n\n白得近乎发青的膜下，果然压着一张脸。\n\n不是沈照。\n\n可第一眼仍像。\n\n像到若不是方才在总簿井里已经见过第二眼，他怕是真要被这一层又骗过去。\n\n那张脸比他年长几岁。\n\n眉骨更低。\n\n眼尾更长。\n\n最显眼的是喉结下那一道极直的细印。\n\n不是横裂。\n\n像真有一枚骨钉，曾从那里正正穿过去，把整口气钉在了纸里。\n\n而那张脸左颊靠近耳后的地方，还压着半行没完全展开的残字。\n\n不是别的。\n\n正是第十九章总簿井底一闪而过的那截尾字：\n\n`照生`\n\n这一次不是半行。\n\n是完整两字。\n\n清清楚楚，压在活页左半侧。\n\n沈照呼吸一顿。\n\n不是因为终于看清。\n\n而是因为那两字一露全，活页里那双闭着的眼，竟缓缓睁开了。\n\n睁开的不是活人眼。\n\n更像两道被水泡得太久的旧墨，忽然顺着纸纹裂出缝。\n\n可那缝里落出来的第一眼，不是空。\n\n也不是疯。\n\n是认。\n\n它认出了沈照。\n\n认得不是现在这张脸。\n\n也不是后补二名这个壳。\n\n而像认出了贴在他胸里、掌里、喉间的那些旧规、残灯、白痕与被反复改列过的痕。\n\n活页里的嘴唇动了动。\n\n第一下没出声。\n\n第二下，才挤出一个极轻的破音：\n\n“不是……你……”\n\n沈照指骨骤然收紧。\n\n岳怀川也在同一瞬把裂灯抬高半寸，替他照住活页左侧。\n\n那两字下面，果然还有被扯断的一截姓。\n\n只是姓的前半边早被人活活撕走。\n\n只剩一道带弯钩的尾笔和一点沉黑的旧血。\n\n看不全。\n\n可已经足够说明一件事。\n\n照生不是术语。\n\n是人名。\n\n而且是原页上真正留下来的那个人名尾。\n\n“你是谁？”沈照低声问。\n\n活页里那张脸像听见了。\n\n可它没有先答。\n\n而是先看向他掌里那块骨片。\n\n看得极慢。\n\n慢得像每偏一下眼，都要顺着纸纹重新把自己拼回去一点。\n\n“一……”它喉间那口被钉住的气震了震。\n\n“还……吊着？”\n\n这一下，连岳怀川都微微变了脸色。\n\n对方先问的不是自己是谁。\n\n而是一号还在不在。\n\n这说明一号和这张活页之间，不是单纯“原照”和“后补”的远关系。\n\n至少当年他们都在同一层流程里活过。\n\n“还吊着。”沈照答得很快。\n\n“主索刚被我们扯松。”\n\n活页里那双裂开的墨眼忽然静了一瞬。\n\n不是松。\n\n而是更沉。\n\n像原本只剩纸和残命的东西，仍会因为这句“还吊着”而往下坠一下。\n\n“那就……还来得及。”\n\n“来得及什么？”\n\n“来得及……别让他……补完。”\n\n这句话比上面所有线索都更重。\n\n岳怀川立刻追问：\n\n“补完谁？”\n\n活页却没有立刻答。\n\n它的视线忽然又回到沈照脸上。\n\n准确说，是回到他喉间。\n\n那里当然没有钉。\n\n却有一口被总簿、回册和残灯反复试过的气。\n\n下一刻，活页右半边忽然鼓起。\n\n不是人动。\n\n而是整张页自己朝外凸了一寸。\n\n七枚骨钉同时轻轻响了下。\n\n像有什么东西正想从纸里撑出来。\n\n“退！”岳怀川厉喝。\n\n可已经晚了半息。\n\n活页左半边那道写着`照生`的残字，像被谁从里头一拽，竟直接拖着一缕白丝朝沈照胸口扑来。\n\n不是扑脸。\n\n也不是扑掌。\n\n就扑胸里那盏灯。\n\n沈照几乎本能地抬手去挡。\n\n可白丝不是撞在掌上。\n\n而是顺着骨片与白痕间那道最旧的缝，直接钻进了他腕里。\n\n他眼前轰地白了一瞬。\n\n不是疼。\n\n是空。\n\n像有人把一页不属于他的旧命，硬往他心口里塞。\n\n塞进来的同时，也要往外扯走一点什么，给它腾位。\n\n这一次被扯动的，不是笑声。\n\n而是温度。\n\n一团很小很小的暖意，从记忆最深处被生生拽了出去。\n\n沈照猛地意识到，那是很多年前某个雪夜，他缩在废照棚破席里，被人悄悄塞了一只还温着的粗陶碗。\n\n碗里是什么，他原本记得。\n\n谁塞的，他也原本记得。\n\n可就在这一瞬，那点热连同碗壁碰到掌心时的感觉，一起淡了。\n\n淡得像从来没有过。\n\n“拿去！”\n\n这三个字不是岳怀川说的。\n\n也不是活页里那个破碎的人在说。\n\n是沈照自己咬着牙，从胸里硬挤出来的。\n\n不是应名。\n\n是拿代价去顶。\n\n你要位。\n\n可以。\n\n先从他手里拿一块真东西走。\n\n别来假借。\n\n这一下像真的顶住了。\n\n那缕钻进他腕里的白丝猛地一顿。\n\n活页里那张脸也跟着一僵。\n\n下一刻，岳怀川裂灯已经劈下。\n\n这一劈不是冲脸。\n\n而是直劈第七枚最细的骨钉。\n\n“当！”\n\n骨钉断了一半。\n\n整张厚活页顿时朝左歪去。\n\n压在页里的`照生`二字被震得一抖。\n\n其中“照”还钉着。\n\n“生”字后头却被震开一道极细的缝。\n\n缝里掉出一小片更薄的页芯。\n\n只有两指宽。\n\n却是真正带字的。\n\n沈照一把抓住。\n\n入手先是冰。\n\n再是烫。\n\n像一口活着的纸，终于从大页里被生剥下来，急着往谁身上贴。\n\n页芯上只有三行小字。\n\n第一行：\n\n`……照生`\n\n第二行：\n\n`原页未灭`\n\n第三行：\n\n`一未补完`\n\n沈照瞳孔猛地一缩。\n\n不是一号未完。\n\n是一未补完。\n\n也就是说，当年撞位、吊索、分页、改列之后，一号那一套流程并没有真正走完。\n\n所以他才被一直吊在上面。\n\n所以这张活页才还活着。\n\n所以沈照这个后补二名，也一直没被真正封死成终局。\n\n活页里那张脸在这一刻忽然像松了一半。\n\n不是得救。\n\n更像它终于把最该掉出去的那一小页，掉出去了。\n\n“回……去。”它又挤出两个字。\n\n“趁……梁……松……”\n\n“先救一号？”岳怀川盯着它。\n\n活页没有再完整答。\n\n只是那双墨裂开的眼，极轻地偏向上头。\n\n偏的不是头顶。\n\n而是左侧那条一直贴着黑壁的窄道。\n\n那里原本黑得像死路。\n\n可此刻因为第七枚骨钉被劈断，黑壁下方竟裂开了一线回亮。\n\n亮得不强。\n\n却能看见一道向上斜去的返槽。\n\n不是回总簿井的原路。\n\n更像专门给守页人和补钉人走的侧返道。\n\n“总簿井乱不了多久。”岳怀川低声道。\n\n“一旦黑轴重新找正，上头那口主索还会被绷回去。”\n\n沈照捏着那片薄薄的页芯，掌心冷得发麻。\n\n再往下，或许还能顺着这口页腹继续摸到被扯掉的姓、更多真相、甚至把整张原页都拆下来。\n\n可若现在不回。\n\n一号那口还能说话的活证，多半就真要被“补完”进某个再也撬不开的旧位里。\n\n这不是纯算账能算的轻重。\n\n这是取舍。\n\n而沈照在这一瞬，第一次不是因为被逼无奈，而是自己把方向改了。\n\n“回去。”\n\n他说完这两个字，才发现嗓子比方才更哑。\n\n不是受伤。\n\n是刚刚那一下拿记忆去顶真页时，有什么东西顺着喉里烧过去了。\n\n岳怀川只看了他一眼，就知道这句不是冲动。\n\n“你确定？”\n\n“真原簿还在下面。”沈照把那片写着`一未补完`的页芯塞进怀里。\n\n“可要是能开口的人先没了，我们拿一堆页也只够自己猜。”\n\n“先把活证拽下来。”\n\n“再回来拆这本真原簿。”\n\n黑壁深处忽然传来一声更远的骨响。\n\n不是他们脚下。\n\n更像页腹更深层，还有别的钉页被总簿井上方的乱象一起惊醒。\n\n时间真的不多了。\n\n岳怀川不再多说，转身便上返槽。\n\n沈照跟着踏上去时，忍不住又回头看了一眼。\n\n那张被断掉一枚骨钉的厚活页还钉在原处。\n\n里头那张脸第一眼仍像他。\n\n可这一次，沈照已经不会再把那种像看成自己。\n\n他看见的是另一个被拆过、钉过、留过名尾的人。\n\n而那人还没彻底死透。\n\n“照生。”他在心里无声念了一遍。\n\n不是认。\n\n是记住。\n\n活页里那双裂开的眼像是听见了。\n\n极轻地合了一下。\n\n不知是应。\n\n还是别。\n\n下一瞬，返槽深处已经传来岳怀川压低的催声：\n\n“快！”\n\n“上头那口梁在回紧！”\n\n沈照不再停，翻身钻进那道向上斜去的黑亮返槽。\n\n身后页腹里的薄膜一张张重新垂回黑暗。\n\n像整部真原簿又把自己的心口合上。\n\n只在最末那一瞬，从更深处送出一道极轻极轻的纸裂声。\n\n像还有另一张更完整的页，在更下面那层，缓慢翻开了第一角。\n",
    "outlineExpectation": "沈照与岳怀川顺着第十九章末尾新显出的返页暗槽继续切进真原簿腹心，不再只对着总簿假照，而是第一次正面接触被钉在原页里的“照生”活页。章中既要让沈照为顶住原页贴合再烧掉一块更具体、更人间的记忆，也要让“原页未灭”“一未补完”变成能改变下一步路线的硬信息。章尾要让两人的目标首次明确偏转：不是继续闷头往更深处追真相，而是趁锁梁未复位先返救一号，再回来拆真原簿。 "
  },
