    "chapterContent": "# 第四章 灯下留人\n\n灯库门前，@{岳怀川}那句“是借命”还没散。\n\n这三个字很轻，落进@{沈照}耳里，却比方才满库乱火还沉。\n\n他抬眼看向石阶外侧的@{岳怀川}，一时竟分不清，对方这句话究竟是在说给他听，还是在替他把一条已经半埋进灰里的命重新翻出来，放到灯下给所有人看。\n\n山风还裹着焦味，从封火阵边一阵阵卷过。方才挤在灯库外看热闹的人，这会儿谁也不敢大声说话了。可他们看@{沈照}的目光已经全变了，不再只是看一个侥幸没死的废人，而像在看一块刚从火里捞出来、还没来得及验明白的异铁。\n\n@{庄无烬}最先稳住脸色。\n\n他往前半步，嗓音发沉：“岳巡使，灯库既已压住，外门自会把这场事故重新核账。此子虽有些用处，可毕竟牵了邪门迹象，还是先押下去……”\n\n“押去哪里？”@{岳怀川}打断他。\n\n他声音并不高，可一开口，周围连封火阵噼啪作响的细声都像是退了一层。@{庄无烬}脸上那点硬撑出来的平稳一下僵住，话也顿在喉间。\n\n@{岳怀川}这才慢慢把目光从@{沈照}身上收回，落到灯库那扇刚被重新封住的黑门上。\n\n“灯库今晚两次异动，一次接旧炉余波，一次接封火槽反冲。人刚压完火，账便急着往他头上扣，庄执事是怕外门多出一条命，还是怕少掉一个替你顶账的人？”\n\n四下安静得发紧。\n\n@{庄无烬}嘴角抽了一下，终究没敢硬顶，只低声道：“我只是不敢误了照命司的事。”\n\n“那就别误。”@{岳怀川}说，“从现在起，@{沈照}列留验。灯库和旧炉两边的卷档、口供、火纹，没查清之前，谁都不能私下处置他。”\n\n这话一落，周围许多人眼神都动了一下。\n\n留验两个字，听着不像救命，甚至还带着一股把人当物件封起来慢慢验看的冷气。可落在外门这种地方，已经足够让一个原本随时能被扔进火里的人，多出一层谁都不敢轻易撕破的壳。\n\n@{沈照}听得很清楚。\n\n这不是保他。\n\n只是有人决定，在把他剖开之前，先不许别人先动刀。\n\n可哪怕只是这样，也比任人往死里推强。\n\n那瘦少年忽然从人群后挤了出来，脸还是白的，嗓子却比刚才亮了些：“是他压住的！若不是他，我和里面那道闸一起都得烧穿！”\n\n他刚说完，旁边便有人死命扯他袖子，像怕他一句话就把自己也卷进什么不能碰的事里。可这回他竟没缩回去，只是瞪着一双通红的眼，像拼着再被拖进灯库，也要把这句话说完。\n\n@{庄无烬}的脸色愈发难看。\n\n@{祁连烛}站在一旁，半晌才笑了一声：“原来不只是命硬，还是会争命。”\n\n他嘴上像在说笑，目光却一直压在@{沈照}身上，像要把刚才那场火反过来一寸寸照进他骨头里。@{沈照}迎着那道目光看过去，只觉出一股比先前更清楚的敌意。\n\n不。\n\n已经不止是敌意了。\n\n那里面还多了一丝戒备。像原本在脚边随便踢开的废石，突然露出一截带锋的铁。\n\n这一点变化，让@{沈照}心底比听见“留验”时还更冷静。\n\n他知道，从今天起，@{祁连烛}不会再拿他当笑话看了。\n\n而@{庄无烬}也一样。\n\n外门最危险的，从来不是有人看不起你，而是他们终于发现你能换东西。\n\n@{岳怀川}并未再给众人议论的机会，只抬手指了指旁边一名随行记录弟子：“记下，灯库异动案，人证两名。@{沈照}，还有这个从库里一并出来的。”\n\n那瘦少年猛地一愣，像没想到自己这样的人，竟也会有被郑重记上一笔的时候。\n\n@{庄无烬}嘴唇动了动，终究还是没说什么。\n\n记了口供，就等于也暂时留了命。\n\n“至于灯库的账。”@{岳怀川}又道，“明日再核。今夜谁若再逼他们碰火，我就把那道火记在谁名下。”\n\n这句话比什么都管用。\n\n外门诸人顿时各自低头，不敢再接茬。连@{庄无烬}都只拱了拱手，闷声应下。\n\n事情到这里，表面像是定了。\n\n可@{沈照}心里比谁都清楚，这不过是把明刀先压了下去。等人群散掉，账、试探、搜查、套话，一样都不会少。\n\n他低头看了一眼掌心那片焦黑见肉的烂伤，又看了看袖中的旧铜牌，忽然觉得有些荒唐。\n\n半日之前，他还只是废照棚里一个等死的人。\n\n半日之后，他却被照命司列了留验，被外门执事盯着，被同辈天才防着，连说句活话都得掂量着谁在旁边听。\n\n这条命忽然贵起来了。\n\n可贵的不是他这个人。\n\n是他身上那盏灯。\n\n散人群时，@{岳怀川}经过他身侧，脚步只停了一瞬。\n\n“先回去，把伤收住。”他说。\n\n@{沈照}没抬头：“然后呢？”\n\n“然后等我找你。”\n\n这话说完，他已越过众人往山下去，仿佛方才那一句只是在灯库门前随手落下的一点灰。\n\n可@{沈照}知道，那不是。\n\n那是今夜真正还没开始的部分。\n\n从灯库回废照棚这一路，比上午去测灯台时还安静。\n\n没人再明着朝他吐痰，也没人敢当面喊他废灯。路边那些看热闹的外门弟子，一见他走近，反倒会下意识让开半步，再抬眼飞快地看一眼他的手、他的胸口、他被血浸透的衣襟，然后又立刻避开。\n\n仿佛多看一会儿，便会把什么不该沾的东西也看进自己命灯里。\n\n那瘦少年一路跟在他身后，抱着从灯库边顺来的半袋封火砂和一只旧药瓷瓶，走得踉踉跄跄，却硬是没掉队。\n\n等进了废照棚，他才小声道：“这是灯库边药架上剩的，没人顾得上收，我就拿了。”\n\n棚里比早晨更冷。\n\n早先抬走的尸首已经没了，只留下草席上一块暗色人形印子。原本挤在棚里那几个人，这会儿不是装睡，就是缩在角落里，一听见脚步，连咳嗽都压得极低。\n\n没人上来搭话。\n\n可每一道偷看过来的视线，都比从前更重。\n\n@{沈照}走到自己那块破草席前，脚步忽然顿住。\n\n席子被人翻过。\n\n不止翻过，是几乎被拆了一遍。旧棉絮被挑出来，草垫被划开，连压在墙角下那只盛着半碗冷灰的破陶罐都被踢倒了。若不是他把旧铜牌一直带在身上，这会儿恐怕连最后一点能握住的东西都不会剩。\n\n那瘦少年也愣了：“我走前还不是这样。”\n\n@{沈照}蹲下去，伸手在草席底下摸了一遍。\n\n什么都没多，什么也没少。\n\n这反倒说明，来的人不是随手抢东西，而是专门在找某样他们也说不清的东西。\n\n“谁来过？”他问。\n\n“两个外门杂役。”瘦少年低声说，“一个是庄执事那边常跑腿的，另一个……像是跟@{祁连烛}同院的人。他们翻了一阵，没翻到什么，就把棚里人都骂了一遍。”\n\n@{沈照}“嗯”了一声，竟并不意外。\n\n若是今日之前，这种翻铺拆席的事落到他头上，心里多少还会翻起一股恼火和寒意。可此刻，他盯着那堆乱成一团的破布和草屑，脑子里先冒出来的，竟只是两个极冷的判断。\n\n第一，他们已经开始怀疑铜牌或别的引子在他身边。\n\n第二，留验只拦得住明着下手，拦不住暗里摸底。\n\n至于愤怒，那东西也有。\n\n只是淡得像隔了一层水，浮在胸口上，始终压不进骨头里。\n\n@{沈照}低头看了眼自己满是焦血的手，心里忽然又是一沉。\n\n这不是冷静。\n\n这是那盏灯借完命之后，顺手从他身上刮走的另一块东西。\n\n那瘦少年还站在旁边，小心翼翼地看着他：“你手上的伤得先洗。再拖下去，要烂到骨头里。”\n\n@{沈照}这才把那只旧药瓷瓶接过来。\n\n瓶口一开，一股冲鼻的苦辛气便冒了出来，像把陈年的药渣、灯灰和烧糊的树皮一起碾碎了塞进去。瘦少年又从旁边破桶里舀了半碗冷水，倒在他手背上。水一浇到伤口，疼得像有细针往骨缝里钻。\n\n可更让@{沈照}心里发凉的，是那疼之后的另一件事。\n\n他把瓶里黑乎乎的药糊抹上去时，舌根居然几乎没尝出多少苦味。\n\n明明那味道闻着都发涩，搁在平日，光是一点药气便足够把人熏得反胃。可这会儿，他只觉得淡，淡得像隔着纸。\n\n“是不是坏了？”瘦少年见他没什么反应，还以为药过了劲儿。\n\n@{沈照}摇了摇头：“没坏。”\n\n药没坏。\n\n坏的是他自己。\n\n他坐在草席边，一层层把药糊压进掌心裂开的肉里，动作很稳。瘦少年原本还想帮忙，见他这样，也只好蹲在旁边守着。\n\n守了一会儿，那少年忽然低声说：“今天在库里，多谢你。”\n\n@{沈照}没抬头。\n\n“若不是你拽我那一下，我连门都进不去，就先被庄执事一把推出去了。”少年声音有些发颤，“后来也是你叫我倒砂……不然我真以为自己死定了。”\n\n这本该是很重的一句话。\n\n可@{沈照}听在耳里，最先起的念头却不是“救了一条命”，而是“这个人活着，对我有用”。他进过灯库，也能作证谁把谁推进去，谁在里面压过闸。\n\n这个念头一起，连他自己都怔了怔。\n\n他原以为自己至少会有一点后怕，或者哪怕一点“好歹多保下一人”的松动。可没有。剩下的只是计算，冷硬得像一截被火烤过的铁。\n\n这比想不起旧铜牌从哪来更让他心底发空。\n\n因为记忆缺一块，还能知道自己缺了。\n\n可若连心里的轻重都开始被削薄，他将来还拿什么分辨，哪些事本来是他会在意的？\n\n那瘦少年见他半晌不语，像是以为自己说错了话，忙补上一句：“你放心，我不会乱说的。今天库里的事，若有人问，我只说是封火砂和铜闸压回去了。”\n\n@{沈照}这才抬头看他。\n\n“你叫什么？”\n\n少年愣了一下，像没想到他会这时问这个，忙道：“周小棘。”\n\n这个名字很轻，很瘦，像一根风一吹就会折的刺草。\n\n@{沈照}在心里默了一遍，确认自己还能记住，才道：“今夜若有人再来翻铺，或者问你铜牌、问我在库里做了什么，你只说没看清。”\n\n周小棘连忙点头。\n\n“再有人要把你塞去碰火，你就报今天的人证口供。”@{沈照}顿了顿，又补一句，“先保命。”\n\n这话说完，他自己先沉默了半息。\n\n因为他发现，哪怕此刻情绪淡薄，嘴里说出来的，还是这三个字。\n\n先保命。\n\n像有些东西纵然被削得发薄，底子里却还没断干净。\n\n周小棘听了这话，眼圈竟一下红了，却没再多说，只把剩下那半袋封火砂往墙角一搁，像在替他们这两条暂时被留下来的命，先存一层极薄的壳。\n\n天色一点点暗下去。\n\n废照棚里很快又冷了。墙缝漏风，顶棚滴灰，远处偶尔传来几声外门弟子收灯的铜响，细碎得像什么东西在夜里一点点磨骨头。\n\n@{沈照}靠着土墙闭目养息，胸口那点冷白微光始终沉在最深处，不亮，也不散，像一粒被压进肉里的冰屑。\n\n他中间试过几次，把旧铜牌拿出来看。\n\n铜色、旧纹、边角磨损的位置，都熟得像他自己的手。\n\n可再往前，就没有了。\n\n谁给他的，在哪里给的，给时说过什么，为什么这么重要，他竟一丝也抓不住。越往那处空白里探，后脑便越发胀痛，像有人在里面拿钝钉子一点点顶。\n\n最后他只能停下。\n\n不是不想追。\n\n是他忽然生出一种直觉，若硬要往那片空白里掏，先翻出来的未必是记忆，也可能是那盏灯还没收干净的另一层账。\n\n夜深些时，棚外忽然传来很轻的一声鞋底擦地。\n\n周小棘本已裹着旧衣缩在角落，听见动静一下惊醒，整个人绷得像只快断掉的弓。@{沈照}却先抬起了眼。\n\n来的人没有遮掩脚步。\n\n可正因如此，反而比悄悄摸进来的更危险。\n\n破帘被掀开时，冷风和一股淡得近乎没有的药烟一起吹了进来。门外站着的，正是@{岳怀川}。\n\n棚里其他几个人一见是他，连呼吸都放轻了。周小棘更是下意识想站起来，腿却软得没撑住。\n\n@{岳怀川}目光扫了一圈，最后落到@{沈照}身上：“出来。”\n\n外头的夜比棚里更冷。\n\n山月藏在薄云后，廊下只挂着一盏半灭的旧灯，灯芯烧得发蓝，把石地照出一层病灰色。@{岳怀川}并未走远，只在棚外那道破墙阴影里停下，像不想让太多人知道他今夜来过。\n\n“你的伤还撑得住？”他问。\n\n“死不了。”@{沈照}说。\n\n@{岳怀川}点了点头，像这正是他想听的。\n\n“白日灯库那一下，是你第一次主动借？”\n\n@{沈照}沉默了片刻，才道：“如果昨夜旧炉那次不算我自己动手，那就是第一次。”\n\n“那便是了。”@{岳怀川}看着他，“第一次主动借命，往往最能看出灯拿走了什么。你今日少了什么？”\n\n这问题问得太直，直得让人本能想藏。\n\n可@{沈照}迎上他的眼，却忽然明白一件事。\n\n眼前这个人既然已经说出“借命”二字，就不会拿那些外门弟子能糊弄过去的话来问他。他今夜来，不是为了听假话，而是为了确认这笔账到底收到了哪一步。\n\n“记忆。”@{沈照}道，“还有……情绪。”\n\n@{岳怀川}眸光终于动了一下：“说清。”\n\n@{沈照}把旧铜牌从袖里摸出来，摊在掌心：“这东西，我明明带了很多年。可我现在想不起它是谁给我的。”\n\n他顿了顿，又补上一句：“还有白日从灯库回来后，我发现自己有些该起的反应，起得很淡。不是没有，像是隔远了。”\n\n夜风从两人之间穿过去，把那枚旧铜牌吹得微微发凉。\n\n@{岳怀川}看着它，半晌才道：“比我想的还快。”\n\n“你知道这是什么灯？”@{沈照}问。\n\n@{岳怀川}却没有正面答，只道：“我只知道，寻常借命，烧的是寿数和筋骨。能直接碰记忆、削情绪的，不是低门邪术，也不是青烬宗外门这点火脉养得出来的东西。”\n\n这话一落，四周像更静了一层。\n\n“那你为何不抓我？”@{沈照}问。\n\n@{岳怀川}终于抬眼看向他：“抓你回照命司，需要明证。现在我手里只有两次异波，一块来历不明的旧铜牌，和一个自己都还没学会怎么借命的人。真把你明着押走，青烬宗先会来抢人，庄无烬也会趁乱把今天两场火全推到你头上。”\n\n他顿了顿，语气仍旧平稳：“更何况，我还没弄明白，回应你的到底是灯，还是灯后面的东西。”\n\n@{沈照}听见这句话，掌心下意识一紧。\n\n灯后面的东西。\n\n这说法比“残灯”本身更让人脊背发凉。\n\n可他脸上没露出来，只问：“所以你今夜来，是想继续验我？”\n\n“是想给你一条今夜不死的路。”@{岳怀川}道。\n\n这话若换个人说，听着大概更像施恩。可从他口中说出来，却只像把一桩交易摆在桌上，冷静得近乎没有半分多余意味。\n\n“明日丑时，跟我去旧炼灯炉场下层。”\n\n@{沈照}眼神一凝。\n\n旧炉场。\n\n那地方昨夜才差点烧死他。\n\n@{岳怀川}像早料到他会有这反应，继续道：“灯库里翻出来的那股旧灯煞，不是单独一处冒出来的。我让人重新看了封山火纹，发现它和旧炉下层灰井里压着的一道旧痕，走的是同一路数。昨夜旧炉先动，今夜灯库再动，不会只是巧合。”\n\n“你想让我去照那道旧痕？”\n\n“不是照。”@{岳怀川}说，“是让它照你。”\n\n这话比夜风还冷。\n\n@{沈照}盯着他，没立刻出声。\n\n他已经明白对方的意思了。那口灰井下若真压着和旧铜牌、和残灯同路的东西，普通人下去只会白白送命；可他已经被那盏灯应过两次，反倒有可能从那股同源灯息里看出什么。\n\n说得再直白些。\n\n@{岳怀川}不是要带他去查案，是要拿他去探火。\n\n只不过这回，拿他探火的人，不是@{庄无烬}，而是照命司。\n\n“若我不去呢？”@{沈照}问。\n\n@{岳怀川}答得很平：“那我就按邪借之案把你押走。从今夜到明日鸡鸣前，你总得选一条。”\n\n真是半点虚话也没有。\n\n@{沈照}忽然想笑，嘴角却只动了一下便止住了。\n\n选？\n\n这世上大多数时候，给底层人的都不是选，而是哪一种死法稍微慢一点。\n\n可他还是认真想了。\n\n被押走，今夜就成囚灯；跟着去旧炉下层，至少还能拿命换点东西。\n\n“我去。”他说。\n\n@{岳怀川}并不意外，只点了点头：“你可以再提一件事。”\n\n@{沈照}看了他一眼。\n\n“只限一件，且要与此行有关。”@{岳怀川}补了一句。\n\n这才像交易。\n\n@{沈照}没怎么犹豫：“今日和我一起从灯库里出来的那个，叫周小棘。把他从近三日的碰火名单里划出去。”\n\n这回轮到@{岳怀川}微微一顿。\n\n“你替自己讨，不是更划算？”\n\n@{沈照}低头看了看掌心还没干透的药痕，声音很淡：“替我自己讨，你未必给。替他讨，至少你会觉得这件事还值一点。”\n\n@{岳怀川}看着他，像第一次真正把这句话放进心里掂了掂。\n\n片刻后，他道：“可以。三日之内，他不会再被派去碰火。”\n\n这已经够了。\n\n三日，足够让一个原本今晚便可能被再扔进火里的人，多喘几口气。\n\n@{沈照}没有再加码。因为他知道，讨价还价这种事，最怕一步跨过别人愿意给的线。\n\n@{岳怀川}见他不再说话，便从袖中取出一只极小的灰纸包，递了过去。\n\n“打开。”\n\n@{沈照}伸手接过。纸包一拆，里面是一撮极细的旧灰，颜色介于黑与白之间，像灯芯烧尽后剩下的最冷那一截骨粉。\n\n灰一见风，袖中的旧铜牌忽然轻轻一颤。\n\n下一瞬，那撮灰里竟浮出一缕极细的冷白亮线，像被什么无形的针从里面挑了出来，直直指向西山旧炉场的方向。\n\n@{沈照}瞳孔微缩。\n\n那亮线只亮了一瞬便散，可他已经看清了。\n\n和自己胸口那点冷白微光，几乎一模一样。\n\n“这是今夜从灯库封火槽底刮下来的。”@{岳怀川}说，“它认得你身上的东西。”\n\n@{沈照}把纸包重新攥紧，指节一点点发白。\n\n“所以明日丑时，你不是去陪我查一口灰井。”@{岳怀川}看着他，“你是去看看，昨夜和今夜，到底是谁先顺着这条线来找你。”\n\n夜色更深了。\n\n废照棚后头那片枯竹被风吹得细响，像有人在黑里一根一根磨刀。@{沈照}站在那盏半灭的旧灯下，忽然清楚地意识到，第三章里压下灯库那场火，根本不是暂时活下来那么简单。\n\n那只是把真正的门，烧开了一道缝。\n\n而门后等着他的，不会只是一盏灯。\n\n@{岳怀川}转身前，最后留下一句：“丑时之前，把你还能记得的事都想一遍。明日你若在灰井前再丢一块，就未必只是忘了。”\n\n他说完便走了，脚步声很快没进夜色里。\n\n@{沈照}站在原地没有立刻回棚，只低头看着掌心那撮已经沉下去的旧灰。\n\n灰是冷的。\n\n可他胸口深处那点沉寂许久的微光，却像隔着血肉又轻轻动了一下。\n\n不像是在应他。\n\n更像是在应西山那边什么东西。\n\n下一瞬，旧炼灯炉场的方向，果然隔着夜色传来一声极轻的闷响。\n",
    "outlineExpectation": "借灯风波后，庄无烬想把灯库之事做成沈照的脏账，照命司却选择先把人留住。沈照必须趁众人都想利用他的间隙，为自己换来一个暂时安全的位置，同时第一次正面感到情绪被残灯削薄。"
