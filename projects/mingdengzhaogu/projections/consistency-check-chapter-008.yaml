    "chapterContent": "# 第八章 灯下旧印\n\n从西边旧账房脱身不过半个时辰，半页旧纸贴在袖里，一路都像没凉透。\n\n不是烫。\n\n是阴。\n\n像有人把一片薄铁先埋进雪里，再塞回他皮肉边上。\n\n梁上那女人临走前丢下的“别把手伸给他们”，也还压在他耳边，和袖里那页带旧印的灰纸一起发冷。\n\n@{沈照}提着那本外门火耗册往东走，越靠近临时账房，脚步越稳。\n\n稳得连他自己都知道，这是装出来的。\n\n若换成昨夜之前，他这会儿心里先起的，多半该是乱。\n\n乱自己为何会被照命司记过。\n\n乱那张半页上被销去的名字。\n\n乱灰井边那几盏白灯，到底是不是梦里那几盏。\n\n可现在先压住这一切的，不是怕。\n\n是算。\n\n这半页能不能给@{岳怀川}看。\n\n该给他看到哪一句。\n\n又该留哪一句，等着拿去问别人。\n\n这念头清楚得近乎冷。\n\n冷得让他走到账房门前时，才后知后觉地从背后翻起一线寒意。\n\n东边这座临时账房原本是外门记耗的旧偏屋。\n\n昨夜灰井一封，今晨便被照命司临时征来做问簿之处。\n\n门外挂着新灯。\n\n白罩。\n\n不大。\n\n却比废照棚门口那盏更冷。\n\n灯下还立着两名照命司弟子。\n\n一个执簿。\n\n一个按刀。\n\n都不像多话的人。\n\n他们看见@{沈照}过来，目光先落到他手里的烂账上，又落到他脸上。\n\n其中一人皱了皱眉：“岳巡使已等你一刻钟。”\n\n@{沈照}抬了抬那本火耗册。\n\n“西边旧屋里翻出来的。”他说，“你们若只要人，不要账，我这就扔了。”\n\n那弟子眼神一变。\n\n不是因为怕。\n\n是因为他听懂了。\n\n@{岳怀川}问的是灰井和旧炉。\n\n而旧账房里翻出来的东西，无论真假，都轮不到他在门口一句话打回去。\n\n他侧了侧身：“进去。”\n\n@{沈照}跨过门槛时，先闻到的是墨味。\n\n新墨。\n\n里头又掺着一点旧纸返潮后的霉。\n\n两股味缠在一起，不冲。\n\n却让人本能地不想久待。\n\n屋里不大。\n\n靠墙摆着三张旧案几。\n\n最里头那张已被收拾得很干净。\n\n一盏白罩灯。\n\n一册留验簿。\n\n两叠新裁灰纸。\n\n还有一只压着封蜡的小铁匣。\n\n@{岳怀川}就坐在灯后。\n\n他已换回照命司那身黑纹袍。\n\n领口一丝不乱。\n\n像今晨废照棚和西边旧屋都没在他身上沾过一点灰。\n\n可他抬眼看过来时，@{沈照}还是第一眼就看出来了。\n\n这人等得不短。\n\n不是因为急。\n\n是因为他本来就没走。\n\n“你迟了。”@{岳怀川}道，声音不高，也没有怒意，比怒更麻烦。\n\n@{沈照}把手里的火耗册放到案边。\n\n“旧账房不好翻。”他说。\n\n@{岳怀川}目光掠过那本烂账，又回到他脸上：“我让人带你来账房，不是让你去西边。”\n\n“可你要查的是旧炉。”@{沈照}道，“旧炉的账不在西边，难道在我脸上？”\n\n屋里静了一瞬。\n\n门边那名执簿弟子几乎下意识抬了下头。\n\n像没料到废照棚里出来的人，进了照命司的灯下，还敢这么顶一句。\n\n@{岳怀川}却没有立刻接。\n\n他只看着@{沈照}。\n\n看了两息。\n\n“把门带上。”他对外头道。\n\n那弟子应了一声，退了出去。\n\n门一合，屋里便只剩他们两个。\n\n白罩灯压在案上。\n\n灯意稳得没有一丝晃。\n\n@{岳怀川}这才又开口：“西边旧账房里，除了这本火耗册，你还拿了什么？”\n\n问得很直。\n\n比昨夜灰井边那句“把手伸出来”还直。\n\n@{沈照}心里那道线立刻绷紧了。\n\n他没答。\n\n只反问：“你是不是一开始就知道，西边那间旧屋里有东西？”\n\n@{岳怀川}没有否认，也没有承认。\n\n“先答我的。”他说。\n\n“我若答了，你会答我的？”\n\n“看你答到哪一步。”\n\n这人说话，从来都留一寸。\n\n像刀不全出鞘。\n\n偏又够让人知道刃在哪。\n\n@{沈照}垂眼看向案上那本火耗册。\n\n封皮旧烂。\n\n边角发黑。\n\n正是最无用、也最适合做遮眼的东西。\n\n“拿了账。”他说。\n\n@{岳怀川}盯着他：“还有呢？”\n\n“看了几页烂卷。”@{沈照}道。\n\n“什么卷？”@{岳怀川}问。\n\n@{沈照}抬眼，看着灯后的那张脸：“我说了，你就会告诉我，十二年前照命司为什么把我列进留验？”\n\n这句话一落下来。\n\n连灯下那点白光都像静了一下。\n\n@{岳怀川}原本搭在簿册边上的手指，终于动了。\n\n只轻轻敲了一下桌面。\n\n极轻。\n\n却足够说明，这一刀捅到了他没准备好立刻给出的地方。\n\n“你看见了什么？”他没有先答，只是问。\n\n“旧印。”@{沈照}说。\n\n“哪种旧印？”\n\n“照命司的旧官印。”\n\n@{岳怀川}眼底那点向来压得很平的光，终于微微一敛。\n\n不是意外。\n\n是确认。\n\n确认这件事，已经不再停在“有人乱留灰线”的地步。\n\n而是实打实地摸到了照命司自己身上。\n\n@{沈照}把这点变化看在眼里，胸口那片旧纸便更冷了。\n\n原来真有。\n\n不是他被灰井和白痕逼出来的错觉。\n\n“哪一卷？”@{岳怀川}问。\n\n“你先说。”@{沈照}道。\n\n这一次，他没退。\n\n不是因为胆子真比昨日大了多少。\n\n是因为袖里那半页上写得太白。\n\n白到他若在此时还把自己当个任人盘问的废照棚弟子，便太蠢了。\n\n@{岳怀川}看着他，忽然道：“把右手拿出来。”\n\n@{沈照}心里一紧。\n\n却不是惊。\n\n是防。\n\n“你今晨不是叫我别让任何人碰这只手？”他道。\n\n“所以我现在想知道，有没有人已经碰过了。”\n\n这话也直。\n\n直得像另一种试探。\n\n@{沈照}没把手拿出来。\n\n“若有人碰过，又如何？”\n\n“那你现在站在这里，便不该只让我查旧账。”\n\n灯影压在@{岳怀川}眉骨下。\n\n把他本就偏冷的神色压得更深。\n\n“白痕是什么，你自己已经有猜了。”他说，“我若看不见那道痕，便分不清你在西边到底是挖出了一段旧卷，还是被什么东西先一步认了。”\n\n这句话让@{沈照}眼皮微微一跳。\n\n不是因为他听不懂。\n\n恰恰是因为听懂了。\n\n认了。\n\n昨夜灰井认灯。\n\n今晨灰线认手。\n\n西边旧卷上的白痕，也像在认他。\n\n可认他的人，未必都想让他活。\n\n“想看，可以。”@{沈照}慢慢道，“先把照命司当年的留验旧规说清。”\n\n@{岳怀川}沉默了一息。\n\n这一次，他居然没有再逼手。\n\n而是把案边那册留验簿推开半寸，露出底下压着的一张旧样纸。\n\n纸很旧。\n\n上头只印了几道极浅的墨格。\n\n每一道格口边，都缠着已经褪色的细火纹。\n\n“这是旧式留验单样。”他说。\n\n“十二年前，照命司在各宗门处理异常灯案时，会把几类人单独列留验。”\n\n“哪几类？”\n\n“看过灯的，碰过灯的，活下来的。”\n\n屋里静了一瞬。\n\n活下来的。\n\n三字最轻。\n\n却也最沉。\n\n@{沈照}盯着那张旧样纸，半晌才道：“灰井里活下来，也算？”\n\n@{岳怀川}看着他：“若那口井本就不该有人活，自然算。”\n\n这话让袖里的半页像又锋了一分。\n\n@{沈照}忽然想起夹页上那句“存活童役一名”。\n\n原来当年真正稀罕的，不是他看见了什么。\n\n而是他没死。\n\n“列留验之后呢？”他问。\n\n“复验。”@{岳怀川}道，“验他是不是已经被灯认了。”\n\n@{岳怀川}说这句话时，声音还是平的。\n\n像只是在背旧案条目。\n\n可@{沈照}还是从里头听出了一点被压得很深的不快。\n\n不是冲他。\n\n是冲那套旧规本身。\n\n“认了，会怎样？”\n\n@{岳怀川}没有立刻答。\n\n他只把那张旧样纸翻了个面，露出背后一行更小的批注。\n\n“存册、隔离、转送。”\n\n三步。\n\n每一步都写得冷。\n\n冷得像从来没拿活人当活人。\n\n@{沈照}盯着那三行字，忽然笑了一下。\n\n笑意浅。\n\n也冷。\n\n“说得倒像收灯渣。”\n\n@{岳怀川}没有接这句。\n\n他只是道：“旧规在十多年前就废了。”\n\n“废了，我袖里为什么还会有带照命旧印的半页？”\n\n这一问落下去。\n\n屋外忽然传来一阵杂乱的脚步声。\n\n不止两个人。\n\n也不止照命司。\n\n有人在门外低声争了几句。\n\n紧接着，一道熟得让人厌的声音隔着门板传进来。\n\n“岳巡使，西边旧屋被翻过了。”\n\n是@{祁连烛}。\n\n他来得倒快。\n\n@{沈照}眸子微微一缩。\n\n这人鼻子确实灵。\n\n他没在西边堵到人，转头就顺着账房来堵后手。\n\n门外又响起@{庄无烬}那把发紧的嗓音：“旧账房是外门卷地，照命司查案，我们配合。但有人私翻旧卷，外门总得知道翻了什么。”\n\n这两人一道站到门口，倒比单独哪个都更难看。\n\n一个想咬住沈照。\n\n一个怕账真翻出烧到自己卷上的东西。\n\n@{岳怀川}没回头，只淡淡道：“我叫你们进来了吗？”\n\n门外安静了一息。\n\n还是@{祁连烛}先接：“岳巡使若只是问口供，自然不用。可西边那屋里，有一本柜底火耗册少了。”\n\n他说到这里，声音一顿。\n\n像是故意让屋里人自己看向那本册子。\n\n@{庄无烬}立刻跟上：“旧耗册虽烂，也是外门账。沈照这种人，平日连自己命数都记不清，怎么偏偏知道去翻那里？”\n\n这话很险。\n\n却也很准。\n\n若没有人递灰线，照理说，@{沈照}确实不该知道第三格。\n\n@{岳怀川}终于抬眼，目光越过案角，落到那本烂账上。\n\n“你们倒记得清。”他说。\n\n@{祁连烛}在门外笑了一声。\n\n“不敢。只是沈照今晨一会儿在废照棚，一会儿在西边旧屋，一会儿又来照命司账房。若他真只是个列留验的废人，未免太忙了。”\n\n废人两个字，说得不重。\n\n却像故意往人骨头上刮。\n\n@{沈照}心里竟没先起火。\n\n先起的是更清楚的一层算。\n\n@{祁连烛}越急着把他钉死在“废人不该知道”的位置上，就越说明西边那卷真会要命。\n\n不一定只要他的命。\n\n还可能要别人的。\n\n“让他们进来。”@{沈照}忽然道。\n\n@{岳怀川}看了他一眼。\n\n那一眼很短。\n\n像在问，他想做什么。\n\n@{沈照}没解释，只把那本烂账往前推了半寸。\n\n“不是都想知道我翻了什么？”他说，“那就当着灯说。”\n\n门外静了一息。\n\n连@{祁连烛}都像没料到他会主动放人进来。\n\n@{岳怀川}却忽然把唇角压得更平。\n\n像是终于看清了他这一手要往哪边落。\n\n“进。”他说。\n\n门一开，先迈进来的是@{祁连烛}。\n\n他衣摆上还沾着西边废屋的旧灰，眼神却比灰更利。\n\n后头跟着@{庄无烬}。\n\n再后头，是两名外门役弟和一名照命司执簿弟子。\n\n一屋子人一挤，原本就不大的账房立刻显得更窄。\n\n白罩灯的光照到每张脸上，都像先褪了一层血色。\n\n@{祁连烛}一眼便看见那本火耗册，冷笑道：“沈师弟这趟腿脚倒快。”\n\n@{沈照}没理他。\n\n他只是看着@{岳怀川}：“你不是要过昨夜灰井和旧炉的账？”\n\n@{岳怀川}顺着他的话道：“是。”\n\n“那就让庄执事自己说说，这本冬月火耗册为什么会被压到西边旧账房柜底，连封火砂的耗损数都少了两页。”\n\n这句话一出，屋里几个人的神色都变了一下。\n\n@{庄无烬}脸色最先沉下来。\n\n“胡说什么？”\n\n“我是不是胡说，”@{沈照}把册子翻开，推过去，“庄执事自己认字。”\n\n他翻开的不是前头。\n\n是册尾。\n\n那几页本就烂。\n\n边缘又被潮气泡得卷起。\n\n可正因为烂，少掉的地方就更扎眼。\n\n两张账页被人整整齐齐撕走。\n\n没留半点毛边。\n\n不像烂掉。\n\n像是特意取走。\n\n@{祁连烛}眼神微微一凝。\n\n显然他也没想到，沈照手里捏着的不是空册，而是能当场翻出来的缺口。\n\n@{庄无烬}却反应更快。\n\n“旧账潮烂，有残缺再正常不过。”他冷声道，“你拿这个，也想栽我？”\n\n“潮烂会把纸烂碎，不会烂得这样整齐。”@{沈照}道。\n\n“你何时懂账了？”\n\n“我不懂账。”@{沈照}说，“我只懂一件事。若有人昨夜怕旧炉和灰井真翻出什么来，今晨最该先补的，不是废照棚，是旧账。”\n\n这话比直接指人更狠。\n\n因为它不是说庄无烬做了什么。\n\n是说，有人早在昨夜之前，就知道该删哪两页。\n\n屋里一下更静。\n\n安静得只剩灯罩底下那点极轻的热响。\n\n@{祁连烛}忽然开口：“也可能，是你先进去撕了，又倒回来装样。”\n\n他这话一出口，@{庄无烬}眼底那点沉，反倒缓了半分。\n\n像终于有人把刀接过去了。\n\n@{沈照}早料到他会这么顶。\n\n“可以。”他说，“那就按祁师兄的说法走。”\n\n@{祁连烛}眯了眯眼。\n\n“西边旧屋的灰还新，柜底缺页也新。”@{沈照}道，“既然你说是我进去撕的，那我请岳巡使现在就查我袖口、靴底和手上灰末，看是不是和柜底纸屑一模一样。”\n\n这话一落，@{岳怀川}目光便真正沉了下来。\n\n查手。\n\n又绕回手上。\n\n而且是在众目睽睽之下。\n\n@{祁连烛}显然也意识到了这一点，眼神骤然一闪。\n\n他原本只是想把人钉死。\n\n没料到沈照会顺着这条路，把自己也往“不能当众查手”的位置逼。\n\n因为一旦真查。\n\n照命司便得先碰到那只手。\n\n而今晨@{岳怀川}亲口说过，不要让任何人碰。\n\n屋里所有人都等着。\n\n等灯下这位巡使到底站哪边。\n\n@{岳怀川}没有立刻答。\n\n他只把那本火耗册重新拉回灯下，翻了两页。\n\n然后抬眼，看向@{庄无烬}。\n\n“冬月耗册谁在管？”\n\n@{庄无烬}喉结动了一下：“旧账归账房轮执。”\n\n“轮到谁？”\n\n“……外门账吏早换过几轮，旧人多半都不在了。”\n\n这回答滑得很熟。\n\n也正因为太熟，反而像准备过。\n\n@{岳怀川}没说信，也没说不信。\n\n他只把册子啪地一合。\n\n“那便从还在的开始问。”他说。\n\n这话是对庄无烬说的。\n\n也是对照命司执簿弟子说的。\n\n那弟子立刻低头记下。\n\n@{祁连烛}脸色终于真正难看起来。\n\n因为这一记，就意味着事情没能停在“沈照擅闯旧屋”。\n\n而是被拽去了“旧账有人删页”。\n\n这已经不是试个底层弟子的反应那么简单了。\n\n“岳巡使，”@{祁连烛}压着声音道，“你要查旧账，我没意见。但西屋被翻，不代表他就是清白的。”\n\n@{岳怀川}看了他一眼：“谁说他清白了？”这句一出。\n\n连@{沈照}都在心里微微一顿。\n\n不是意外。\n\n是更清楚。\n\n这人护他，不是假。\n\n可护的从来不是他这个人。\n\n护的是这条线，和这条线能带出来的真相。\n\n“沈照今夜不回废照棚。”@{岳怀川}继续道，“也不交外门看押。从现在起，他在我灯下补录旧案口供。西边旧账房封起来，谁敢再先伸手，我先记谁的名。”\n\n最后一句，比上午在废照棚门口那张封条更硬。\n\n@{庄无烬}脸色一下黑透。\n\n可他终究没敢硬顶。\n\n只拱手道：“照命司既要接，那外门便等结果。”\n\n这话表面退了。\n\n其实还是留了一手。\n\n等结果。\n\n说明他不会就这么算。\n\n@{祁连烛}却没退得这么快。\n\n他看着@{沈照}，眸子里那点锋意已经不遮了。\n\n“沈师弟。”他忽然道，“你今日翻的是耗册，还是别的东西，你我都清楚。你能把这口风挺到什么时候，我倒想看看。”\n\n这句话几乎已经不是试探。\n\n是明晃晃地说，他知道西边那屋里少的，不会只是两页烂账。\n\n@{沈照}迎着他的目光，忽然觉得胸口很平。\n\n平得像一潭冻住的水。\n\n“那祁师兄就慢慢看。”他说。\n\n“你若看得比我久，算你赢。”\n\n屋里有那么一瞬，连呼吸都像停了。\n\n因为这话不是怯。\n\n是把“你想让我死”和“我未必先死”都摆到了桌上。\n\n@{祁连烛}唇角一抽，像是想笑。\n\n可最后还是没笑出来。\n\n@{岳怀川}抬手：“够了。出去。”\n\n这次没人再拖。\n\n@{庄无烬}先退。\n\n外门役弟跟着退。\n\n@{祁连烛}走到门口时，脚步停了一下。\n\n他没回头。\n\n只丢下一句：“西屋里翻出来的灰，不止一人的脚印。”\n\n说完，他便走了。\n\n门合上。\n\n屋里重新静下来。\n\n可那句话却像一根细钩，留在了灯下。\n\n不止一人的脚印。\n\n也就是说，@{祁连烛}虽没见到梁上的女人，却已经确认，沈照不是一个人去的西边。\n\n这就麻烦了。\n\n比他单纯盯上沈照更麻烦。\n\n“你听见了。”@{岳怀川}道。\n\n“听见了。”\n\n“所以你不是一个人去的。”\n\n@{沈照}抬眼：“你若想问那个人是谁，不如先答我另一句。”\n\n@{岳怀川}没接。\n\n可也没阻他。\n\n“旧规废了，旧印却还在。”@{沈照}道，“你们照命司里，是不是有人还在按那套旧规收人？”\n\n这句话终于把两人之间那层一直没撕透的皮，彻底划开了。\n\n@{岳怀川}眼底那点冷，第一次真正沉成了暗。\n\n不是被冒犯。\n\n是被逼到了不能再只拿半句敷衍的位置。\n\n他过了片刻，才道：“我不知道现在还有没有人这么做。”\n\n这是实话。\n\n至少听上去像。\n\n因为它不是全否。\n\n“但我知道，十二年前那批旧留验，不只在青烬宗留过档。”他继续道，“你袖里的半页若真出自灰井照骨余录，那么它不是宗门私账，是司里旧案外流的一部分。”\n\n外流。\n\n这个词让@{沈照}心口那片纸又沉了沉。\n\n外流，说明原件本该不在宗门。\n\n却被人故意埋回了西边旧账房。\n\n是有人想藏。\n\n还是有人想等着今日这样的某个人把它翻出来。\n\n“你为什么会被列留验，我现在不能给你准话。”@{岳怀川}说，“可有一件事，我能先告诉你。”\n\n他伸手，打开案上那只一直没动的小铁匣。\n\n匣里只有一卷小小的灰纸令。\n\n封蜡还新。\n\n上头压着照命司现印。\n\n“一个时辰前，司里来了调令。”他把那卷令推到灯下，“不是调我，是调你。”\n\n@{沈照}眸子一缩。\n\n“调我？”\n\n“旧案重开，留验转押。”@{岳怀川}道，“字是新写的，条目却是旧式。”\n\n@{沈照}盯着那卷令，没有立刻去碰。\n\n光看封蜡边角那道压痕，他就知道这东西不是假的。\n\n而且送得很急。\n\n急到像有人一得知西边那卷会动，便立刻要先把人收走。\n\n“谁下的令？”他问。\n\n@{岳怀川}没有立刻答。\n\n只是把令翻了个面，露出背后的押署。\n\n那上头不是名字。\n\n是一串旧编号。\n\n字极小。\n\n却比人名更叫人背后发凉。\n\n“灰井照骨旧案。”\n\n“留验二号。”\n\n@{沈照}呼吸终于在这一刻，真正乱了一下。\n\n不是因为“旧案”二字。\n\n而是因为“二号”。\n\n二号。\n\n既有二号，便该有一号。\n\n十二年前那夜，从灰井边被列进留验的，不止他一个。\n\n灯下安静得能听见蜡沿微微发裂的声音。\n\n@{岳怀川}看着他：“现在你明白，我为什么还坐在这里等你，而不是先把门外那群人交给外门了吗？”\n\n这一句落下，等于把他的去处、名目和命，硬生生从外门手里撕出来，挂到了照命司旧案底下。今夜之后，他不再只是废照棚里等死的杂役，而是被一桩重开旧案点名收押的活证。\n\n@{沈照}没答。\n\n他只是盯着那串旧编号。\n\n袖里的半页、灰井边的白灯、那句“别认灯”，还有梁上那女人最后一句“别把手伸给他们”，忽然全在这一刻，被拧成了一股更冷的线。\n\n有人想收他。\n\n也有人不想让他落到收人的那一拨手里。\n\n可真正让他心口发沉的，还不是这个。\n\n是如果他是二号。\n\n那一号是谁。\n\n而那个人，如今还活不活着。\n",
    "outlineExpectation": "沈照带着从旧账房撕下的半页旧录走进临时账房，在岳怀川灯下把“留验旧规”逼成明牌；随后借冬月火耗册缺页当众反压庄无烬与祁连烛，最终被一纸“旧案重开，留验转押”的调令钉死为留验二号，把照命司内部旧案与另一名幸存者同时推到明面上。"
