            "direction": "沈照被一纸“留验转押”逼上照命司旧押灯路。岳怀川决定当夜挪人，路上却接连暴露司内也有人盯着这桩旧案；沈照在回废照棚取药时拿到一片新的旧木线索，最终在东坡门接押现场撞破伪令与埋伏，并顺着地底白火照出的旧刻痕，第一次摸到“一号未转”的实证。",
