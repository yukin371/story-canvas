            "direction": "沈照与岳怀川钻入北灰库真正的腹仓，在收尾房追手破门前翻到“留验一号暂存北腹”“留二应名”的残卷，确认沈照原本不在那册上，而是一号在旧押夜里强行替出来的补录人；两人随即在最深的黑木长盒里摸出一盏仍有回应的旧铜灯，第一次看到一号并非只剩纸灰，而是可能还留下命灯余息的活证。",
