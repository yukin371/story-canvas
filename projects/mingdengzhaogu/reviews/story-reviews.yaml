            "direction": "沈照与岳怀川顺着第十七章末尾的转骨暗槽继续下潜，第一次正面见到被留在悬腹廊最深处的一号活证，把“撞位挡二”的旧事从残忆与旁证坐实到当事人口中。章中既要明确“原册上的照”不是简单等于沈照，也要把下一层目标从碎片物证收束到更核心的回册总簿。章尾要把悬腹廊失守与转骨槽再下的压迫一起推到下一层，让两人带着“一号不能立刻带走”“原册上的照别信第一眼”的新警告继续往下。",
