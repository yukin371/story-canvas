              "沈照借回废照棚取药之机换藏半页旧录，并从草席底下拿到一片新塞进来的旧木线索，确认除了梁上女人外，还有人继续在暗处递话",
              "东坡门来使持副印伪令强接留验，晒场灯阵随即被人动手脚引爆；沈照和岳怀川在混乱中撞见地底旧押灯路留下的“一号未转”刻痕，旧案从传闻变成可追的实证"
            ],
            "sceneGoals": [
              "岳怀川决定当夜挪人，带沈照走过青烬宗早年的旧押灯廊。白痕和残灯一路起应，逼出这条廊与十二年前留验旧案的直接关系，也坐实了司里来使来得太急并非好意。",
              "沈照回废照棚取药并重藏旧录，从周小棘口中得知东边已备角驼夜行，又在草席底下摸到一片新塞入的旧木线索，确认暗处递话的人仍在推动他沿旧案追下去。",
              "东坡门来使只持副印强接留验，随后晒场灯阵被人掺灰引爆。沈照与岳怀川在乱局里挡下抢物与碰手的埋伏，并顺着白火与旧刻痕看见“一号未转”，把旧案真正从纸面拉进了眼前。"
            ]
          },
