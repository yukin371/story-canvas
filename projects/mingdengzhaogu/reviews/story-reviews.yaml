              "收尾房追手压到井间门口，岳怀川和沈照抢下昨夜转移记录与转灯铁牌，被迫朝更深的转灯井继续追；章尾要明确一号关键部分已在不久前被送下井底，而沈照自己也开始出现会被残灯接入替身位的危险。"
