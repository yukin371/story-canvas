            "direction": "沈照与岳怀川顺着主息槽背后的巡缝道硬抢更深一层的旧记签库，要把第十六章补出的旁证继续压成可带走的物证。章中既要让主息槽的点名从抽象压迫变成能直接逼沈照失声应位的现实机制，也要让“另一个被抹掉的名字”第一次留下可触碰的残字与骨片。章尾要把钩子推进更下面那道暗槽与活证真声：更深处不只是留着一号的某一部分，还在持续阻止沈照“回册”。",
