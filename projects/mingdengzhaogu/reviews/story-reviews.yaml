          "currentChapter": {
            "id": "chapter-021",
            "title": "第二十一章 锁梁抢人",
            "direction": "承接第二十章末尾的返槽上行，沈照与岳怀川必须在锁梁回紧前从悬腹廊把一号抢下来。章中既要让真页代价在行动里具体显形，也要让一号把“照生只是尾名”“后补二名被送去补缺页”的机制再钉实。章尾要让三人带着页芯、旧扣和免签缝里的新递线人线索继续逃，从而把更深旧名与照命司暗手一起推到下一章。",
            "beatHints": [
              "沈照与岳怀川顺着返槽上行，在锁梁回紧与页芯发热的双重催逼下赶回悬腹廊；沈照则在攀爬中具体感到那段“暖碗记忆”被拿走后的动作空缺。",
              "悬腹廊里的守梁役正借四道新副索把一号重新缝回旧位，两人依一号指点先断左三右二，再拆主索铜扣，硬在合口前把人抢下来。",
              "一号落地后点破页芯是会顺缺补页的钥匙，也坐实“照生”只是原页尾名与自己当年拖断补页流程的真相；三人随即退入免签缝，而照命司暗手与新的旧扣递线同时压到。"
            ],
            "sceneGoals": [
              "沈照与岳怀川沿返槽抢上悬腹廊，在梁锁回收与页芯指路中争分夺秒前行；沈照也第一次在行动里明确感到那段暖碗记忆被抽走后的具体空缺。",
