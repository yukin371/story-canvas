              "养息腹白池和巡缝人把一号主动撞上承灯位替沈照挡下一次“应二”的事实补成旁证，也明确指出当夜还有另一个被临时抹掉的名字。",
              "井上追兵与井下回索同时压到养息腹，沈照和岳怀川被迫转入主息槽背后的旧巡缝道；主息槽开始点名逼沈照“应二”，章尾要坐实只要他答一声，整套候承旧规就会自动把他认回去。"
