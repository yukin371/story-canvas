            "direction": "承接第二十二章末尾的东三先亮，沈照、岳怀川与一号赶到抹名廊东三匣时，必须在追兵和净页火压近前，分清那道自己亮起的“姓笔第一笔”究竟在认谁。章中既要坐实十二年前不是单纯补缺，而是有人以“撞位活一、押名代欠”的方式把沈照硬拖出死账，也要让收笔役和暗手这条旧流程仍在追补的线露出真身。章尾要让沈照虽然暂时没有替那一笔写完，却付出新的记忆代价，并第一次写不稳自己的姓。",
